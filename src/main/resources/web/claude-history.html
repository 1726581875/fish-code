<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claude History - Fish Code</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f6f8fa;color:#24292f;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}
.header{background:#fff;border-bottom:1px solid #d0d7de;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-size:16px;color:#6639ba;white-space:nowrap}
.header-left{display:flex;gap:8px;align-items:center}
.search-box{background:#fff;border:1px solid #d0d7de;border-radius:6px;color:#24292f;padding:6px 12px;font-size:13px;width:280px;outline:none}
.search-box:focus{border-color:#6639ba}
.hdr-btn{background:none;border:1px solid #d0d7de;color:#57606a;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px;text-decoration:none;display:inline-block}
.hdr-btn:hover{border-color:#6639ba;color:#24292f}
.hdr-btn.primary{background:#2da44e;border-color:#2da44e;color:#fff}
.hdr-btn.primary:hover{background:#1a7f37}
.main{display:flex;flex:1;overflow:hidden}
.panel{border-right:1px solid #d0d7de;overflow-y:auto;flex-shrink:0;background:#fff}
.panel-header{padding:10px 12px;font-size:12px;color:#57606a;border-bottom:1px solid #d0d7de;position:sticky;top:0;background:#f6f8fa;z-index:1;display:flex;align-items:center;justify-content:space-between}
.panel-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid #eee;transition:background .15s}
.panel-item:hover{background:#f3f4f6}
.panel-item.active{background:#ddf4ff;border-left:3px solid #0969da}
.panel-item .title{font-size:13px;color:#24292f;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.panel-item .meta{font-size:11px;color:#57606a}
.panel-item .count{font-size:11px;color:#0969da}
.project-panel{width:280px}
.session-panel{width:300px}
.detail-panel{flex:1;padding:16px;overflow-y:auto;background:#f6f8fa}
.empty-state{text-align:center;color:#57606a;margin-top:60px}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state .text{font-size:14px}
.message{margin-bottom:16px;max-width:90%}
.message .role{font-size:11px;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.message.user .role{color:#1a7f37}
.message.assistant .role{color:#0969da}
.message.system .role{color:#6639ba}
.message .content{background:#fff;border:1px solid #d0d7de;border-radius:8px;padding:12px;line-height:1.6;font-size:14px;white-space:pre-wrap;word-break:break-word;color:#24292f}
.message.user .content{background:#dafbe1;border-color:#4ac26b}
.message.system .content{background:#fbefff;border-color:#d8b9ff}
.tool-call{margin-top:8px;background:#fff;border:1px solid #d0d7de;border-radius:6px;overflow:hidden}
.tool-call-header{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;color:#57606a}
.tool-call-header:hover{background:#f6f8fa}
.tool-call-header .arrow{transition:transform .15s}
.tool-call-header .arrow.open{transform:rotate(90deg)}
.tool-call-header .name{color:#953800;font-weight:600}
.tool-call-body{display:none;padding:8px 12px;border-top:1px solid #d0d7de;background:#f6f8fa}
.tool-call-body.open{display:block}
.tool-call-body pre{font-family:'Cascadia Code','Consolas',monospace;font-size:12px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-all;color:#24292f}
.tool-result{margin-top:4px;background:#f6f8fa;border:1px solid #d0d7de;border-radius:4px;padding:8px;font-family:'Cascadia Code','Consolas',monospace;font-size:11px;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;color:#57606a}
.thinking{margin-top:8px;background:#f8f0ff;border:1px solid #d8b9ff;border-radius:6px;padding:10px;font-size:12px;color:#57606a;font-style:italic}
.thinking-header{cursor:pointer;color:#6639ba;font-weight:600;font-size:11px;margin-bottom:4px}
.timestamp{font-size:11px;color:#57606a;margin-top:4px}
.loading{text-align:center;color:#57606a;padding:20px}
.badge{background:#ddf4ff;color:#0969da;padding:1px 6px;border-radius:10px;font-size:10px;margin-left:6px}
.token-info{font-size:11px;color:#57606a;margin-top:6px}
.model-tag{background:#ddf4ff;color:#0969da;padding:1px 6px;border-radius:4px;font-size:10px;margin-left:6px}
.stats-bar{display:flex;gap:16px;padding:8px 12px;background:#f6f8fa;border-bottom:1px solid #d0d7de;font-size:11px;color:#57606a}
.stats-bar .stat{display:flex;align-items:center;gap:4px}
.stats-bar .stat-val{color:#24292f;font-weight:600}
.filter-bar{display:flex;gap:8px;padding:8px 12px;background:#f6f8fa;border-bottom:1px solid #d0d7de}
.filter-bar input{background:#fff;border:1px solid #d0d7de;border-radius:4px;color:#24292f;padding:4px 8px;font-size:12px}
.filter-bar input:focus{border-color:#6639ba;outline:none}
.highlight{background:#fff8c5;border-radius:2px;padding:0 2px}
.load-more{text-align:center;padding:12px}
.load-more button{background:#fff;border:1px solid #d0d7de;color:#0969da;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.load-more button:hover{background:#f3f4f6}
.md-content code{background:#f6f8fa;border:1px solid #d0d7de;border-radius:4px;padding:1px 4px;font-family:'Cascadia Code','Consolas',monospace;font-size:12px}
.md-content pre{background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:12px;margin:8px 0;overflow-x:auto;font-family:'Cascadia Code','Consolas',monospace;font-size:12px;line-height:1.5}
.md-content pre code{background:none;border:none;padding:0}
.md-content strong{font-weight:600}
.md-content em{font-style:italic}
.md-content ul,.md-content ol{margin:8px 0;padding-left:20px}
.md-content li{margin:4px 0}
.md-content blockquote{border-left:3px solid #d0d7de;padding-left:12px;color:#57606a;margin:8px 0}
.tab-bar{display:flex;border-bottom:1px solid #d0d7de;background:#f6f8fa}
.tab{flex:1;padding:8px;border:none;background:none;cursor:pointer;font-size:12px;color:#57606a;border-bottom:2px solid transparent}
.tab:hover{color:#24292f}
.tab.active{color:#0969da;border-bottom-color:#0969da;font-weight:600}
.prompt-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid #eee;transition:background .15s}
.prompt-item:hover{background:#f3f4f6}
.prompt-item .prompt-text{font-size:13px;color:#24292f;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.prompt-item .prompt-meta{font-size:11px;color:#57606a}
.prompt-item .prompt-project{font-size:10px;color:#0969da;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>Claude History</h1>
    <input class="search-box" id="searchInput" placeholder="搜索对话内容..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="hdr-btn" onclick="doSearch()">搜索</button>
    <button class="hdr-btn" onclick="clearSearch()" id="clearSearchBtn" style="display:none">清除搜索</button>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <span id="dirInfo" style="font-size:11px;color:#57606a"></span>
    <a class="hdr-btn" href="/home">首页</a>
  </div>
</div>
<div class="main">
  <div class="panel project-panel">
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('projects')" id="tabProjects">项目</button>
      <button class="tab" onclick="switchTab('prompts')" id="tabPrompts">全部提问</button>
    </div>
    <div id="projectsView">
      <div class="panel-header">项目列表</div>
      <div id="projectList"><div class="loading">加载中...</div></div>
    </div>
    <div id="promptsView" style="display:none">
      <div class="panel-header">全局提问历史</div>
      <div id="promptList"><div class="loading">加载中...</div></div>
    </div>
  </div>
  <div class="panel session-panel">
    <div class="panel-header">
      <span>会话列表 <span id="sessionCount"></span></span>
    </div>
    <div class="filter-bar" id="filterBar" style="display:none">
      <input type="date" id="filterAfter" title="开始日期" onchange="applyFilter()">
      <input type="date" id="filterBefore" title="结束日期" onchange="applyFilter()">
    </div>
    <div id="sessionList"><div class="empty-state"><div class="text">选择一个项目</div></div></div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="empty-state">
      <div class="icon">&#x1f4ac;</div>
      <div class="text">选择一个会话查看详情</div>
    </div>
  </div>
</div>

<script>
var projects=[],currentProject=null,currentSession=null,allSessions=[];
var currentOffset=0,hasMore=false,isLoadingMore=false;
var blockIdCounter=0;

fetch('/claude-api/check').then(function(r){return r.json()}).then(function(d){
  document.getElementById('dirInfo').textContent=d.path;
  if(!d.exists){
    document.getElementById('projectList').innerHTML='<div class="empty-state"><div class="text">未找到 ~/.claude 目录<br><small>请在 config.json 中配置 claude_dir</small></div></div>';
    return;
  }
  loadProjects();
}).catch(function(err){
  document.getElementById('projectList').innerHTML='<div class="empty-state"><div class="text">加载失败: '+esc(err.message)+'</div></div>';
});

var currentTab='projects';
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(tab==='projects'){
    document.getElementById('tabProjects').classList.add('active');
    document.getElementById('projectsView').style.display='';
    document.getElementById('promptsView').style.display='none';
  }else{
    document.getElementById('tabPrompts').classList.add('active');
    document.getElementById('projectsView').style.display='none';
    document.getElementById('promptsView').style.display='';
    loadPrompts();
  }
}

function loadPrompts(){
  var el=document.getElementById('promptList');
  el.innerHTML='<div class="loading">加载中...</div>';
  fetch('/claude-api/history?limit=200').then(function(r){return r.json()}).then(function(d){
    renderPrompts(d.items||[]);
  }).catch(function(err){
    el.innerHTML='<div class="empty-state"><div class="text">加载失败</div></div>';
  });
}

function renderPrompts(items){
  var el=document.getElementById('promptList');
  if(!items.length){el.innerHTML='<div class="empty-state"><div class="text">没有提问记录</div></div>';return;}
  el.innerHTML=items.map(function(item){
    var text=esc(item.display||'');
    var ts=item.timestamp?formatTime(new Date(item.timestamp).toISOString()):'';
    var project=item.project||'';
    var shortProj=project.split('/').pop()||project;
    return '<div class="prompt-item" onclick="jumpToSession(\''+esc(item.sessionId)+'\',\''+esc(project)+'\')">'+
      '<div class="prompt-text">'+text+'</div>'+
      '<div class="prompt-meta">'+ts+'</div>'+
      '<div class="prompt-project" title="'+esc(project)+'">'+esc(shortProj)+'</div>'+
    '</div>';
  }).join('');
}

function jumpToSession(sessionId,projectPath){
  if(!sessionId) return;
  var hash=projectPathToHash(projectPath);
  if(!hash) return;
  currentProject=hash;
  currentSession=sessionId;
  currentOffset=0;
  hasMore=false;
  switchTab('projects');
  document.getElementById('filterBar').style.display='none';
  document.querySelectorAll('.session-panel .panel-item').forEach(function(el){el.classList.remove('active');});
  document.getElementById('detailPanel').innerHTML='<div class="loading">加载中...</div>';
  loadSessionMessages(0, 50, true);
}

function projectPathToHash(path){
  if(!path) return '';
  var hash=path.replace(/^[\/\\]/,'').replace(/[\/\\]/g,'-');
  return hash;
}

function loadProjects(){
  fetch('/claude-api/projects').then(function(r){return r.json()}).then(function(d){
    projects=d.projects||[];
    renderProjects();
  }).catch(function(err){
    document.getElementById('projectList').innerHTML='<div class="empty-state"><div class="text">加载失败</div></div>';
  });
}

function renderProjects(){
  var el=document.getElementById('projectList');
  if(!projects.length){el.innerHTML='<div class="empty-state"><div class="text">没有找到项目</div></div>';return;}
  el.innerHTML=projects.map(function(p){
    return '<div class="panel-item" onclick="selectProject(\''+esc(p.hash)+'\')" id="proj-'+esc(p.hash)+'">'+
      '<div class="title" title="'+esc(p.path)+'">'+esc(shortPath(p.path))+'</div>'+
      '<div class="meta">'+p.sessionCount+' 个会话</div>'+
    '</div>';
  }).join('');
}

function selectProject(hash){
  currentProject=hash;
  currentSession=null;
  document.querySelectorAll('.project-panel .panel-item').forEach(function(el){el.classList.remove('active');});
  var el=document.getElementById('proj-'+hash);
  if(el) el.classList.add('active');
  document.getElementById('filterBar').style.display='flex';
  document.getElementById('sessionList').innerHTML='<div class="loading">加载中...</div>';
  document.getElementById('detailPanel').innerHTML='<div class="empty-state"><div class="icon">&#x1f4ac;</div><div class="text">选择一个会话查看详情</div></div>';
  loadSessions();
}

function loadSessions(){
  var after=document.getElementById('filterAfter').value;
  var before=document.getElementById('filterBefore').value;
  var url='/claude-api/sessions?project='+encodeURIComponent(currentProject);
  if(after) url+='&after='+after+'T00:00:00Z';
  if(before) url+='&before='+before+'T23:59:59Z';
  fetch(url).then(function(r){return r.json()}).then(function(d){
    allSessions=d.sessions||[];
    renderSessions();
  }).catch(function(err){
    document.getElementById('sessionList').innerHTML='<div class="empty-state"><div class="text">加载失败</div></div>';
  });
}

function applyFilter(){
  if(currentProject) loadSessions();
}

function renderSessions(){
  var el=document.getElementById('sessionList');
  document.getElementById('sessionCount').textContent='('+allSessions.length+')';
  if(!allSessions.length){el.innerHTML='<div class="empty-state"><div class="text">没有会话</div></div>';return;}
  el.innerHTML=allSessions.map(function(s){
    var t=s.timestamp?formatTime(s.timestamp):'';
    var summary=s.summary?esc(truncate(s.summary,60)):'(空会话)';
    var tools=s.toolCallCount?'<span class="count"> '+s.toolCallCount+' 工具</span>':'';
    return '<div class="panel-item" onclick="selectSession(\''+esc(s.id)+'\')" id="sess-'+esc(s.id)+'">'+
      '<div class="title">'+esc(s.id)+'</div>'+
      '<div class="meta">'+t+'<span class="count"> '+s.messageCount+' 条消息</span>'+tools+'</div>'+
      '<div class="meta" style="color:#57606a;margin-top:2px">'+summary+'</div>'+
    '</div>';
  }).join('');
}

function selectSession(id){
  currentSession=id;
  currentOffset=0;
  hasMore=false;
  document.querySelectorAll('.session-panel .panel-item').forEach(function(el){el.classList.remove('active');});
  var el=document.getElementById('sess-'+id);
  if(el) el.classList.add('active');
  document.getElementById('detailPanel').innerHTML='<div class="loading">加载中...</div>';
  loadSessionMessages(0, 50, true);
}

function loadSessionMessages(offset, limit, replace){
  var url='/claude-api/session?project='+encodeURIComponent(currentProject)+'&id='+encodeURIComponent(currentSession)+'&offset='+offset+'&limit='+limit;
  fetch(url).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(d){
    if(replace){
      renderDetail(d);
    } else {
      appendMessages(d);
    }
  }).catch(function(err){
    if(replace){
      document.getElementById('detailPanel').innerHTML='<div class="empty-state"><div class="text">加载失败: '+esc(err.message)+'</div></div>';
    }
  });
}

function renderDetail(session){
  var el=document.getElementById('detailPanel');
  if(!session.messages||!session.messages.length){
    el.innerHTML='<div class="empty-state"><div class="icon">&#x1f4ad;</div><div class="text">会话为空</div></div>';
    return;
  }
  currentOffset=session.offset+session.messages.length;
  hasMore=session.hasMore;

  var statsHtml='<div class="stats-bar">'+
    '<div class="stat">消息: <span class="stat-val">'+(session.totalMessages||0)+'</span></div>'+
    '<div class="stat">工具调用: <span class="stat-val">'+(session.toolCallCount||0)+'</span></div>'+
    '<div class="stat">输入Token: <span class="stat-val">'+formatNumber(session.totalInputTokens||0)+'</span></div>'+
    '<div class="stat">输出Token: <span class="stat-val">'+formatNumber(session.totalOutputTokens||0)+'</span></div>'+
    '<div style="margin-left:auto"><button class="hdr-btn" onclick="exportSession()" style="font-size:11px">导出 Markdown</button></div>'+
  '</div>';

  var html='<div style="margin-bottom:12px;font-size:12px;color:#57606a">'+
    '项目: <span style="color:#0969da">'+esc(session.cwd||'')+'</span>'+
    ' | 会话: <span style="color:#6639ba">'+esc(session.id)+'</span>'+
    ' | 开始: '+formatTime(session.timestamp)+
  '</div>'+statsHtml;

  html+='<div id="messagesContainer">';
  session.messages.forEach(function(msg){
    html+=renderMessage(msg);
  });
  html+='</div>';

  if(hasMore){
    html+='<div class="load-more"><button onclick="loadMoreMessages()">加载更多消息</button></div>';
  }

  el.innerHTML=html;
}

function appendMessages(session){
  var container=document.getElementById('messagesContainer');
  if(!container) return;
  currentOffset=session.offset+session.messages.length;
  hasMore=session.hasMore;

  var html='';
  session.messages.forEach(function(msg){
    html+=renderMessage(msg);
  });
  container.insertAdjacentHTML('beforeend', html);

  var loadMore=document.querySelector('.load-more');
  if(loadMore) loadMore.remove();

  if(hasMore){
    container.insertAdjacentHTML('afterend','<div class="load-more"><button onclick="loadMoreMessages()">加载更多消息</button></div>');
  }
  isLoadingMore=false;
}

function loadMoreMessages(){
  if(isLoadingMore||!hasMore) return;
  isLoadingMore=true;
  var loadMoreBtn=document.querySelector('.load-more button');
  if(loadMoreBtn) loadMoreBtn.textContent='加载中...';
  loadSessionMessages(currentOffset, 50, false);
}

function renderMessage(msg){
  var role=msg.role||'';
  var ts=msg.timestamp?'<div class="timestamp">'+formatTime(msg.timestamp)+'</div>':'';
  var model=msg.model?'<span class="model-tag">'+esc(msg.model)+'</span>':'';
  var usage='';
  if(msg.usage){
    var u=msg.usage;
    usage='<div class="token-info">Tokens: '+(u.input_tokens||0)+' in / '+(u.output_tokens||0)+' out</div>';
  }

  if(role==='system'){
    var content=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content);
    return '<div class="message system"><div class="role">SYSTEM '+model+'</div><div class="content md-content">'+renderMarkdown(content)+'</div>'+ts+'</div>';
  }

  var contentHtml='';
  if(typeof msg.content==='string'){
    contentHtml='<div class="content md-content">'+renderMarkdown(msg.content)+'</div>';
  } else if(Array.isArray(msg.content)){
    var blocks='';
    msg.content.forEach(function(b){
      if(b.type==='text'){
        blocks+='<div class="content md-content">'+renderMarkdown(b.text||'')+'</div>';
      } else if(b.type==='tool_use'){
        var inputStr=JSON.stringify(b.input||{},null,2);
        var toolId='tool-'+(++blockIdCounter);
        blocks+='<div class="tool-call">'+
          '<div class="tool-call-header" onclick="toggleTool(\''+toolId+'\')">'+
            '<span class="arrow" id="arrow-'+toolId+'">&#x25b6;</span>'+
            '<span class="name">'+esc(b.name||'')+'</span>'+
            '<span class="badge">tool_use</span>'+
          '</div>'+
          '<div class="tool-call-body" id="body-'+toolId+'"><pre>'+esc(inputStr)+'</pre></div>'+
        '</div>';
      } else if(b.type==='tool_result'){
        var resultId='result-'+(++blockIdCounter);
        blocks+='<div class="tool-call">'+
          '<div class="tool-call-header" onclick="toggleTool(\''+resultId+'\')">'+
            '<span class="arrow" id="arrow-'+resultId+'">&#x25b6;</span>'+
            '<span class="name">Tool Result</span>'+
            '<span class="badge">tool_result</span>'+
          '</div>'+
          '<div class="tool-call-body" id="body-'+resultId+'"><div class="tool-result">'+esc(b.content||'')+'</div></div>'+
        '</div>';
      } else if(b.type==='thinking'){
        var thinkId='think-'+(++blockIdCounter);
        blocks+='<div class="thinking">'+
          '<div class="thinking-header" onclick="toggleTool(\''+thinkId+'\')">'+
            '<span class="arrow" id="arrow-'+thinkId+'">&#x25b6;</span> Thinking'+
          '</div>'+
          '<div class="tool-call-body" id="body-'+thinkId+'"><pre style="color:#57606a">'+esc(b.thinking||'')+'</pre></div>'+
        '</div>';
      }
    });
    contentHtml=blocks;
  } else {
    contentHtml='<div class="content md-content">'+renderMarkdown(JSON.stringify(msg.content))+'</div>';
  }

  return '<div class="message '+role+'"><div class="role">'+role.toUpperCase()+' '+model+'</div>'+contentHtml+usage+ts+'</div>';
}

function toggleTool(id){
  var body=document.getElementById('body-'+id);
  var arrow=document.getElementById('arrow-'+id);
  if(!body)return;
  if(body.classList.contains('open')){
    body.classList.remove('open');
    if(arrow)arrow.classList.remove('open');
  } else {
    body.classList.add('open');
    if(arrow)arrow.classList.add('open');
  }
}

function renderMarkdown(text){
  if(!text) return '';
  var s=esc(text);
  s=s.replace(/```(\w*)\n?([\s\S]*?)```/g,function(m,lang,code){
    return '<pre><code>'+code+'</code></pre>';
  });
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  s=s.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  s=s.replace(/^- (.+)$/gm,'<li>$1</li>');
  s=s.replace(/(<li>.*<\/li>)/s,function(m){return '<ul>'+m+'</ul>';});
  s=s.replace(/\n/g,'<br>');
  return s;
}

function doSearch(){
  var q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  document.getElementById('clearSearchBtn').style.display='inline-block';
  document.getElementById('filterBar').style.display='none';
  document.getElementById('sessionList').innerHTML='<div class="loading">搜索中...</div>';
  document.getElementById('detailPanel').innerHTML='<div class="loading">搜索中...</div>';
  fetch('/claude-api/search?q='+encodeURIComponent(q)+'&limit=50').then(function(r){return r.json()}).then(function(d){
    renderSearchResults(d.results||[],q);
  }).catch(function(err){
    document.getElementById('sessionList').innerHTML='<div class="empty-state"><div class="text">搜索失败</div></div>';
    document.getElementById('detailPanel').innerHTML='';
  });
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearSearchBtn').style.display='none';
  document.getElementById('sessionList').innerHTML='<div class="empty-state"><div class="text">选择一个项目</div></div>';
  document.getElementById('detailPanel').innerHTML='<div class="empty-state"><div class="icon">&#x1f4ac;</div><div class="text">选择一个会话查看详情</div></div>';
  if(currentProject){
    document.getElementById('filterBar').style.display='flex';
    loadSessions();
  }
}

function renderSearchResults(results,keyword){
  var el=document.getElementById('sessionList');
  document.getElementById('sessionCount').textContent='(搜索结果: '+results.length+')';
  if(!results.length){el.innerHTML='<div class="empty-state"><div class="text">没有找到匹配内容</div></div>';document.getElementById('detailPanel').innerHTML='';return;}
  el.innerHTML=results.map(function(r,i){
    var snippet=esc(r.snippet||'');
    if(r.highlight){
      var hl=esc(r.highlight);
      snippet=snippet.replace(hl,'<span class="highlight">'+hl+'</span>');
    }
    return '<div class="panel-item" onclick="selectSearchResult(\''+esc(r.projectHash)+'\',\''+esc(r.sessionId)+'\')">'+
      '<div class="title">'+esc(r.type)+' - '+esc(r.sessionId)+'</div>'+
      '<div class="meta">'+formatTime(r.timestamp)+'</div>'+
      '<div class="meta" style="color:#953800;margin-top:2px">'+snippet+'</div>'+
    '</div>';
  }).join('');
  document.getElementById('detailPanel').innerHTML='<div class="empty-state"><div class="text">点击左侧结果查看详情</div></div>';
}

function selectSearchResult(projectHash,sessionId){
  currentProject=projectHash;
  currentSession=sessionId;
  currentOffset=0;
  hasMore=false;
  document.getElementById('clearSearchBtn').style.display='none';
  document.getElementById('filterBar').style.display='none';
  document.querySelectorAll('.project-panel .panel-item').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.session-panel .panel-item').forEach(function(el){el.classList.remove('active');});
  document.getElementById('detailPanel').innerHTML='<div class="loading">加载中...</div>';
  loadSessionMessages(0, 50, true);
}

function exportSession(){
  if(!currentProject||!currentSession) return;
  window.open('/claude-api/export?project='+encodeURIComponent(currentProject)+'&id='+encodeURIComponent(currentSession),'_blank');
}

function shortPath(p){
  if(!p)return'';
  var parts=p.split(/[/\\]/);
  if(parts.length<=3)return p;
  return '.../'+parts.slice(-2).join('/');
}

function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function truncate(s,n){
  return s.length<=n?s:s.substr(0,n)+'...';
}

function formatNumber(n){
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return String(n);
}

function formatTime(ts){
  if(!ts)return'';
  try{
    var d=new Date(ts);
    var now=new Date();
    var diff=now-d;
    if(diff<0) diff=0;
    if(diff<60000)return'刚刚';
    if(diff<3600000)return Math.floor(diff/60000)+'分钟前';
    if(diff<86400000)return Math.floor(diff/3600000)+'小时前';
    if(diff<604800000)return Math.floor(diff/86400000)+'天前';
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  }catch(e){return ts;}
}

function pad(n){return n<10?'0'+n:n;}

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claude Conversations</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#eef0f4;color:#1a1a2e;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.head{background:#fff;border-bottom:1px solid #ddd;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.head h1{font-size:16px;font-weight:700;color:#222}
.head .dir-row{width:100%;display:flex;align-items:center;gap:8px;margin-top:2px}
.head .dir-label{font-size:11px;color:#999;white-space:nowrap}
.head .dir-input{flex:1;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:12px;outline:none;background:#fafafa;font-family:'Cascadia Code',Consolas,monospace;color:#555;max-width:500px}
.head .dir-input:focus{border-color:#7c5cfc;background:#fff}
.head .dir-input.ok{border-color:#2da44e;background:#f6fff6}
.head .dir-input.err{border-color:#d73a49;background:#fff8f8}
.head .dir-status{font-size:11px;white-space:nowrap}
.head .dir-status.ok{color:#2da44e}
.head .dir-status.err{color:#d73a49}
.head .search-wrap{display:flex;align-items:center;gap:6px;margin-left:auto}
.head .search-wrap input{border:1px solid #ddd;border-radius:6px;padding:5px 10px;font-size:12px;outline:none;background:#fafafa;width:220px}
.head .search-wrap input:focus{border-color:#7c5cfc;background:#fff}
.head .btn{border:1px solid #ddd;background:#fff;color:#555;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;transition:all .15s}
.head .btn:hover{border-color:#7c5cfc;color:#7c5cfc}
.head a.btn{text-decoration:none}
.main{padding:16px 20px;max-width:860px;margin:0 auto}
.project-card{background:#fff;border-radius:10px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #eee;overflow:hidden}
.project-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s;user-select:none}
.project-header:hover{background:#fafafa}
.project-header .arrow{font-size:11px;color:#aaa;transition:transform .2s;flex-shrink:0}
.project-header .arrow.open{transform:rotate(90deg)}
.project-header .info{flex:1;min-width:0}
.project-header .path{font-size:13px;font-weight:600;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-header .meta{font-size:11px;color:#888;margin-top:2px}
.project-header .count{font-size:12px;color:#7c5cfc;white-space:nowrap;font-weight:600}
.project-body{display:none;border-top:1px solid #f0f0f0}
.project-body.open{display:block}
.session-item{border-bottom:1px solid #f3f3f3}
.session-header{padding:10px 16px 10px 38px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .12s;flex-wrap:wrap}
.session-header:hover{background:#fafafa}
.session-header .s-arrow{font-size:10px;color:#bbb;transition:transform .2s;flex-shrink:0}
.session-header .s-arrow.open{transform:rotate(90deg)}
.session-header .s-info{flex:1;min-width:180px}
.session-header .s-id{font-size:11px;font-weight:600;color:#444;font-family:'Cascadia Code',Consolas,monospace}
.session-header .s-summary{font-size:11px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px}
.session-header .s-stats{display:flex;gap:10px;font-size:10px;color:#aaa;flex-shrink:0}
.session-header .s-stats b{color:#555}
.session-header .s-time{font-size:10px;color:#bbb;white-space:nowrap}
.session-header .mini-btn{font-size:10px;border:1px solid #e0e0e0;background:#fff;color:#888;padding:2px 8px;border-radius:4px;cursor:pointer}
.session-header .mini-btn:hover{border-color:#7c5cfc;color:#7c5cfc}
.session-body{display:none;border-top:1px solid #f0f0f0}
.session-body.open{display:block}
.session-meta{display:flex;gap:16px;padding:10px 16px;font-size:11px;color:#888;background:#fff;border-bottom:1px solid #f0f0f0;flex-wrap:wrap;align-items:center}
.session-meta .m-val{color:#333;font-weight:600}
.chat-area{padding:16px 20px;background:#fafbfc;min-height:80px}

.chat-turn{margin-bottom:20px;display:flex;gap:10px}
.chat-turn.user{justify-content:flex-end}
.chat-turn.assistant{justify-content:flex-start}

.chat-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.chat-turn.user .chat-avatar{background:#e6ffed;color:#1a7f37;order:2}
.chat-turn.assistant .chat-avatar{background:#e8e4ff;color:#6750a4}
.chat-turn.system .chat-avatar{background:#f0f0f0;color:#888}
.chat-turn.tool .chat-avatar{background:#fff3e0;color:#e65100}

.chat-bubble{max-width:82%}
.chat-turn.user .chat-bubble{text-align:right}
.chat-bubble .bubble-head{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.chat-turn.user .bubble-head{justify-content:flex-end}
.chat-bubble .bubble-role{font-size:10px;font-weight:600;letter-spacing:.3px}
.chat-turn.user .bubble-role{color:#1a7f37}
.chat-turn.assistant .bubble-role{color:#6750a4}
.chat-bubble .bubble-model{font-size:10px;color:#aaa;background:#f0f0f0;padding:1px 5px;border-radius:3px}
.chat-bubble .bubble-time{font-size:10px;color:#ccc}

.chat-bubble .bubble-content{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:10px 14px;line-height:1.6;font-size:13px;white-space:pre-wrap;word-break:break-word;color:#333;text-align:left;display:inline-block}
.chat-turn.user .bubble-content{background:#e9f9ec;border-color:#c8e6c9;border-top-right-radius:4px}
.chat-turn.assistant .bubble-content{background:#fff;border-color:#ddd;border-top-left-radius:4px}
.chat-turn.system .bubble-content{background:#f8f8f8;border-color:#e8e8e8;font-size:12px;color:#777;text-align:center;max-width:600px}
.chat-turn.tool .bubble-content{background:#fff8f0;border-color:#ffe0b0;font-size:12px;max-width:600px}

.bubble-content .md-p{margin-bottom:6px}
.bubble-content .md-p:last-child{margin-bottom:0}
.bubble-content code{background:#f0f0f0;border:1px solid #e0e0e0;border-radius:3px;padding:1px 4px;font-family:'Cascadia Code',Consolas,monospace;font-size:11px}
.bubble-content pre{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:6px;padding:10px;margin:6px 0;overflow-x:auto;font-family:'Cascadia Code',Consolas,monospace;font-size:11px;line-height:1.5}
.bubble-content pre code{background:none;border:none;padding:0;font-size:11px}
.bubble-content strong{font-weight:600}
.bubble-content em{font-style:italic}
.bubble-content ul,.bubble-content ol{margin:4px 0;padding-left:20px}
.bubble-content li{margin:2px 0}
.bubble-content blockquote{border-left:3px solid #d0d7de;padding-left:10px;color:#777;margin:4px 0}

.tool-call{margin:6px 0;border:1px solid #ffd4a8;border-radius:6px;overflow:hidden}
.tool-call .tc-head{padding:6px 10px;background:#fff8f0;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:11px;color:#8a5d00}
.tool-call .tc-head:hover{background:#fff3e0}
.tool-call .tc-head .tc-arrow{font-size:9px;transition:transform .15s;color:#bbb}
.tool-call .tc-head .tc-arrow.open{transform:rotate(90deg)}
.tool-call .tc-head .tc-name{font-weight:600;color:#e65100}
.tool-call .tc-body{display:none;padding:8px 10px;border-top:1px solid #ffd4a8;background:#fffdf8;font-family:'Cascadia Code',Consolas,monospace;font-size:11px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-all;color:#555}
.tool-call .tc-body.open{display:block}
.tool-result{margin:6px 0;border:1px solid #d0e0f0;border-radius:6px}
.tool-result .tr-head{padding:6px 10px;background:#f4f8ff;display:flex;align-items:center;gap:6px;font-size:11px;color:#506690}
.tool-result .tr-head .tr-arrow{font-size:9px;transition:transform .15s;color:#bbb;cursor:pointer}
.tool-result .tr-head .tr-arrow.open{transform:rotate(90deg)}
.tool-result .tr-body{display:none;padding:8px 10px;border-top:1px solid #d0e0f0;background:#fafcff;font-family:'Cascadia Code',Consolas,monospace;font-size:11px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-all;color:#555;max-height:300px;overflow-y:auto}
.tool-result .tr-body.open{display:block}
.thinking-block{margin:6px 0;border-left:3px solid #c4b5fd;padding:6px 10px;font-size:11px;color:#888;font-style:italic;background:#faf9ff}
.bubble-tokens{font-size:10px;color:#bbb;margin-top:4px}

.chat-divider{display:flex;align-items:center;gap:10px;margin:32px 0 20px;color:#999;font-size:10px}
.chat-divider::before,.chat-divider::after{content:'';flex:1;border-top:1px solid #e8e8e8}
.chat-divider .divider-label{white-space:nowrap}

.loading{text-align:center;color:#bbb;padding:30px;font-size:13px}
.empty{text-align:center;color:#aaa;padding:50px 16px}
.empty .icon{font-size:40px;margin-bottom:10px}
.empty .text{font-size:13px;line-height:1.6}
.load-more{text-align:center;padding:10px}
.load-more button{border:1px solid #ddd;background:#fff;color:#7c5cfc;padding:5px 20px;border-radius:6px;cursor:pointer;font-size:12px}
.load-more button:hover{background:#f8f8ff}
.search-result{cursor:pointer;padding:12px 16px}
.search-result:hover{background:#fafafa}
.search-result .sr-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.search-result .sr-type{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px}
.search-result .sr-type.user{background:#e6ffed;color:#1a7f37}
.search-result .sr-type.assistant{background:#ddf4ff;color:#0969da}
.search-result .sr-meta{font-size:10px;color:#bbb}
.search-result .sr-snippet{font-size:11px;color:#666;margin-top:4px;line-height:1.5}
.error-msg{background:#fff0f0;border:1px solid #ffd0d0;color:#c00;padding:12px 16px;border-radius:8px;font-size:12px;margin:12px 0}
</style>
</head>
<body>
<div class="head">
  <h1>Claude Conversations</h1>
  <div class="dir-row">
    <span class="dir-label">目录:</span>
    <input class="dir-input" id="dirInput" placeholder="输入 Claude 目录路径，留空使用默认" onchange="switchDir()">
    <span class="dir-status" id="dirStatus"></span>
  </div>
  <div class="search-wrap">
    <input id="searchInput" placeholder="搜索对话内容..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn" onclick="doSearch()">搜索</button>
    <button class="btn" onclick="clearSearch()" id="clearBtn" style="display:none">清除</button>
    <button class="btn" onclick="loadProjects()">刷新</button>
    <a class="btn" href="/home">首页</a>
  </div>
</div>
<div class="main" id="mainContent">
  <div class="loading">加载中...</div>
</div>

<script>
var currentDir='', defaultPath='';
var projects=[], sessionDataCache={};
var blockIdIdx=0;

(function init(){
  currentDir=localStorage.getItem('claudeConvDir')||'';
  if(currentDir) document.getElementById('dirInput').value=currentDir;
  checkDir();
})();

function getApiUrl(base){
  if(currentDir) base+=(base.indexOf('?')>=0?'&':'?')+'dir='+encodeURIComponent(currentDir);
  return base;
}

function switchDir(){
  var v=document.getElementById('dirInput').value.trim();
  if(v===currentDir) return;
  currentDir=v;
  localStorage.setItem('claudeConvDir',v);
  sessionDataCache={};
  checkDir();
}

function checkDir(){
  var el=document.getElementById('dirStatus');
  el.textContent='检测中...';
  el.className='dir-status';
  var inp=document.getElementById('dirInput');
  inp.className='dir-input';

  fetch(getApiUrl('/claude-api/check')).then(function(r){return r.json()}).then(function(d){
    defaultPath=d.path;
    if(d.exists){
      el.textContent='可用: '+d.path;
      el.className='dir-status ok';
      inp.className='dir-input ok';
      if(!currentDir) document.getElementById('dirInput').placeholder=d.path;
    } else {
      el.textContent=currentDir?'目录不存在':'目录不可用';
      el.className='dir-status err';
      inp.className='dir-input err';
    }
    loadProjects();
  }).catch(function(){
    el.textContent='连接失败';
    el.className='dir-status err';
    inp.className='dir-input err';
  });
}

function loadProjects(){
  document.getElementById('mainContent').innerHTML='<div class="loading">加载中...</div>';
  fetch(getApiUrl('/claude-api/projects')).then(function(r){return r.json()}).then(function(d){
    projects=d.projects||[];
    renderProjects();
  }).catch(function(err){
    document.getElementById('mainContent').innerHTML='<div class="error-msg">加载失败: '+esc(err.message)+'</div>';
  });
}

function renderProjects(){
  var el=document.getElementById('mainContent');
  if(!projects.length){el.innerHTML='<div class="empty"><div class="icon">&#x1f4ad;</div><div class="text">没有找到项目<br><small>'+esc(defaultPath||'')+'</small></div></div>';return;}

  var html='';
  projects.forEach(function(p){
    html+='<div class="project-card" id="pcard-'+esc(p.hash)+'">'+
      '<div class="project-header" onclick="toggleProject(\''+esc(p.hash)+'\',event)">'+
        '<span class="arrow" id="parrow-'+esc(p.hash)+'">&#x25b6;</span>'+
        '<div class="info">'+
          '<div class="path" title="'+esc(p.path)+'">'+esc(p.path)+'</div>'+
          '<div class="meta">'+esc(p.sessionCount)+' 个会话 &middot; '+formatTimeAgo(p.lastModified)+'</div>'+
        '</div>'+
        '<span class="count">'+esc(p.sessionCount)+'</span>'+
      '</div>'+
      '<div class="project-body" id="pbody-'+esc(p.hash)+'">'+
        '<div class="loading" id="pload-'+esc(p.hash)+'" style="display:none">加载会话...</div>'+
        '<div id="psessions-'+esc(p.hash)+'"></div>'+
      '</div>'+
    '</div>';
  });
  el.innerHTML=html;
}

function toggleProject(hash,evt){
  if(evt) evt.stopPropagation();
  var body=document.getElementById('pbody-'+hash);
  var arrow=document.getElementById('parrow-'+hash);
  if(body.classList.contains('open')){
    body.classList.remove('open');
    arrow.classList.remove('open');
  } else {
    body.classList.add('open');
    arrow.classList.add('open');
    loadSessions(hash);
  }
}

function loadSessions(hash){
  var container=document.getElementById('psessions-'+hash);
  if(container.innerHTML) return;
  var loader=document.getElementById('pload-'+hash);
  loader.style.display='block';

  fetch(getApiUrl('/claude-api/sessions?project='+encodeURIComponent(hash))).then(function(r){return r.json()}).then(function(d){
    loader.style.display='none';
    var sessions=d.sessions||[];
    renderSessions(hash, sessions);
  }).catch(function(){
    loader.style.display='none';
    container.innerHTML='<div class="error-msg">加载失败</div>';
  });
}

function renderSessions(hash, sessions){
  var container=document.getElementById('psessions-'+hash);
  if(!sessions.length){container.innerHTML='<div class="empty" style="padding:24px"><div class="text">没有会话记录</div></div>';return;}

  container.innerHTML=sessions.map(function(s){
    var summary=s.summary?esc(truncate(s.summary,80)):'';
    var id_=s.id||'';
    return '<div class="session-item">'+
      '<div class="session-header" onclick="toggleSession(\''+esc(hash)+'\',\''+esc(id_)+'\',event)">'+
        '<span class="s-arrow" id="sarrow-'+esc(hash)+'-'+esc(id_)+'">&#x25b6;</span>'+
        '<div class="s-info">'+
          '<div class="s-id">'+esc(id_)+'</div>'+
          (summary?'<div class="s-summary">'+summary+'</div>':'')+
        '</div>'+
        '<span class="s-time">'+formatTimeAgo(s.timestamp)+'</span>'+
        '<div class="s-stats">'+
          '<span>消息 <b>'+esc(s.messageCount||0)+'</b></span>'+
          '<span>工具 <b>'+esc(s.toolCallCount||0)+'</b></span>'+
          '<span>Token <b>'+formatK(s.totalInputTokens||0)+'+'+formatK(s.totalOutputTokens||0)+'</b></span>'+
        '</div>'+
        '<button class="mini-btn" onclick="event.stopPropagation();exportSession(\''+esc(hash)+'\',\''+esc(id_)+'\')">导出</button>'+
      '</div>'+
      '<div class="session-body" id="sbody-'+esc(hash)+'-'+esc(id_)+'">'+
        '<div class="loading" id="sload-'+esc(hash)+'-'+esc(id_)+'" style="display:none">加载消息...</div>'+
        '<div id="smsg-'+esc(hash)+'-'+esc(id_)+'"></div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function toggleSession(hash, id, evt){
  if(evt) evt.stopPropagation();
  var body=document.getElementById('sbody-'+hash+'-'+id);
  var arrow=document.getElementById('sarrow-'+hash+'-'+id);
  if(body.classList.contains('open')){
    body.classList.remove('open');
    arrow.classList.remove('open');
  } else {
    body.classList.add('open');
    arrow.classList.add('open');
    loadMessages(hash, id);
  }
}

function loadMessages(hash, id){
  var container=document.getElementById('smsg-'+hash+'-'+id);
  if(container.innerHTML) return;
  var loader=document.getElementById('sload-'+hash+'-'+id);
  loader.style.display='block';

  fetch(getApiUrl('/claude-api/session?project='+encodeURIComponent(hash)+'&id='+encodeURIComponent(id)+'&limit=50')).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(d){
    loader.style.display='none';
    sessionDataCache[hash+'-'+id]=d;
    renderChat(container, d);
  }).catch(function(err){
    loader.style.display='none';
    container.innerHTML='<div class="error-msg">加载失败: '+esc(err.message)+'</div>';
  });
}

function renderChat(container, session){
  var msgs=session.messages||[];
  var html='<div class="session-meta">'+
    '<span>消息数 <b class="m-val">'+(session.totalMessages||0)+'</b></span>'+
    '<span>工具调用 <b class="m-val">'+(session.toolCallCount||0)+'</b></span>'+
    '<span>输入Token <b class="m-val">'+formatK(session.totalInputTokens||0)+'</b></span>'+
    '<span>输出Token <b class="m-val">'+formatK(session.totalOutputTokens||0)+'</b></span>'+
    '<span style="margin-left:auto">工作目录: <b class="m-val" title="'+esc(session.cwd||'')+'">'+esc(shortPath(session.cwd||''))+'</b></span>'+
    '<span style="margin-left:8px">开始: <b class="m-val">'+formatTimeAgo(session.timestamp)+'</b></span>'+
  '</div><div class="chat-area" id="chatMsgs">';

  msgs.forEach(function(msg){ html+=renderTurn(msg); });
  html+='</div>';

  if(session.hasMore)
    html+='<div class="load-more"><button onclick="loadMoreTurns(this,\''+esc(session.id)+'\','+session.offset+')">加载更早消息</button></div>';

  container.innerHTML=html;
}

function renderTurn(msg){
  var role=msg.role||'';
  var ts=msg.timestamp?formatTimeAgo(msg.timestamp):'';
  var model=msg.model?esc(msg.model):'';

  if(role==='system'){
    return '<div class="chat-turn system">'+
      '<div class="chat-avatar">S</div>'+
      '<div class="chat-bubble">'+
        '<div class="bubble-content">'+renderMd(String(msg.content||''))+'</div>'+
      '</div>'+
    '</div>';
  }

  var isUser=(role==='user');
  var avatar=isUser?'U':'C';
  var roleLabel=isUser?'我':'Claude';

  var body='';
  if(typeof msg.content==='string'){
    body='<div class="bubble-content">'+renderMd(msg.content)+'</div>';
  } else if(Array.isArray(msg.content)){
    var blocks='';
    msg.content.forEach(function(b){
      if(b.type==='text'){
        blocks+='<div class="bubble-content">'+renderMd(b.text||'')+'</div>';
      } else if(b.type==='tool_use'){
        var tid='tc-'+role+'-'+(++blockIdIdx);
        blocks+='<div class="tool-call">'+
          '<div class="tc-head" onclick="toggleTc(\''+tid+'\',event)">'+
            '<span class="tc-arrow" id="tcarrow-'+tid+'">&#x25b6;</span>'+
            '<span class="tc-name">'+esc(b.name||'')+'</span>'+
            '<span>调用工具</span>'+
          '</div>'+
          '<div class="tc-body" id="tcbody-'+tid+'">'+esc(JSON.stringify(b.input||{},null,2))+'</div>'+
        '</div>';
      } else if(b.type==='tool_result'){
        var trid='tr-'+role+'-'+(++blockIdIdx);
        var content=esc(b.content||'');
        var preview=truncate(content,200);
        blocks+='<div class="tool-result">'+
          '<div class="tr-head" onclick="toggleTr(\''+trid+'\',event)">'+
            '<span class="tr-arrow" id="trarrow-'+trid+'">&#x25b6;</span>'+
            '<span>工具结果</span>'+
            '<span style="color:#999;margin-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px">'+esc(preview)+'</span>'+
          '</div>'+
          '<div class="tr-body" id="trbody-'+trid+'">'+content+'</div>'+
        '</div>';
      } else if(b.type==='thinking'){
        blocks+='<div class="thinking-block">'+esc(b.thinking||'')+'</div>';
      }
    });
    body=blocks;
  } else {
    body='<div class="bubble-content">'+renderMd(JSON.stringify(msg.content))+'</div>';
  }

  var usage='';
  if(msg.usage){
    var u=msg.usage;
    usage='<div class="bubble-tokens">Token: '+(u.input_tokens||0)+' in / '+(u.output_tokens||0)+' out</div>';
  }

  return '<div class="chat-turn '+role+'">'+
    '<div class="chat-avatar">'+avatar+'</div>'+
    '<div class="chat-bubble">'+
      '<div class="bubble-head">'+
        '<span class="bubble-role">'+roleLabel+'</span>'+
        (model?'<span class="bubble-model">'+model+'</span>':'')+
        (ts?'<span class="bubble-time">'+ts+'</span>':'')+
      '</div>'+
      body+
      usage+
    '</div>'+
  '</div>';
}

function toggleTc(id,evt){
  if(evt) evt.stopPropagation();
  var body=document.getElementById('tcbody-'+id);
  var arrow=document.getElementById('tcarrow-'+id);
  if(!body) return;
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function toggleTr(id,evt){
  if(evt) evt.stopPropagation();
  var body=document.getElementById('trbody-'+id);
  var arrow=document.getElementById('trarrow-'+id);
  if(!body) return;
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function loadMoreTurns(btn,sessionId,prevOffset){
  btn.textContent='加载中...';btn.disabled=true;
  var key=Object.keys(sessionDataCache).find(function(k){return k.endsWith('-'+sessionId);});
  if(!key) return;
  var projectHash=key.split('-'+sessionId)[0];
  var nextOffset=prevOffset+50;

  fetch(getApiUrl('/claude-api/session?project='+encodeURIComponent(projectHash)+'&id='+encodeURIComponent(sessionId)+'&offset='+nextOffset+'&limit=50')).then(function(r){return r.json()}).then(function(d){
    var container=document.getElementById('chatMsgs');
    if(!container) return;
    var moreHtml='';
    (d.messages||[]).forEach(function(msg){ moreHtml+=renderTurn(msg); });
    container.insertAdjacentHTML('afterbegin', moreHtml);

    var lm=document.querySelector('.load-more');
    if(lm) lm.remove();
    if(d.hasMore)
      container.parentNode.insertAdjacentHTML('beforeend','<div class="load-more"><button onclick="loadMoreTurns(this,\''+esc(sessionId)+'\','+(d.offset+d.messages.length)+')">加载更早消息</button></div>');

    var cached=sessionDataCache[key];
    if(cached){ cached.offset=d.offset; cached.hasMore=d.hasMore; }
  });
}

function exportSession(hash,id){
  window.open(getApiUrl('/claude-api/export?project='+encodeURIComponent(hash)+'&id='+encodeURIComponent(id)),'_blank');
}

function doSearch(){
  var q=document.getElementById('searchInput').value.trim();
  if(!q) return;
  document.getElementById('clearBtn').style.display='inline-block';
  document.getElementById('mainContent').innerHTML='<div class="loading">搜索中...</div>';

  fetch(getApiUrl('/claude-api/search?q='+encodeURIComponent(q)+'&limit=50')).then(function(r){return r.json()}).then(function(d){
    renderSearchResults(d.results||[],q);
  }).catch(function(){
    document.getElementById('mainContent').innerHTML='<div class="error-msg">搜索失败</div>';
  });
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').style.display='none';
  sessionDataCache={};
  loadProjects();
}

function renderSearchResults(results,keyword){
  var el=document.getElementById('mainContent');
  if(!results.length){el.innerHTML='<div class="empty"><div class="icon">&#x1f50d;</div><div class="text">没有找到匹配 "<b>'+esc(keyword)+'</b>"</div></div>';return;}

  var html='<div style="margin-bottom:10px;font-size:13px;color:#666">找到 <b>'+results.length+'</b> 条结果</div>';
  results.forEach(function(r){
    html+='<div class="project-card">'+
      '<div class="search-result" onclick="jumpToSession(\''+esc(r.projectHash)+'\',\''+esc(r.sessionId)+'\')">'+
        '<div class="sr-head">'+
          '<span class="sr-type '+esc(r.type)+'">'+esc(r.type).toUpperCase()+'</span>'+
          '<span style="font-size:11px;font-weight:600;color:#444">'+esc(r.sessionId)+'</span>'+
          '<span class="sr-meta">'+formatTimeAgo(r.timestamp)+'</span>'+
        '</div>'+
        '<div class="sr-snippet">'+esc(r.snippet||'')+'</div>'+
      '</div>'+
    '</div>';
  });
  el.innerHTML=html;
}

function jumpToSession(projectHash,sessionId){
  document.getElementById('clearBtn').style.display='none';
  document.getElementById('searchInput').value='';
  sessionDataCache={};
  renderProjects();
  setTimeout(function(){
    toggleProject(projectHash);
    setTimeout(function(){
      toggleSession(projectHash, sessionId);
      var el=document.getElementById('smsg-'+projectHash+'-'+sessionId);
      if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
    },400);
  },300);
}

function renderMd(text){
  if(!text) return '';
  var s=esc(text);
  s=s.replace(/```(\w*)\n?([\s\S]*?)```/g,function(m,lang,code){return '<pre><code>'+code+'</code></pre>';});
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  s=s.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  s=s.replace(/^- (.+)$/gm,'<li>$1</li>');
  s=s.replace(/(<li>.*<\/li>)/s,function(m){return '<ul>'+m+'</ul>';});
  s=s.replace(/\n/g,'<br>');
  return s;
}

function shortPath(p){
  if(!p) return '';
  var parts=p.split(/[/\\]/);
  if(parts.length<=3) return p;
  return '.../'+parts.slice(-2).join('/');
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function truncate(s,n){
  return String(s||'').length<=n?String(s||''):String(s||'').substring(0,n)+'...';
}

function formatK(n){
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return String(n);
}

function formatTimeAgo(ts){
  if(!ts) return '';
  try{
    var d=new Date(ts);
    var now=new Date();
    var diff=now-d;
    if(diff<0) diff=0;
    if(diff<60000) return '刚刚';
    if(diff<3600000) return Math.floor(diff/60000)+'分钟前';
    if(diff<86400000) return Math.floor(diff/3600000)+'小时前';
    if(diff<604800000) return Math.floor(diff/86400000)+'天前';
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  }catch(e){return ts;}
}
function pad(n){return n<10?'0'+n:n;}
</script>

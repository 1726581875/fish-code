<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fish Code - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:40px;width:360px;text-align:center}
.login-box h1{color:#58a6ff;font-size:20px;margin-bottom:8px}
.login-box .sub{color:#8b949e;font-size:13px;margin-bottom:24px}
.login-box .fish{font-size:48px;margin-bottom:16px}
.input-group{margin-bottom:16px;text-align:left}
.input-group label{display:block;font-size:12px;color:#8b949e;margin-bottom:4px}
.input-group input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:10px 12px;font-size:14px;outline:none}
.input-group input:focus{border-color:#58a6ff}
.login-btn{width:100%;background:#238636;color:#fff;border:none;padding:10px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.login-btn:hover{background:#2ea043}
.error{color:#f85149;font-size:13px;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="login-box">
  <div class="fish">&gt;&lt;(((º&gt;</div>
  <h1>Fish Code</h1>
  <div class="sub">请登录后使用</div>
  <div class="input-group">
    <label>用户名</label>
    <input type="text" id="username" autofocus>
  </div>
  <div class="input-group">
    <label>密码</label>
    <input type="password" id="password">
  </div>
  <button class="login-btn" onclick="login()">登录</button>
  <div class="error" id="error">用户名或密码错误</div>
</div>
<script>
document.getElementById('password').addEventListener('keydown',function(e){
  if(e.key==='Enter')login();
});
function login(){
  var u=document.getElementById('username').value.trim();
  var p=document.getElementById('password').value;
  if(!u||!p)return;
  fetch('/login',{method:'POST',body:JSON.stringify({username:u,password:p})})
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.success){
        localStorage.setItem('fish_token',data.token);
        window.location.href='/';
      }else{
        document.getElementById('error').style.display='block';
      }
    })
    .catch(function(){
      document.getElementById('error').style.display='block';
    });
}
</script>
</body>
</html>

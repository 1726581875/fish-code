<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Agent - AI 编程助手</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-body: #f5f5f5;
            --bg-white: #ffffff;
            --bg-gray: #f9f9f9;
            --accent-blue: #0969da;
            --accent-green: #1a7f37;
            --accent-orange: #9a6700;
            --accent-red: #cf222e;
            --text-main: #24292f;
            --text-secondary: #57606a;
            --text-muted: #8b949e;
            --border-color: #d0d7de;
            --border-light: #e8ebef;
            --font-mono: 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ================= 侧边栏 ================= */
        .sidebar {
            width: 300px;
            background: var(--bg-white);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar-header {
            height: 36px; padding: 0 12px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            font-size: 13px; font-weight: 600; color: var(--text-main);
        }
        .sidebar-action {
            width: 24px; height: 24px; border: none; border-radius: 5px;
            background: transparent; color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .sidebar-action:hover { background: var(--bg-gray); color: var(--text-main); }
        .sidebar-section {
            min-height: 0; display: flex; flex-direction: column; flex: 1;
        }
        .section-title {
            height: 30px; padding: 0 10px; display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.3px;
            background: var(--bg-gray); border-bottom: 1px solid var(--border-light);
        }
        .section-title .section-count { margin-left: auto; font-weight: 500; color: var(--text-muted); }
        .sidebar-list {
            flex: 1; overflow-y: auto; padding: 6px;
        }
        .sidebar-empty {
            padding: 12px 8px; color: var(--text-muted); font-size: 12px; line-height: 1.5;
        }
        .project-group {
            margin-bottom: 10px;
        }
        .project-title {
            min-height: 34px; padding: 6px 8px; display: flex; align-items: center; gap: 9px;
            color: var(--text-main); font-size: 14px; font-weight: 500;
        }
        .project-title i {
            width: 16px; color: var(--text-secondary); text-align: center;
        }
        .project-name {
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .session-row {
            min-height: 26px; border-radius: 5px; padding: 4px 6px;
            display: flex; align-items: center; gap: 6px;
            color: var(--text-secondary); cursor: pointer; font-size: 12px;
        }
        .session-row:hover { background: var(--bg-gray); color: var(--text-main); }
        .session-row {
            margin-left: 28px; align-items: center; flex-direction: row; gap: 8px;
            padding: 8px 10px; min-height: 38px; font-size: 14px;
        }
        .session-row.active { background: #eaeef2; color: var(--text-main); font-weight: 600; }
        .session-title { flex: 1; color: inherit; font-weight: inherit; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .session-meta {
            color: var(--text-muted); font-size: 13px; white-space: nowrap;
        }

        /* ================= 工作区 ================= */
        .workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tab-bar {
            height: 36px; background: var(--bg-white);
            display: flex; align-items: center;
            padding: 0 12px; border-bottom: 1px solid var(--border-color);
        }
        .tab {
            padding: 6px 14px; font-size: 13px;
            background: var(--bg-body); border: 1px solid var(--border-color);
            border-bottom: none; border-radius: 6px 6px 0 0;
            margin-right: 2px; cursor: pointer; color: var(--text-secondary);
            display: flex; align-items: center;
        }
        .tab.active { background: var(--bg-white); color: var(--text-main); border-top: 2px solid var(--accent-blue); font-weight: 500; }
        .tab i { margin-right: 6px; font-size: 12px; }
        .cwd-wrapper {
            display: flex; align-items: center; gap: 5px;
            background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 6px;
            padding: 0 8px; margin: 0 8px; min-width: 140px; max-width: 320px; height: 24px;
        }
        .cwd-wrapper:focus-within { border-color: var(--accent-blue); }
        .cwd-input {
            border: none; outline: none; background: transparent;
            font-size: 12px; color: var(--text-main);
            font-family: var(--font-mono); padding: 0; width: 100%; height: 100%;
        }
        .cwd-input::placeholder { color: var(--text-muted); }
        .cwd-browse-btn {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            padding: 2px 4px; font-size: 11px; border-radius: 4px; transition: all 0.15s;
            flex-shrink: 0; display: flex; align-items: center;
        }
        .cwd-browse-btn:hover { color: var(--accent-blue); background: var(--bg-gray); }
        .cwd-picker-overlay {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.4); justify-content: center; align-items: center;
        }
        .cwd-picker-overlay.open { display: flex; }
        .cwd-picker {
            width: 500px; max-height: 420px; background: var(--bg-white);
            border: 1px solid var(--border-color); border-radius: 10px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.18);
        }
        .cwd-picker-header {
            padding: 10px 14px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; font-weight: 600; color: var(--text-main);
            display: flex; justify-content: space-between; align-items: center;
        }
        .cwd-picker-breadcrumb {
            padding: 8px 14px; font-size: 12px; color: var(--text-secondary);
            border-bottom: 1px solid var(--border-light); background: var(--bg-gray);
            display: flex; align-items: center; gap: 2px; flex-wrap: wrap;
            font-family: var(--font-mono);
        }
        .cwd-picker-breadcrumb span { cursor: pointer; padding: 2px 5px; border-radius: 4px; transition: all 0.1s; }
        .cwd-picker-breadcrumb span:hover { background: var(--border-light); color: var(--accent-blue); }
        .cwd-picker-breadcrumb .sep { color: var(--text-muted); cursor: default; padding: 0 1px; }
        .cwd-picker-breadcrumb .sep:hover { background: none; color: var(--text-muted); }
        .cwd-picker-list {
            flex: 1; overflow-y: auto; padding: 6px 0; min-height: 180px;
        }
        .cwd-picker-item {
            padding: 7px 14px; font-size: 13px; color: var(--text-main);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: background 0.1s;
        }
        .cwd-picker-item:hover { background: var(--bg-gray); }
        .cwd-picker-item i { color: var(--accent-blue); font-size: 12px; width: 16px; text-align: center; }
        .cwd-history-label {
            font-size: 11px; color: var(--text-muted); padding: 8px 14px 4px;
            display: flex; align-items: center; gap: 6px;
        }
        .cwd-history-item i { color: var(--accent-orange) !important; }
        .cwd-history-path {
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
        }
        .cwd-picker-empty {
            padding: 30px 14px; text-align: center; color: var(--text-muted); font-size: 13px;
        }
        .cwd-picker-footer {
            padding: 10px 14px; border-top: 1px solid var(--border-light);
            display: flex; justify-content: flex-end;
        }
        .cwd-picker-select-btn {
            padding: 6px 16px; font-size: 13px; font-weight: 500;
            background: var(--accent-blue); color: white; border: none;
            border-radius: 6px; cursor: pointer; transition: background 0.15s;
        }
        .cwd-picker-select-btn:hover { background: #0757b5; }
        .tab-btn {
            font-size: 12px; padding: 4px 12px; border: 1px solid var(--border-color);
            border-radius: 6px; background: var(--bg-white); color: var(--text-secondary);
            cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center;
            transition: all 0.15s;
        }
        .tab-btn:hover { background: var(--bg-gray); color: var(--text-main); }

        /* ================= 主内容 ================= */
        .main-content { flex: 1; display: flex; overflow: hidden; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-body); scroll-behavior: smooth; }

        /* ================= 消息样式 ================= */
        .message { margin-bottom: 16px; max-width: 860px; margin-left: auto; margin-right: auto; width: 100%; }
        .msg-header {
            display: flex; align-items: center; margin-bottom: 6px;
            font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
        }
        .msg-header.agent { color: var(--accent-blue); }
        .msg-header.user { color: var(--accent-green); }
        .msg-header i { margin-right: 6px; }
        .msg-body {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            line-height: 1.7;
            font-size: 14px;
            color: var(--text-main);
        }
        .msg-body h1, .msg-body h2, .msg-body h3, .msg-body h4, .msg-body h5, .msg-body h6 {
            color: var(--text-main); margin: 16px 0 8px; font-weight: 600;
        }
        .msg-body h1 { font-size: 20px; border-bottom: 1px solid var(--border-light); padding-bottom: 6px; }
        .msg-body h2 { font-size: 17px; border-bottom: 1px solid var(--border-light); padding-bottom: 4px; }
        .msg-body h3 { font-size: 15px; }
        .msg-body h4 { font-size: 14px; }
        .msg-body p { margin: 6px 0; }
        .msg-body ul, .msg-body ol { margin: 6px 0 6px 22px; }
        .msg-body li { margin: 3px 0; }
        .msg-body strong { color: var(--text-main); font-weight: 600; }
        .msg-body em { color: var(--text-secondary); }
        .msg-body a { color: var(--accent-blue); text-decoration: none; }
        .msg-body a:hover { text-decoration: underline; }
        .msg-body blockquote {
            border-left: 3px solid var(--border-color);
            padding: 4px 12px; margin: 8px 0;
            color: var(--text-secondary); background: var(--bg-gray);
            border-radius: 0 4px 4px 0;
        }
        .msg-body code {
            background: #eff1f3; padding: 2px 6px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 13px; color: var(--accent-red);
        }
        .msg-body pre {
            background: var(--bg-gray); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 12px; margin: 8px 0;
            overflow-x: auto; font-family: var(--font-mono); font-size: 13px; line-height: 1.5;
        }
        .msg-body pre code { background: none; padding: 0; color: var(--text-main); }
        .msg-body table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .msg-body th, .msg-body td { border: 1px solid var(--border-color); padding: 6px 10px; font-size: 13px; text-align: left; }
        .msg-body th { background: var(--bg-gray); font-weight: 600; }
        .msg-body hr { border: none; border-top: 1px solid var(--border-light); margin: 12px 0; }

        /* ================= 工具调用 ================= */
        .tool-block {
            background: var(--bg-white); border: 1px solid var(--border-color);
            border-radius: 8px; margin: 10px 0; overflow: hidden;
        }
        .tool-header {
            background: var(--bg-gray); padding: 8px 12px; font-size: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .tool-header i { margin-right: 6px; color: var(--accent-green); }
        .tool-content { padding: 0; max-height: 300px; overflow-y: auto; }
        .tool-content pre { margin: 0 !important; border-radius: 0 !important; border: none !important; }

        /* ================= 终端 ================= */
        .terminal-output {
            background: #1b1b1b; color: #c9d1d9;
            font-family: var(--font-mono); padding: 10px; font-size: 12px;
        }
        .terminal-output .success { color: #3fb950; }
        .terminal-output .error { color: #f85149; }
        .terminal-output .path { color: #58a6ff; }

        /* ================= 底部输入栏 ================= */
        .input-area { padding: 10px 20px 8px; background: var(--bg-white); border-top: 1px solid var(--border-color); }
        .input-wrapper {
            max-width: 860px; margin: 0 auto; position: relative;
            background: var(--bg-white); border: 1px solid var(--border-color);
            border-radius: 8px; display: flex; align-items: flex-end;
            transition: border-color 0.15s;
        }
        .input-wrapper:focus-within { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(9,105,218,0.15); }
        textarea {
            width: 100%; background: transparent; border: none;
            color: var(--text-main); resize: none;
            font-family: var(--font-mono); font-size: 14px;
            padding: 12px; outline: none; max-height: 150px;
        }
        textarea::placeholder { color: var(--text-muted); }
        .input-actions { display: flex; padding: 8px; gap: 4px; }
        .action-btn {
            width: 32px; height: 32px; border-radius: 6px;
            border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .action-btn:hover { background: var(--bg-gray); color: var(--text-main); }
        .action-btn.send { background: var(--accent-blue); color: white; }
        .action-btn.send:hover { background: #0757b5; }

        /* ================= 工具栏 ================= */
        .input-toolbar {
            max-width: 860px; margin: 6px auto 0;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .toolbar-select {
            background: var(--bg-white); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 6px;
            padding: 4px 24px 4px 8px; font-size: 12px;
            outline: none; cursor: pointer; appearance: auto;
        }
        .toolbar-select:focus { border-color: var(--accent-blue); }
        .toolbar-sep { width: 1px; height: 18px; background: var(--border-color); flex-shrink: 0; }
        .mode-btns { display: flex; gap: 3px; }
        .mode-btn {
            padding: 3px 12px; font-size: 12px; font-weight: 500;
            border: 1px solid var(--border-color); border-radius: 6px;
            background: var(--bg-white); color: var(--text-secondary);
            cursor: pointer; transition: all 0.15s;
        }
        .mode-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .mode-btn.active { background: #ddf4ff; border-color: var(--accent-blue); color: var(--accent-blue); }

        /* ================= 右侧面板 ================= */
        .right-panel {
            width: 320px; background: var(--bg-white);
            border-left: 1px solid var(--border-color);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .panel-header {
            padding: 10px 14px; border-bottom: 1px solid var(--border-color);
            font-size: 12px; font-weight: 600; color: var(--text-secondary);
            display: flex; justify-content: space-between; align-items: center;
        }
        .panel-content { flex: 1; overflow-y: auto; padding: 10px; }
        .confirm-msg {
            max-width: 860px; margin: 0 auto 16px; width: 100%;
        }
        .ai-status-card {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-secondary);
        }
        .ai-status-icon {
            width: 26px; height: 26px; border-radius: 50%;
            background: #ddf4ff; color: var(--accent-blue);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .ai-status-main { flex: 1; min-width: 0; }
        .ai-status-title {
            color: var(--text-main); font-weight: 600; font-size: 14px; margin-bottom: 2px;
        }
        .ai-status-sub {
            font-size: 12px; color: var(--text-muted);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .ai-status-dots span {
            display: inline-block; animation: blink 1.4s infinite; opacity: 0.25;
        }
        .ai-status-dots span:nth-child(2) { animation-delay: 0.2s; }
        .ai-status-dots span:nth-child(3) { animation-delay: 0.4s; }
        .confirm-msg-body {
            background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
            padding: 14px 16px;
        }
        .confirm-msg-title {
            font-size: 13px; font-weight: 600; color: var(--accent-orange); margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .confirm-msg-name { font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }
        .confirm-msg-args {
            font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono);
            background: var(--bg-white); border: 1px solid var(--border-light); border-radius: 6px;
            padding: 8px 10px; max-height: 100px; overflow-y: auto; white-space: pre-wrap; margin-bottom: 10px;
        }
        .confirm-msg-btns { display: flex; gap: 8px; }
        .confirm-btn {
            flex: 1; padding: 6px 0; font-size: 12px; font-weight: 500;
            border: 1px solid var(--border-color); border-radius: 6px;
            cursor: pointer; transition: all 0.15s;
        }
        .confirm-btn-approve { background: var(--accent-green); color: white; border-color: var(--accent-green); }
        .confirm-btn-approve:hover { background: #156d30; }
        .confirm-btn-reject { background: var(--bg-white); color: var(--text-secondary); }
        .confirm-btn-reject:hover { background: #fef2f2; color: var(--accent-red); border-color: var(--accent-red); }
        .confirm-btn-approveAll { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        .confirm-btn-approveAll:hover { background: #0757b5; }
        .tool-item {
            padding: 8px 12px; border-bottom: 1px solid var(--border-light);
            font-size: 12px;
        }
        .tool-item-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
        .tool-item-name { font-weight: 600; color: var(--text-main); }
        .tool-item-status { font-size: 11px; margin-left: auto; }
        .tool-item-status.running { color: var(--accent-blue); }
        .tool-item-status.done { color: var(--accent-green); }
        .tool-item-status.rejected { color: var(--accent-red); }
        .tool-item-status.confirming { color: var(--accent-orange); }
        .tool-item-args {
            font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);
            white-space: pre-wrap; max-height: 60px; overflow-y: auto;
        }

        /* ================= 动画 ================= */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        .status-indicator {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--accent-orange); font-weight: 500;
            padding: 0 10px; margin-left: 8px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-orange);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.25; }
            40% { opacity: 1; }
        }
        @media (max-width: 1024px) { .right-panel { display: none; } }
        @media (max-width: 768px) {
            .sidebar { width: 0; display: none; }
        }

        /* ================= 优化交互与移动端 ================= */
        button:disabled, select:disabled, input:disabled, textarea:disabled {
            cursor: not-allowed;
        }
        .workspace { min-width: 0; }
        .sidebar-header-actions { display: flex; align-items: center; gap: 4px; }
        .sidebar-search {
            padding: 8px 8px 6px;
            border-bottom: 1px solid var(--border-light);
        }
        .sidebar-search input {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 7px 9px;
            font-size: 12px;
            outline: none;
            color: var(--text-main);
            background: var(--bg-white);
        }
        .sidebar-search input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(9,105,218,0.12); }
        .project-title { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.2px; }
        .session-row { position: relative; }
        .session-row:hover .session-actions, .session-row:focus-within .session-actions { opacity: 1; pointer-events: auto; }
        .session-actions {
            display: flex; align-items: center; gap: 2px;
            opacity: 0; pointer-events: none; transition: opacity 0.12s;
        }
        .session-action-btn {
            width: 24px; height: 24px; border: none; border-radius: 5px;
            background: transparent; color: var(--text-muted); cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .session-action-btn:hover { background: var(--border-light); color: var(--text-main); }
        .session-action-btn.delete:hover { color: var(--accent-red); background: #fff1f1; }
        .top-actions { display:flex; align-items:center; gap:6px; padding-right:4px; }
        .cwd-wrapper.dirty { border-color: var(--accent-orange); background: #fff8dc; }
        .cwd-apply-btn {
            background: transparent; border: none; color: var(--accent-green); cursor: pointer;
            display: none; align-items: center; justify-content: center;
            width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0;
        }
        .cwd-wrapper.dirty .cwd-apply-btn { display: flex; }
        .cwd-apply-btn:hover { background: rgba(26,127,55,0.12); }
        .mobile-panel-bar {
            display: none;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            padding: 6px 8px;
            gap: 6px;
        }
        .mobile-panel-btn {
            flex: 1; border: 1px solid var(--border-color); border-radius: 6px;
            background: var(--bg-white); color: var(--text-secondary);
            font-size: 12px; padding: 7px 4px; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; gap: 5px;
        }
        .mobile-panel-btn:hover { color: var(--accent-blue); border-color: var(--accent-blue); }
        .mobile-close { display: none; }
        .mobile-overlay {
            display: none; position: fixed; inset: 0; z-index: 900;
            background: rgba(36,41,47,0.38);
        }
        .mobile-overlay.open { display: block; }
        .chat-panel { position: relative; }
        .new-messages-btn {
            display: none; position: absolute; right: 22px; bottom: 118px; z-index: 20;
            border: 1px solid var(--border-color); border-radius: 999px;
            background: var(--bg-white); color: var(--accent-blue);
            font-size: 12px; font-weight: 600; padding: 7px 12px;
            box-shadow: 0 8px 22px rgba(31,35,40,0.12); cursor: pointer;
        }
        .new-messages-btn.show { display: inline-flex; align-items: center; gap: 6px; }
        .message.user { display: flex; flex-direction: column; align-items: flex-end; }
        .message.user .msg-header { color: var(--accent-green); justify-content: flex-end; }
        .message.user .msg-body {
            max-width: min(720px, 78%);
            background: #f0fff4;
            border-color: #b7eac8;
        }
        .message.agent .msg-body { box-shadow: 0 1px 0 rgba(31,35,40,0.02); }
        .msg-body img { max-width: 100%; border-radius: 6px; }
        .msg-body pre { position: relative; }
        .msg-body table { display: block; overflow-x: auto; }
        .action-btn.stop { background: var(--accent-red); color: white; display: none; }
        .action-btn.stop:hover { background: #a40e26; color: white; }
        .input-area.processing .action-btn.send { display: none; }
        .input-area.processing .action-btn.stop { display: flex; }
        .input-area.processing textarea, .input-area.processing .attach-btn {
            opacity: 0.58;
        }
        .attachment-strip {
            max-width: 860px; margin: 6px auto 0;
            display: none; flex-wrap: wrap; gap: 6px;
        }
        .attachment-strip.has-items { display: flex; }
        .attachment-chip {
            display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid var(--border-color); border-radius: 999px;
            background: var(--bg-gray); color: var(--text-secondary);
            font-size: 12px; padding: 4px 8px;
        }
        .attachment-chip button {
            border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; width: 16px; height: 16px; display: inline-flex;
            align-items: center; justify-content: center;
        }
        .toolbar-spacer { flex: 1; }
        .tool-item-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; }
        .tool-mini-btn {
            border: none; border-radius: 4px; background: transparent; color: var(--text-muted);
            width: 22px; height: 22px; cursor: pointer;
        }
        .tool-mini-btn:hover { background: var(--border-light); color: var(--text-main); }
        .tool-item.expanded .tool-item-args { max-height: 220px; }
        .panel-empty, .status-line {
            color: var(--text-muted); font-size: 12px; line-height: 1.5; padding: 4px;
        }
        .quick-action {
            border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-white);
            color: var(--text-secondary); cursor: pointer; font-size: 12px; padding: 4px 8px;
        }
        .quick-action:hover { color: var(--accent-blue); border-color: var(--accent-blue); }

        @media (max-width: 1024px) {
            .right-panel {
                display: flex;
                position: fixed; top: 0; right: -340px; bottom: 0; z-index: 1000;
                width: min(340px, 92vw);
                box-shadow: -12px 0 32px rgba(31,35,40,0.18);
                transition: right 0.18s ease;
            }
            .right-panel.open { right: 0; }
            .mobile-panel-bar { display: flex; }
            .mobile-close { display: inline-flex; }
        }
        @media (max-width: 768px) {
            body { min-width: 0; }
            .sidebar {
                display: flex; width: min(320px, 88vw);
                position: fixed; top: 0; left: -330px; bottom: 0; z-index: 1000;
                box-shadow: 12px 0 32px rgba(31,35,40,0.18);
                transition: left 0.18s ease;
            }
            .sidebar.open { left: 0; }
            .tab-bar {
                min-height: 42px; height: auto; flex-wrap: wrap; gap: 6px;
                padding: 6px 8px;
            }
            .tab { display: none; }
            .cwd-wrapper { order: 3; width: 100%; max-width: none; margin: 0; height: 30px; }
            .top-actions { margin-left: auto; }
            .tab-btn { padding: 6px 9px; }
            .messages-container { padding: 14px 10px; }
            .message { margin-bottom: 12px; }
            .message.user .msg-body { max-width: 92%; }
            .input-area { padding: 8px 10px; }
            .input-wrapper, .input-toolbar, .attachment-strip { max-width: none; }
            .input-toolbar { gap: 6px; }
            .toolbar-select { max-width: 145px; }
            .mode-btn { padding: 4px 9px; }
            .cwd-picker { width: calc(100vw - 24px); max-height: calc(100vh - 44px); }
            .new-messages-btn { right: 12px; bottom: 132px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <span>会话</span>
        <div class="sidebar-header-actions">
            <button class="sidebar-action" title="新对话" onclick="newSession()" data-lockable><i class="fas fa-plus"></i></button>
            <button class="sidebar-action" title="刷新" onclick="refreshSidebar()"><i class="fas fa-rotate"></i></button>
        </div>
    </div>
    <div class="sidebar-search">
        <input type="search" id="sessionSearch" placeholder="搜索会话或项目">
    </div>
    <div class="sidebar-section sessions">
        <div class="sidebar-list" id="sessionList">
            <div class="sidebar-empty">暂无会话</div>
        </div>
    </div>
</div>

<div class="workspace">
    <div class="tab-bar">
        <div class="tab active"><i class="fas fa-robot"></i> Agent Chat</div>
        <div id="statusIndicator" class="status-indicator" style="display:none;">
            <span class="status-dot"></span>执行中
        </div>
        <div style="flex:1;"></div>
        <div class="cwd-wrapper">
            <i class="fas fa-folder-open" style="font-size:11px; color:var(--text-muted);"></i>
            <input type="text" id="cwdInput" class="cwd-input" placeholder="工作目录" title="当前工作目录" />
            <button class="cwd-apply-btn" title="应用目录" onclick="setCwd()" data-lockable><i class="fas fa-check"></i></button>
            <button class="cwd-browse-btn" title="选择目录" onclick="openCwdPicker()" data-lockable><i class="fas fa-folder-tree"></i></button>
        </div>
        <div class="top-actions">
            <button class="tab-btn" title="新对话" onclick="newSession()" data-lockable>
                <i class="fas fa-plus" style="margin-right:4px;"></i>新对话
            </button>
            <button class="tab-btn" title="清空当前会话" onclick="clearCurrentSession()" data-lockable>
                <i class="fas fa-broom" style="margin-right:4px;"></i>清空
            </button>
            <button class="action-btn" title="退出登录" onclick="logout()" style="font-size:12px; padding:4px 10px; border:1px solid var(--border-color); border-radius:6px; color:var(--accent-red);">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>
    <div class="mobile-panel-bar">
        <button class="mobile-panel-btn" onclick="openMobilePanel('sessions')"><i class="fas fa-list"></i>会话</button>
        <button class="mobile-panel-btn" onclick="openMobilePanel('tools')"><i class="fas fa-wrench"></i>工具</button>
        <button class="mobile-panel-btn" onclick="openMobilePanel('logs')"><i class="fas fa-clock-rotate-left"></i>日志</button>
    </div>

    <div class="main-content">
        <div class="chat-panel">
            <div class="messages-container" id="messagesContainer">
                <div class="message welcome-msg">
                    <div class="msg-header agent"><i class="fas fa-robot"></i> Code Agent</div>
                    <div class="msg-body">
                        你好！我是你的编程助手。我可以帮你：
                        <ul style="margin: 8px 0 0 20px;">
                            <li>编写和修改代码</li>
                            <li>运行脚本并调试</li>
                            <li>分析报错信息</li>
                            <li>管理项目文件</li>
                        </ul>
                        <p style="margin-top: 10px;">请告诉我你的需求，例如：<em>"帮我写一个 Python 爬虫并运行测试"</em></p>
                    </div>
                </div>
            </div>
            <button id="newMessagesBtn" class="new-messages-btn" onclick="jumpToLatest()"><i class="fas fa-arrow-down"></i>新回复</button>

            <div class="input-area">
                <div id="attachmentStrip" class="attachment-strip"></div>
                <div class="input-wrapper">
                    <textarea id="userInput" rows="1" placeholder="输入代码需求... (Enter 发送, Shift+Enter 换行)"></textarea>
                    <div class="input-actions">
                        <button class="action-btn attach-btn" title="附加文件内容" onclick="openFilePicker()"><i class="fas fa-paperclip"></i></button>
                        <button class="action-btn send" title="发送" onclick="sendMessage()"><i class="fas fa-arrow-up"></i></button>
                        <button class="action-btn stop" title="停止生成" onclick="stopGeneration()"><i class="fas fa-stop"></i></button>
                    </div>
                </div>
                <input type="file" id="fileInput" multiple style="display:none;">
                <div class="input-toolbar">
                    <select id="modelSelect" class="toolbar-select" onchange="switchModel()"></select>
                    <div class="toolbar-sep"></div>
                    <div class="mode-btns">
                        <button class="mode-btn" onclick="setAgentMode('plan')" id="mode-plan" data-lockable>Plan</button>
                        <button class="mode-btn" onclick="setAgentMode('auto')" id="mode-auto" data-lockable>Auto</button>
                        <button class="mode-btn active" onclick="setAgentMode('confirm')" id="mode-confirm" data-lockable>Confirm</button>
                    </div>
                    <div class="toolbar-spacer"></div>
                    <span id="modelStatus" style="font-size:11px; color:var(--text-muted);"></span>
                </div>
            </div>
        </div>

        <div class="right-panel" id="rightPanel">
            <div class="panel-header">
                <span><i class="fas fa-terminal" style="margin-right:6px;"></i>终端 & 输出</span>
                <button class="sidebar-action mobile-close" title="关闭" onclick="closeMobilePanels()"><i class="fas fa-times"></i></button>
            </div>
            <div class="panel-content" id="terminalPanel">
                <div class="terminal-output">
                    <div><span class="path">~/project</span> $ <span style="color:#8b949e">等待命令...</span></div>
                </div>
            </div>
            <div class="panel-header" style="border-top: 1px solid var(--border-color);">
                <span><i class="fas fa-wrench" style="margin-right:6px;"></i>工具调用</span>
                <span id="toolCount" style="font-size:11px; color:var(--text-muted);">0</span>
            </div>
            <div class="panel-content" id="toolPanel" style="padding:0;">
                <div id="toolLog"></div>
                <div id="toolLogEmpty" style="font-size:12px; color:var(--text-muted); padding:10px;">暂无工具调用</div>
            </div>
            <div class="panel-header" style="border-top: 1px solid var(--border-color);">
                <span><i class="fas fa-clock-rotate-left" style="margin-right:6px;"></i>操作日志</span>
            </div>
            <div class="panel-content" id="agentLog">
                <div style="font-size:12px; color:var(--text-muted); padding:4px;">暂无操作记录</div>
            </div>
        </div>
    </div>
</div>
<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobilePanels()"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>

<script>
    var token = localStorage.getItem('fish_token') || '';
    var messagesContainer = document.getElementById('messagesContainer');
    var userInput = document.getElementById('userInput');
    var terminalPanel = document.getElementById('terminalPanel');
    var agentLog = document.getElementById('agentLog');
    var sessionSearch = document.getElementById('sessionSearch');
    var newMessagesBtn = document.getElementById('newMessagesBtn');
    var attachmentStrip = document.getElementById('attachmentStrip');
    var fileInput = document.getElementById('fileInput');
    var cwdInput = document.getElementById('cwdInput');

    var isProcessing = false;
    var currentMode = 'confirm';
    var modelsCache = [];
    var selectedModel = '';
    var currentCwd = '';
    var toolCallCount = 0;
    var currentSessionId = '';
    var pickerCurrentPath = '';
    var sessionSearchTerm = '';
    var currentAbortController = null;
    var stopRequestedByUser = false;
    var shouldStickToBottom = true;
    var pendingAttachments = [];

    function authFetch(url, opts) {
        opts = opts || {};
        opts.headers = opts.headers || {};
        opts.credentials = 'same-origin';
        if (token) opts.headers['Authorization'] = 'Bearer ' + token;
        if (opts.body && !(opts.body instanceof FormData) && !opts.headers['Content-Type']) {
            opts.headers['Content-Type'] = 'application/json';
        }
        return fetch(url, opts).then(function (r) {
            if (r.status === 401) {
                localStorage.removeItem('fish_token');
                window.location.href = '/';
                throw new Error('登录已过期');
            }
            return r;
        });
    }

    function fetchJson(url, opts) {
        return authFetch(url, opts).then(function (r) {
            return r.text().then(function (text) {
                var data = text ? JSON.parse(text) : {};
                if (!r.ok) throw new Error(data.error || data.message || ('HTTP ' + r.status));
                return data;
            });
        });
    }

    function logout() {
        authFetch('/logout', { method: 'POST' }).catch(function () {});
        localStorage.removeItem('fish_token');
        window.location.href = '/';
    }

    function initApp() {
        configureMarkdown();
        wireEvents();
        resetRuntimePanels();
        fetchJson('/mode').then(function (d) {
            if (d.mode) activateMode(d.mode);
        }).catch(function () {});
        loadModels();
        loadCwd();
        loadSessions();
    }

    function wireEvents() {
        userInput.addEventListener('input', autoResizeInput);
        userInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        cwdInput.addEventListener('input', markCwdDirty);
        cwdInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); setCwd(); }
            if (e.key === 'Escape') { this.value = currentCwd; markCwdClean(); this.blur(); }
        });
        sessionSearch.addEventListener('input', function () {
            sessionSearchTerm = this.value.trim().toLowerCase();
            loadSessions();
        });
        fileInput.addEventListener('change', handleFilesSelected);
        messagesContainer.addEventListener('scroll', function () {
            shouldStickToBottom = isNearBottom();
            if (shouldStickToBottom) newMessagesBtn.classList.remove('show');
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                if (document.getElementById('cwdPickerOverlay').classList.contains('open')) closeCwdPicker();
                closeMobilePanels();
            }
        });
    }

    function autoResizeInput() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    }

    function markCwdDirty() {
        var dirty = cwdInput.value.trim() !== currentCwd;
        document.querySelector('.cwd-wrapper').classList.toggle('dirty', dirty);
    }

    function markCwdClean() {
        document.querySelector('.cwd-wrapper').classList.remove('dirty');
    }

    function getCwdHistory() {
        try { return JSON.parse(localStorage.getItem('fish_cwd_history') || '[]'); } catch (e) { return []; }
    }

    function saveCwdToHistory(cwd) {
        if (!cwd) return;
        var history = getCwdHistory().filter(function (h) { return h !== cwd; });
        history.unshift(cwd);
        if (history.length > 10) history = history.slice(0, 10);
        localStorage.setItem('fish_cwd_history', JSON.stringify(history));
    }

    function getLastCwd() {
        return localStorage.getItem('fish_cwd_last') || '';
    }

    function saveLastCwd(cwd) {
        if (cwd) localStorage.setItem('fish_cwd_last', cwd);
    }

    function loadCwd() {
        var saved = getLastCwd();
        if (saved) {
            currentCwd = saved;
            cwdInput.value = currentCwd;
            fetchJson('/cwd', { method: 'POST', body: JSON.stringify({ cwd: currentCwd }) })
                .then(function (d) {
                    if (d.cwd) {
                        currentCwd = d.cwd;
                        cwdInput.value = currentCwd;
                        markCwdClean();
                        loadSessions();
                    }
                }).catch(function () {
                    loadServerCwd();
                });
            return;
        }
        loadServerCwd();
    }

    function loadServerCwd() {
        fetchJson('/cwd').then(function (d) {
            currentCwd = d.cwd || '';
            cwdInput.value = currentCwd;
            markCwdClean();
            saveLastCwd(currentCwd);
            loadSessions();
        }).catch(function (err) {
            addAgentLog('目录读取失败', err.message, 'error');
        });
    }

    function setCwd() {
        if (isProcessing) return;
        var newCwd = cwdInput.value.trim();
        if (!newCwd || newCwd === currentCwd) {
            cwdInput.value = currentCwd;
            markCwdClean();
            return;
        }
        fetchJson('/cwd', { method: 'POST', body: JSON.stringify({ cwd: newCwd }) })
            .then(function (d) {
                currentCwd = d.cwd;
                cwdInput.value = currentCwd;
                markCwdClean();
                saveLastCwd(currentCwd);
                saveCwdToHistory(currentCwd);
                addAgentLog('工作目录', currentCwd, 'success');
                loadSessions();
            })
            .catch(function (err) {
                addAgentLog('目录切换失败', err.message, 'error');
                cwdInput.value = currentCwd;
                markCwdClean();
            });
    }

    function loadModels() {
        fetchJson('/config').then(function (d) {
            var sel = document.getElementById('modelSelect');
            sel.innerHTML = '';
            var models = d.models || [];
            modelsCache = models;
            models.forEach(function (m) {
                var opt = document.createElement('option');
                opt.value = m.value || '';
                opt.textContent = m.label || m.value || 'unknown';
                if (m.value === d.model) opt.selected = true;
                sel.appendChild(opt);
            });
            if (models.length === 0) {
                var opt = document.createElement('option');
                opt.value = d.model || '';
                opt.textContent = d.model || 'unknown';
                opt.selected = true;
                sel.appendChild(opt);
                modelsCache = [{ value: d.model, label: d.model || 'unknown' }];
            }
            selectedModel = sel.value || d.model || '';
            document.getElementById('modelStatus').textContent = selectedModel;
        }).catch(function (err) {
            addAgentLog('模型读取失败', err.message, 'error');
        });
    }

    function refreshSidebar() {
        loadSessions();
    }

    function loadSessions() {
        fetchJson('/sessions').then(function (d) {
            currentSessionId = d.currentSessionId || currentSessionId || '';
            renderSessions(d.sessions || []);
        }).catch(function () {});
    }

    function renderSessions(sessions) {
        var list = document.getElementById('sessionList');
        var filtered = sessions.filter(function (s) {
            if (!sessionSearchTerm) return true;
            var haystack = ((s.title || '') + ' ' + (s.cwd || '') + ' ' + (s.id || '')).toLowerCase();
            return haystack.indexOf(sessionSearchTerm) !== -1;
        });
        if (!filtered.length) {
            list.innerHTML = '<div class="sidebar-empty">' + (sessionSearchTerm ? '没有匹配的会话' : '暂无会话') + '</div>';
            return;
        }
        list.innerHTML = '';
        groupSessionsByProject(filtered).forEach(function (group) {
            var wrap = document.createElement('div');
            wrap.className = 'project-group';
            var title = document.createElement('div');
            title.className = 'project-title';
            title.title = group.cwd;
            title.innerHTML = '<i class="far fa-folder"></i><span class="project-name">' + escapeHtml(group.name) + '</span>';
            wrap.appendChild(title);
            group.sessions.forEach(function (s) {
                wrap.appendChild(createSessionRow(s));
            });
            list.appendChild(wrap);
        });
    }

    function createSessionRow(s) {
        var row = document.createElement('div');
        row.className = 'session-row' + (s.id === currentSessionId ? ' active' : '');
        row.tabIndex = 0;
        row.title = (s.title || s.id) + (s.cwd ? '\n' + s.cwd : '');
        row.onclick = function () { resumeSession(s.id, s.title || '新会话', s.cwd || ''); };
        row.onkeydown = function (e) {
            if (e.key === 'Enter') resumeSession(s.id, s.title || '新会话', s.cwd || '');
        };

        var title = document.createElement('div');
        title.className = 'session-title';
        title.textContent = s.title || '新会话';
        row.appendChild(title);

        var meta = document.createElement('div');
        meta.className = 'session-meta';
        meta.textContent = formatSessionTime(s.updatedAt);
        row.appendChild(meta);

        var actions = document.createElement('div');
        actions.className = 'session-actions';
        actions.appendChild(makeSessionAction('fa-pen', '重命名', function (e) {
            e.stopPropagation();
            renameSession(s.id, s.title || '新会话');
        }));
        actions.appendChild(makeSessionAction('fa-trash', '删除', function (e) {
            e.stopPropagation();
            deleteSession(s.id, s.title || '新会话');
        }, 'delete'));
        row.appendChild(actions);
        return row;
    }

    function makeSessionAction(icon, title, handler, extraClass) {
        var btn = document.createElement('button');
        btn.className = 'session-action-btn' + (extraClass ? ' ' + extraClass : '');
        btn.title = title;
        btn.innerHTML = '<i class="fas ' + icon + '"></i>';
        btn.onclick = handler;
        return btn;
    }

    function groupSessionsByProject(sessions) {
        var byCwd = {};
        sessions.forEach(function (s) {
            var cwd = s.cwd || currentCwd || '';
            if (!byCwd[cwd]) byCwd[cwd] = { cwd: cwd, name: projectName(cwd), sessions: [] };
            byCwd[cwd].sessions.push(s);
        });
        return Object.keys(byCwd).map(function (k) { return byCwd[k]; });
    }

    function projectName(cwd) {
        if (!cwd) return '未命名项目';
        var parts = cwd.split(/[\\/]/).filter(Boolean);
        return parts.length ? parts[parts.length - 1] : cwd;
    }

    function resumeSession(sessionId, title, cwd) {
        if (!sessionId) return;
        if (isProcessing) {
            addAgentLog('暂不能切换', 'Agent 执行中', 'info');
            return;
        }
        fetchJson('/sessions', { method: 'POST', body: JSON.stringify({ action: 'resume', sessionId: sessionId, cwd: cwd || '' }) })
            .then(function (d) {
                currentSessionId = sessionId;
                if (d.cwd) {
                    currentCwd = d.cwd;
                    cwdInput.value = currentCwd;
                    markCwdClean();
                    saveLastCwd(currentCwd);
                    saveCwdToHistory(currentCwd);
                }
                resetRuntimePanels();
                renderHistoryMessages(d.messages || []);
                addAgentLog('恢复会话', title, 'success');
                closeMobilePanels();
                loadSessions();
            })
            .catch(function (err) {
                addAgentLog('恢复失败', err.message, 'error');
            });
    }

    function renderHistoryMessages(messages) {
        messagesContainer.innerHTML = '';
        var rendered = 0;
        messages.forEach(function (msg) {
            var role = msg.role || '';
            if (role === 'system' || role === 'tool') return;
            var content = msg.content;
            if ((!content || content === 'null') && msg.tool_calls) {
                addHistoryToolCalls(msg.tool_calls);
                rendered++;
                return;
            }
            if (!content) return;
            addMessage(role === 'user' ? 'user' : 'agent', content, true);
            rendered++;
        });
        if (rendered === 0) {
            messagesContainer.innerHTML = '<div class="message agent welcome-msg"><div class="msg-header agent"><i class="fas fa-robot"></i> Code Agent</div>' +
                '<div class="msg-body">这个会话暂无可展示的历史消息。</div></div>';
        }
        jumpToLatest();
    }

    function addHistoryToolCalls(toolCalls) {
        if (!toolCalls || !toolCalls.length) return;
        for (var i = 0; i < toolCalls.length; i++) {
            var tc = toolCalls[i];
            var fn = tc.function || {};
            addToolToPanel(fn.name || 'tool_call', fn.arguments || '', 'done');
        }
    }

    function formatSessionTime(ms) {
        if (!ms) return '未知时间';
        var d = new Date(ms);
        var now = new Date();
        var sameDay = d.toDateString() === now.toDateString();
        var hh = String(d.getHours()).padStart(2, '0');
        var mm = String(d.getMinutes()).padStart(2, '0');
        if (sameDay) return hh + ':' + mm;
        return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + hh + ':' + mm;
    }

    function sendMessage() {
        var text = composeOutgoingMessage();
        if (!text || isProcessing) return;
        isProcessing = true;
        stopRequestedByUser = false;
        currentAbortController = window.AbortController ? new AbortController() : null;
        setProcessingUI(true);
        addMessage('user', text, true);
        userInput.value = '';
        userInput.style.height = 'auto';
        clearAttachments();
        resetRuntimePanels('正在连接模型...');
        hideConfirmPanel();

        var loader = addThinkingMessage('AI 正在思考', '分析需求，准备执行...');
        var msgDiv = null;
        var contentDiv = null;
        var gotFirstToken = false;
        var chatPayload = { message: text, stream: true };
        if (selectedModel) chatPayload.model = selectedModel;
        if (currentCwd) chatPayload.cwd = currentCwd;

        var fetchOpts = { method: 'POST', body: JSON.stringify(chatPayload) };
        if (currentAbortController) fetchOpts.signal = currentAbortController.signal;

        authFetch('/chat', fetchOpts)
            .then(function (r) {
                if (!r.ok) return r.text().then(function (t) { throw new Error('HTTP ' + r.status + ': ' + t); });
                var reader = r.body.getReader();
                var decoder = new TextDecoder();
                var buf = '';
                function process() {
                    return reader.read().then(function (res) {
                        if (res.done) return;
                        buf += decoder.decode(res.value, { stream: true });
                        var lines = buf.split('\n');
                        buf = lines.pop();
                        for (var i = 0; i < lines.length; i++) {
                            var ln = lines[i].trim();
                            if (!ln.startsWith('data: ')) continue;
                            var js = ln.substring(6);
                            if (js === '[END]' || !js) continue;
                            try {
                                var evt = JSON.parse(js);
                                if (evt.type === 'token') {
                                    if (!gotFirstToken) {
                                        gotFirstToken = true;
                                        updateThinkingMessage('AI 正在回复', '正在生成回答...');
                                        msgDiv = createAssistantMsg();
                                        contentDiv = msgDiv.querySelector('.msg-body');
                                    }
                                    appendStreamToken(contentDiv, evt.content);
                                    scrollToBottom(false);
                                } else if (evt.type === 'tool_call') {
                                    updateThinkingMessage(toolStatusTitle(evt.status), evt.name || '工具调用中');
                                    addToolToPanel(evt.name || 'tool_call', evt.args || '', evt.status || 'running');
                                    addAgentLog(evt.status === 'done' ? '完成' : '执行中', evt.name || '工具调用', evt.status === 'done' ? 'success' : 'info');
                                } else if (evt.type === 'confirm_required') {
                                    updateThinkingMessage('等待你的确认', evt.name || '工具调用需要确认');
                                    showConfirmPanel(evt.confirmKey, evt.name || '工具调用', evt.args || '');
                                } else if (evt.type === 'done') {
                                    removeThinkingMessage(loader);
                                    if (!msgDiv && evt.reply) {
                                        msgDiv = createAssistantMsg();
                                        contentDiv = msgDiv.querySelector('.msg-body');
                                        contentDiv.setAttribute('data-raw', evt.reply);
                                    }
                                    if (msgDiv && contentDiv) {
                                        flushStreamRender(contentDiv);
                                        addReplyMeta(msgDiv, evt.durationMs, evt.mode);
                                    }
                                    addAgentLog('完成', (evt.durationMs || 0) + 'ms', 'success');
                                    if (evt.sessionId) currentSessionId = evt.sessionId;
                                    loadSessions();
                                } else if (evt.type === 'error') {
                                    removeThinkingMessage(loader);
                                    if (!msgDiv) {
                                        msgDiv = createAssistantMsg();
                                        contentDiv = msgDiv.querySelector('.msg-body');
                                    }
                                    appendError(contentDiv, evt.error || '未知错误');
                                    addAgentLog('错误', evt.error || '未知错误', 'error');
                                }
                            } catch (e) {}
                        }
                        return process();
                    });
                }
                return process();
            })
            .then(function () {
                finishProcessing();
            })
            .catch(function (err) {
                removeThinkingMessage(loader);
                if (stopRequestedByUser || err.name === 'AbortError') {
                    addMessage('agent', '已停止当前回复。', false);
                    addAgentLog('已停止', '当前回复已取消', 'info');
                } else {
                    var msg = createAssistantMsg();
                    appendError(msg.querySelector('.msg-body'), '网络错误: ' + err.message);
                    addAgentLog('网络错误', err.message, 'error');
                }
                finishProcessing();
            });
    }

    function stopGeneration() {
        if (!isProcessing) return;
        stopRequestedByUser = true;
        updateThinkingMessage('正在停止', '正在取消当前请求...');
        authFetch('/cancel', { method: 'POST' }).catch(function () {});
        if (currentAbortController) currentAbortController.abort();
    }

    function finishProcessing() {
        isProcessing = false;
        currentAbortController = null;
        setProcessingUI(false);
    }

    function composeOutgoingMessage() {
        var text = userInput.value.trim();
        if (!pendingAttachments.length) return text;
        var blocks = pendingAttachments.map(function (file) {
            return '\n\n附件：' + file.name + '\n```' + file.lang + '\n' + file.content + '\n```';
        }).join('');
        return (text || '请阅读这些附件内容。') + blocks;
    }

    function openFilePicker() {
        if (isProcessing) return;
        fileInput.click();
    }

    function handleFilesSelected() {
        var files = Array.prototype.slice.call(fileInput.files || []);
        fileInput.value = '';
        if (!files.length) return;
        var remainingSlots = Math.max(0, 5 - pendingAttachments.length);
        files = files.slice(0, remainingSlots);
        if (!files.length) {
            addAgentLog('附件已满', '最多同时附加 5 个文件', 'error');
            return;
        }
        Promise.all(files.map(readTextAttachment)).then(function (items) {
            items.forEach(function (item) {
                if (item) pendingAttachments.push(item);
            });
            renderAttachmentStrip();
        });
    }

    function readTextAttachment(file) {
        return new Promise(function (resolve) {
            if (file.size > 200000) {
                addAgentLog('附件过大', file.name + ' 超过 200KB', 'error');
                resolve(null);
                return;
            }
            var reader = new FileReader();
            reader.onload = function () {
                resolve({
                    name: file.name,
                    size: file.size,
                    lang: languageForFile(file.name),
                    content: String(reader.result || '')
                });
                addAgentLog('已附加文件', file.name, 'success');
            };
            reader.onerror = function () {
                addAgentLog('读取失败', file.name, 'error');
                resolve(null);
            };
            reader.readAsText(file);
        });
    }

    function languageForFile(name) {
        var ext = (name.split('.').pop() || '').toLowerCase();
        var map = { js: 'javascript', ts: 'typescript', java: 'java', py: 'python', html: 'html', css: 'css', json: 'json', md: 'markdown', xml: 'xml', yml: 'yaml', yaml: 'yaml', sh: 'bash' };
        return map[ext] || ext || 'text';
    }

    function renderAttachmentStrip() {
        attachmentStrip.innerHTML = '';
        attachmentStrip.classList.toggle('has-items', pendingAttachments.length > 0);
        pendingAttachments.forEach(function (file, index) {
            var chip = document.createElement('span');
            chip.className = 'attachment-chip';
            chip.innerHTML = '<i class="fas fa-file-lines"></i><span></span><button title="移除"><i class="fas fa-times"></i></button>';
            chip.querySelector('span').textContent = file.name;
            chip.querySelector('button').onclick = function () {
                pendingAttachments.splice(index, 1);
                renderAttachmentStrip();
            };
            attachmentStrip.appendChild(chip);
        });
    }

    function clearAttachments() {
        pendingAttachments = [];
        renderAttachmentStrip();
    }

    function addMessage(role, content, forceScroll) {
        var div = document.createElement('div');
        div.className = 'message ' + role;
        var isUser = role === 'user';
        div.innerHTML =
            '<div class="msg-header ' + role + '">' +
            '<i class="fas ' + (isUser ? 'fa-user' : 'fa-robot') + '"></i> ' + (isUser ? 'You' : 'Code Agent') +
            '</div><div class="msg-body">' + renderMarkdown(content) + '</div>';
        messagesContainer.appendChild(div);
        highlightCode(div);
        scrollToBottom(!!forceScroll || isUser);
    }

    function createAssistantMsg() {
        var empty = messagesContainer.querySelector('.welcome-msg');
        if (empty) empty.remove();
        var div = document.createElement('div');
        div.className = 'message agent';
        div.innerHTML = '<div class="msg-header agent"><i class="fas fa-robot"></i> Code Agent</div><div class="msg-body"></div>';
        messagesContainer.appendChild(div);
        scrollToBottom(false);
        return div;
    }

    function appendStreamToken(contentDiv, text) {
        var raw = contentDiv.getAttribute('data-raw') || '';
        raw += text || '';
        contentDiv.setAttribute('data-raw', raw);
        if (contentDiv.__renderQueued) return;
        contentDiv.__renderQueued = true;
        window.requestAnimationFrame(function () {
            contentDiv.__renderQueued = false;
            flushStreamRender(contentDiv);
        });
    }

    function flushStreamRender(contentDiv) {
        var raw = contentDiv.getAttribute('data-raw') || contentDiv.textContent || '';
        contentDiv.innerHTML = renderMarkdown(raw);
        highlightCode(contentDiv);
    }

    function appendError(contentDiv, text) {
        var div = document.createElement('div');
        div.style.cssText = 'color:var(--accent-red); margin-top:6px;';
        div.textContent = text;
        contentDiv.appendChild(div);
        scrollToBottom(false);
    }

    function addReplyMeta(msgDiv, durationMs, mode) {
        if (msgDiv.querySelector('.reply-meta')) return;
        var meta = document.createElement('div');
        meta.className = 'reply-meta';
        meta.style.cssText = 'font-size:11px; color:var(--text-muted); margin-top:8px;';
        meta.textContent = (durationMs || 0) + 'ms | mode: ' + (mode || currentMode);
        msgDiv.appendChild(meta);
    }

    function addThinkingMessage(title, subtitle) {
        var div = document.createElement('div');
        div.className = 'message agent';
        div.id = 'thinking-msg';
        div.innerHTML = '<div class="msg-header agent"><i class="fas fa-robot"></i> Code Agent</div>' +
            '<div class="msg-body"><div class="ai-status-card">' +
            '<div class="ai-status-icon"><i class="fas fa-spinner spinner"></i></div>' +
            '<div class="ai-status-main">' +
            '<div class="ai-status-title">' + escapeHtml(title) + '<span class="ai-status-dots"><span>.</span><span>.</span><span>.</span></span></div>' +
            '<div class="ai-status-sub">' + escapeHtml(subtitle || '') + '</div>' +
            '</div></div></div>';
        messagesContainer.appendChild(div);
        scrollToBottom(false);
        return div;
    }

    function updateThinkingMessage(title, subtitle) {
        var el = document.getElementById('thinking-msg');
        if (!el) {
            addThinkingMessage(title, subtitle);
            return;
        }
        var titleEl = el.querySelector('.ai-status-title');
        var subEl = el.querySelector('.ai-status-sub');
        if (titleEl) titleEl.innerHTML = escapeHtml(title) + '<span class="ai-status-dots"><span>.</span><span>.</span><span>.</span></span>';
        if (subEl) subEl.textContent = subtitle || '';
        scrollToBottom(false);
    }

    function removeThinkingMessage(el) {
        if (el) el.remove();
        var e = document.getElementById('thinking-msg');
        if (e) e.remove();
    }

    function toolStatusTitle(status) {
        if (status === 'done') return '工具执行完成';
        if (status === 'rejected') return '工具调用已拒绝';
        if (status === 'confirming') return '等待你的确认';
        return 'AI 正在调用工具';
    }

    function addToolToPanel(name, args, status) {
        document.getElementById('toolLogEmpty').style.display = 'none';
        toolCallCount++;
        document.getElementById('toolCount').textContent = toolCallCount;
        var fullArgs = String(args || '');
        var shortArgs = fullArgs.length > 140 ? fullArgs.substring(0, 140) + '...' : fullArgs;
        var statusLabel = status === 'done' ? '完成' : status === 'rejected' ? '已拒绝' : status === 'confirming' ? '待确认' : '执行中';
        var div = document.createElement('div');
        div.className = 'tool-item';
        div.id = 'tool-item-' + toolCallCount;

        var header = document.createElement('div');
        header.className = 'tool-item-header';
        header.innerHTML = '<i class="fas fa-wrench" style="color:var(--accent-green); font-size:11px;"></i>';
        var nameEl = document.createElement('span');
        nameEl.className = 'tool-item-name';
        nameEl.textContent = name || 'tool_call';
        header.appendChild(nameEl);

        var actions = document.createElement('span');
        actions.className = 'tool-item-actions';
        var statusEl = document.createElement('span');
        statusEl.className = 'tool-item-status ' + (status || 'running');
        statusEl.textContent = statusLabel;
        actions.appendChild(statusEl);
        actions.appendChild(makeMiniButton('fa-up-right-and-down-left-from-center', '展开', function () {
            var expanded = div.classList.toggle('expanded');
            argsEl.textContent = expanded ? fullArgs : shortArgs;
        }));
        actions.appendChild(makeMiniButton('fa-copy', '复制参数', function () { copyText(fullArgs); }));
        header.appendChild(actions);
        div.appendChild(header);

        var argsEl = document.createElement('div');
        argsEl.className = 'tool-item-args';
        argsEl.textContent = shortArgs;
        div.appendChild(argsEl);

        var toolLog = document.getElementById('toolLog');
        toolLog.appendChild(div);
        var panel = document.getElementById('toolPanel');
        panel.scrollTop = panel.scrollHeight;
    }

    function makeMiniButton(icon, title, handler) {
        var btn = document.createElement('button');
        btn.className = 'tool-mini-btn';
        btn.title = title;
        btn.innerHTML = '<i class="fas ' + icon + '"></i>';
        btn.onclick = handler;
        return btn;
    }

    function copyText(text) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text || '').then(function () {
                addAgentLog('已复制', '内容已复制到剪贴板', 'success');
            }).catch(function () {});
        }
    }

    function showConfirmPanel(confirmKey, name, args) {
        var empty = messagesContainer.querySelector('.welcome-msg');
        if (empty) empty.remove();
        var argsShort = String(args || '').length > 300 ? String(args).substring(0, 300) + '...' : String(args || '');
        var div = document.createElement('div');
        div.className = 'message agent confirm-msg';
        div.id = 'confirm-msg';
        div.innerHTML = '<div class="msg-header agent" style="color:var(--accent-orange);"><i class="fas fa-exclamation-triangle"></i> 需要确认</div>' +
            '<div class="confirm-msg-body">' +
            '<div class="confirm-msg-name">' + escapeHtml(name) + '</div>' +
            '<div class="confirm-msg-args">' + escapeHtml(argsShort) + '</div>' +
            '<div class="confirm-msg-btns">' +
            '<button class="confirm-btn confirm-btn-approve" onclick="approveConfirm(\'' + escapeAttr(confirmKey) + '\', true)">允许</button>' +
            '<button class="confirm-btn confirm-btn-reject" onclick="approveConfirm(\'' + escapeAttr(confirmKey) + '\', false)">拒绝</button>' +
            '<button class="confirm-btn confirm-btn-approveAll" onclick="approveConfirmAll(\'' + escapeAttr(confirmKey) + '\')">全部允许</button>' +
            '</div></div>';
        messagesContainer.appendChild(div);
        scrollToBottom(false);
    }

    function hideConfirmPanel() {
        var el = document.getElementById('confirm-msg');
        if (el) el.remove();
    }

    function approveConfirm(key, approved) {
        hideConfirmPanel();
        fetchJson('/confirm', { method: 'POST', body: JSON.stringify({ key: key, approved: approved }) })
            .then(function () {
                addAgentLog(approved ? '已允许' : '已拒绝', '工具确认', approved ? 'success' : 'info');
            }).catch(function (err) {
                addAgentLog('确认失败', err.message, 'error');
            });
    }

    function approveConfirmAll(key) {
        hideConfirmPanel();
        fetchJson('/confirm', { method: 'POST', body: JSON.stringify({ key: key, approved: true, approveAll: true }) })
            .then(function () {
                addAgentLog('全部允许', '工具确认', 'success');
            }).catch(function (err) {
                addAgentLog('确认失败', err.message, 'error');
            });
    }

    function addAgentLog(title, detail, type) {
        var div = document.createElement('div');
        var c = type === 'success' ? 'var(--accent-green)' : type === 'error' ? 'var(--accent-red)' : 'var(--accent-blue)';
        var ic = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-times-circle' : 'fa-circle-info';
        var t = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        div.style.cssText = 'font-size:12px;padding:5px 0;border-bottom:1px solid var(--border-light);';
        div.innerHTML = '<span style="color:var(--text-muted);">' + t + '</span> <i class="fas ' + ic + '" style="color:' + c + ';margin:0 5px;"></i>';
        var titleEl = document.createElement('span');
        titleEl.style.color = 'var(--text-main)';
        titleEl.textContent = title || '';
        div.appendChild(titleEl);
        div.appendChild(document.createTextNode(' '));
        var detailEl = document.createElement('span');
        detailEl.style.color = 'var(--text-secondary)';
        detailEl.textContent = detail || '';
        div.appendChild(detailEl);
        if (agentLog.textContent === '暂无操作记录') agentLog.innerHTML = '';
        agentLog.appendChild(div);
        agentLog.scrollTop = agentLog.scrollHeight;
    }

    function resetRuntimePanels(statusText) {
        terminalPanel.innerHTML = '<div class="terminal-output"><div><span class="path">' + escapeHtml(currentCwd || '~/project') + '</span> $ <span style="color:#8b949e">' + escapeHtml(statusText || '等待命令...') + '</span></div></div>';
        agentLog.innerHTML = '<div style="font-size:12px; color:var(--text-muted); padding:4px;">暂无操作记录</div>';
        document.getElementById('toolLog').innerHTML = '';
        document.getElementById('toolLogEmpty').style.display = '';
        document.getElementById('toolCount').textContent = '0';
        toolCallCount = 0;
    }

    function newSession() {
        if (isProcessing) {
            addAgentLog('暂不能新建', 'Agent 执行中', 'info');
            return;
        }
        fetchJson('/sessions', { method: 'POST', body: JSON.stringify({ action: 'new' }) }).then(function () {
            messagesContainer.innerHTML = '<div class="message agent welcome-msg"><div class="msg-header agent"><i class="fas fa-robot"></i> Code Agent</div>' +
                '<div class="msg-body">新会话已创建。请输入你的编程需求。</div></div>';
            resetRuntimePanels();
            hideConfirmPanel();
            addAgentLog('新会话', '已创建', 'success');
            currentSessionId = '';
            closeMobilePanels();
            loadSessions();
            jumpToLatest();
        }).catch(function (err) {
            addAgentLog('新建失败', err.message, 'error');
        });
    }

    function clearCurrentSession() {
        if (isProcessing) return;
        if (!confirm('确定清空当前会话上下文吗？历史会话文件不会被删除。')) return;
        fetchJson('/sessions', { method: 'POST', body: JSON.stringify({ action: 'clear' }) }).then(function () {
            messagesContainer.innerHTML = '<div class="message agent welcome-msg"><div class="msg-header agent"><i class="fas fa-robot"></i> Code Agent</div>' +
                '<div class="msg-body">当前会话上下文已清空。</div></div>';
            currentSessionId = '';
            resetRuntimePanels();
            addAgentLog('已清空', '当前会话上下文', 'success');
            loadSessions();
        }).catch(function (err) {
            addAgentLog('清空失败', err.message, 'error');
        });
    }

    function deleteSession(sessionId, title) {
        if (isProcessing) return;
        if (!confirm('确定删除会话「' + title + '」吗？')) return;
        fetchJson('/sessions', { method: 'POST', body: JSON.stringify({ action: 'delete', sessionId: sessionId }) }).then(function () {
            addAgentLog('已删除会话', title, 'success');
            if (sessionId === currentSessionId) {
                currentSessionId = '';
                messagesContainer.innerHTML = '<div class="message agent welcome-msg"><div class="msg-header agent"><i class="fas fa-robot"></i> Code Agent</div>' +
                    '<div class="msg-body">会话已删除，请选择其他会话或新建对话。</div></div>';
                resetRuntimePanels();
            }
            loadSessions();
        }).catch(function (err) {
            addAgentLog('删除失败', err.message, 'error');
        });
    }

    function renameSession(sessionId, oldTitle) {
        if (isProcessing) return;
        var title = prompt('新的会话标题', oldTitle || '新会话');
        if (title === null) return;
        title = title.trim();
        if (!title) return;
        fetchJson('/sessions', { method: 'POST', body: JSON.stringify({ action: 'rename', sessionId: sessionId, title: title }) }).then(function () {
            addAgentLog('已重命名', title, 'success');
            loadSessions();
        }).catch(function (err) {
            addAgentLog('重命名失败', err.message, 'error');
        });
    }

    function setAgentMode(m) {
        if (isProcessing) return;
        fetchJson('/mode', { method: 'POST', body: JSON.stringify({ mode: m }) }).then(function (d) {
            activateMode(d.mode || m);
            addAgentLog('模式切换', d.mode || m, 'info');
        }).catch(function (err) {
            addAgentLog('模式切换失败', err.message, 'error');
        });
    }

    function activateMode(m) {
        currentMode = m;
        document.querySelectorAll('.mode-btn').forEach(function (b) { b.classList.remove('active'); });
        var btn = document.getElementById('mode-' + m);
        if (btn) btn.classList.add('active');

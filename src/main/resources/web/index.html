<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>

<script>
    var MAX_OUTGOING_CHARS = 50000;
    var MAX_ATTACHMENT_CONTENT_CHARS = 45000;
    var MAX_ATTACHMENT_FILE_BYTES = 45000;
    var STREAM_RENDER_INTERVAL_MS = 80;
    localStorage.removeItem('fish_token');
    var messagesContainer = document.getElementById('messagesContainer');
    var userInput = document.getElementById('userInput');
    var sessionSearch = document.getElementById('sessionSearch');
    var newMessagesBtn = document.getElementById('newMessagesBtn');
    var attachmentStrip = document.getElementById('attachmentStrip');
    var fileInput = document.getElementById('fileInput');
    var cwdInput = document.getElementById('cwdInput');

    var isProcessing = false;
    var currentMode = 'confirm';
    var modelsCache = [];
    var selectedModel = '';
    var currentCwd = '';
    var toolCallCount = 0;
    var currentSessionId = '';
    var pickerCurrentPath = '';
    var sessionSearchTerm = '';
    var currentAbortController = null;
    var stopRequestedByUser = false;
    var shouldStickToBottom = true;
    var pendingAttachments = [];
    var queuedMessages = [];
    var activeResponseMessage = null;
    var contextCharCount = 0;
    var pickerShowHidden = false;
    var projectTreePath = '';
    var toolItemsByKey = {};
    var isInputComposing = false;
    var currentRunId = '';
    var currentTaskState = null;

    function authFetch(url, opts) {
        opts = opts || {};
        opts.headers = opts.headers || {};
        opts.credentials = 'same-origin';
        if (opts.body && !(opts.body instanceof FormData) && !opts.headers['Content-Type']) {
            opts.headers['Content-Type'] = 'application/json';
        }
        return fetch(url, opts).then(function (r) {
            if (r.status === 401) {
                window.location.href = '/';
                throw new Error('登录已过期');
            }
            return r;
        });
    }

    function fetchJson(url, opts) {
        return authFetch(url, opts).then(function (r) {
            return r.text().then(function (text) {
                var data = text ? JSON.parse(text) : {};
                if (!r.ok) throw new Error(data.error || data.message || ('HTTP ' + r.status));
                return data;
            });
        });
    }

    function logout() {
        authFetch('/logout', { method: 'POST' })
            .catch(function () {})
            .finally(function () { window.location.href = '/'; });
    }

    function initApp() {
        configureMarkdown();
        wireEvents();
        resetRuntimePanels();
        fetchJson('/mode').then(function (d) {
            if (d.mode) activateMode(d.mode);
            if (typeof d.contextChars === 'number') updateContextUsage(d.contextChars);
        }).catch(function () {});
        loadModels();
        loadCwd();
    }

    function wireEvents() {
        userInput.addEventListener('input', autoResizeInput);
        userInput.addEventListener('compositionstart', function () { isInputComposing = true; });
        userInput.addEventListener('compositionend', function () { isInputComposing = false; });
        userInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                if (isInputComposing || e.isComposing || e.keyCode === 229) return;
                e.preventDefault();
                sendMessage();
            }
        });
        cwdInput.addEventListener('input', markCwdDirty);
        cwdInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); setCwd(); }
            if (e.key === 'Escape') { this.value = currentCwd; markCwdClean(); this.blur(); }
        });
        sessionSearch.addEventListener('input', function () {
            sessionSearchTerm = this.value.trim().toLowerCase();
            loadSessions();
        });
        fileInput.addEventListener('change', handleFilesSelected);
        messagesContainer.addEventListener('scroll', function () {
            shouldStickToBottom = isNearBottom();
            if (shouldStickToBottom) newMessagesBtn.classList.remove('show');
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                if (document.getElementById('cwdPickerOverlay').classList.contains('open')) closeCwdPicker();
                if (document.getElementById('modelConfigOverlay').classList.contains('open')) closeModelConfig();
                closeMobilePanels();
            }
        });
    }

    function autoResizeInput() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    }

    function markCwdDirty() {
        var dirty = cwdInput.value.trim() !== currentCwd;
        document.querySelector('.cwd-wrapper').classList.toggle('dirty', dirty);
    }

    function markCwdClean() {
        document.querySelector('.cwd-wrapper').classList.remove('dirty');
    }

    function getCwdHistory() {
        try { return JSON.parse(localStorage.getItem('fish_cwd_history') || '[]'); } catch (e) { return []; }
    }

    function saveCwdToHistory(cwd) {
        if (!cwd) return;
        var history = getCwdHistory().filter(function (h) { return h !== cwd; });
        history.unshift(cwd);
        if (history.length > 10) history = history.slice(0, 10);
        localStorage.setItem('fish_cwd_history', JSON.stringify(history));
    }

    function getLastCwd() {
        return localStorage.getItem('fish_cwd_last') || '';
    }

    function saveLastCwd(cwd) {
        if (cwd) localStorage.setItem('fish_cwd_last', cwd);
    }

    function loadCwd() {
        var saved = getLastCwd();
        if (saved) {
            currentCwd = saved;
            cwdInput.value = currentCwd;
            fetchJson('/cwd', { method: 'POST', body: JSON.stringify({ cwd: currentCwd }) })
                .then(function (d) {
                    if (d.cwd) {
                        currentCwd = d.cwd;
                        cwdInput.value = currentCwd;
                        markCwdClean();
                        loadSessions();
                        loadProjectTree('');
                    }
                    if (typeof d.contextChars === 'number') updateContextUsage(d.contextChars);
                }).catch(function () {
                    loadServerCwd();
                });
            return;
        }
        loadServerCwd();
    }

    function loadServerCwd() {
        fetchJson('/cwd').then(function (d) {
            currentCwd = d.cwd || '';
            cwdInput.value = currentCwd;
            markCwdClean();
            saveLastCwd(currentCwd);
            loadSessions();
            loadProjectTree('');
            if (typeof d.contextChars === 'number') updateContextUsage(d.contextChars);
        }).catch(function (err) {
            addAgentLog('目录读取失败', err.message, 'error');
        });
    }

    function setCwd() {
        if (isProcessing) return;
        var newCwd = cwdInput.value.trim();
        if (!newCwd || newCwd === currentCwd) {
            cwdInput.value = currentCwd;
            markCwdClean();
            return;
        }
        fetchJson('/cwd', { method: 'POST', body: JSON.stringify({ cwd: newCwd }) })
            .then(function (d) {
                currentCwd = d.cwd;
                cwdInput.value = currentCwd;
                markCwdClean();
                saveLastCwd(currentCwd);
                saveCwdToHistory(currentCwd);
                if (typeof d.contextChars === 'number') updateContextUsage(d.contextChars);
                addAgentLog('工作目录', currentCwd, 'success');
                loadSessions();
                loadProjectTree('');
            })
            .catch(function (err) {
                addAgentLog('目录切换失败', err.message, 'error');
                cwdInput.value = currentCwd;
                markCwdClean();
            });
    }

    function loadModels() {
        fetchJson('/config').then(function (d) {
            applyConfigData(d);
            var logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.style.display = d.webAuthEnabled ? 'inline-flex' : 'none';
            if (d.setupMessage) {
                addAgentLog('需要配置', d.setupMessage, 'error');
            }
        }).catch(function (err) {
            addAgentLog('模型读取失败', err.message, 'error');
        });
    }

    function applyConfigData(data, preferredModel) {
        var sel = document.getElementById('modelSelect');
        var models = data.models || [];
        modelsCache = models;
        sel.innerHTML = '';
        models.forEach(function (m) {
            var opt = document.createElement('option');
            opt.value = m.value || '';
            opt.textContent = m.label || m.value || 'unknown';
            sel.appendChild(opt);
        });
        var target = preferredModel || data.model || data.cur_model || '';
        var targetExists = models.some(function (m) { return m.value === target; });
        if (!targetExists && models.length) target = models[0].value || '';
        if (!models.length && target) {
            var fallback = document.createElement('option');
            fallback.value = target;
            fallback.textContent = target;
            sel.appendChild(fallback);
        }
        sel.value = target;
        selectedModel = sel.value || target;
        var status = document.getElementById('modelStatus');
        status.style.color = 'var(--text-muted)';
        status.textContent = selectedModel;
        updateSetupNotice(data);
        if (document.getElementById('modelConfigOverlay').classList.contains('open')) {
            renderModelConfigList();
        }
    }

    function updateSetupNotice(data) {
        var welcomeBody = document.querySelector('.welcome-msg .msg-body');
        if (!welcomeBody) return;
        if (data && data.setupMessage) {
            welcomeBody.setAttribute('data-setup-notice', 'true');
            welcomeBody.innerHTML = renderMarkdown('服务已启动，但还不能聊天：' + data.setupMessage);
            return;
        }
        if (welcomeBody.getAttribute('data-setup-notice') === 'true') {
            welcomeBody.removeAttribute('data-setup-notice');
            welcomeBody.innerHTML = renderMarkdown('模型已配置，可以开始聊天。');
        }
    }

    function refreshSidebar() {
        loadSessions();
        loadProjectTree(projectTreePath);
    }

    function loadProjectTree(path) {
        path = path || '';
        projectTreePath = path;
        var list = document.getElementById('projectTreeList');
        var pathEl = document.getElementById('projectTreePath');
        if (!list || !pathEl) return;
        pathEl.textContent = path || '/';
        list.innerHTML = '<div class="sidebar-empty"><i class="fas fa-spinner spinner"></i> 加载中...</div>';
        fetchJson('/project/tree?path=' + encodeURIComponent(path)).then(function (d) {
            projectTreePath = d.path || '';
            pathEl.textContent = projectTreePath || '/';
            renderProjectTree(d.items || []);
        }).catch(function (err) {
            list.innerHTML = '<div class="sidebar-empty">文件树加载失败：' + escapeHtml(err.message) + '</div>';
        });
    }

    function renderProjectTree(items) {
        var list = document.getElementById('projectTreeList');
        list.innerHTML = '';
        if (projectTreePath) {
            var up = document.createElement('div');
            up.className = 'project-tree-item';
            up.tabIndex = 0;
            up.setAttribute('role', 'button');
            up.innerHTML = '<i class="fas fa-arrow-up"></i><span class="project-tree-name">返回上级</span>';
            up.onclick = function () {
                var parts = projectTreePath.split('/').filter(Boolean);
                parts.pop();
                loadProjectTree(parts.join('/'));
            };
            up.onkeydown = function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); up.click(); } };
            list.appendChild(up);
        }
        if (!items.length) {
            var empty = document.createElement('div');
            empty.className = 'sidebar-empty';
            empty.textContent = '此目录为空';
            list.appendChild(empty);
            return;
        }
        items.forEach(function (item) {
            var row = document.createElement('div');
            row.className = 'project-tree-item ' + (item.type === 'file' ? 'file' : 'dir');
            row.tabIndex = 0;
            row.setAttribute('role', 'button');
            row.title = item.path || item.name;
            row.innerHTML = '<i class="fas ' + (item.type === 'file' ? 'fa-file-lines' : 'fa-folder') + '"></i><span class="project-tree-name"></span>';
            row.querySelector('span').textContent = item.name;
            row.onclick = function () {
                if (item.type === 'dir') {
                    loadProjectTree(item.path || '');
                } else {
                    var fileRef = '@' + (item.path || item.name);
                    var current = userInput.value.trim();
                    userInput.value = current ? current + '\n' + fileRef : fileRef;
                    autoResizeInput.call(userInput);
                    userInput.focus();
                }
            };
            row.onkeydown = function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); row.click(); } };
            list.appendChild(row);
        });
    }

    function loadSessions() {
        fetchJson('/sessions').then(function (d) {
            currentSessionId = d.currentSessionId || currentSessionId || '';
            if (typeof d.contextChars === 'number') updateContextUsage(d.contextChars);
            renderSessions(d.sessions || []);
        }).catch(function () {});
    }

    function renderSessions(sessions) {
        var list = document.getElementById('sessionList');
        var filtered = sessions.filter(function (s) {
            if (!sessionSearchTerm) return true;
            var haystack = ((s.title || '') + ' ' + (s.cwd || '') + ' ' + (s.id || '')).toLowerCase();
            return haystack.indexOf(sessionSearchTerm) !== -1;
        });
        if (!filtered.length) {
            list.innerHTML = '<div class="sidebar-empty">' + (sessionSearchTerm ? '没有匹配的会话' : '暂无会话') + '</div>';
            return;
        }
        list.innerHTML = '';
        groupSessionsByProject(filtered).forEach(function (group) {
            var wrap = document.createElement('div');
            wrap.className = 'project-group';
            var title = document.createElement('div');
            title.className = 'project-title';
            title.title = group.cwd;
            title.innerHTML = '<i class="far fa-folder"></i><span class="project-name">' + escapeHtml(group.name) + '</span>';
            wrap.appendChild(title);
            group.sessions.forEach(function (s) {
                wrap.appendChild(createSessionRow(s));
            });
            list.appendChild(wrap);
        });
    }

    function createSessionRow(s) {
        var row = document.createElement('div');
        row.className = 'session-row' + (s.id === currentSessionId ? ' active' : '');
        row.tabIndex = 0;
        row.setAttribute('role', 'button');
        row.title = (s.title || s.id) + (s.cwd ? '\n' + s.cwd : '');
        row.onclick = function () { resumeSession(s.id, s.title || '新会话', s.cwd || ''); };
        row.onkeydown = function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                resumeSession(s.id, s.title || '新会话', s.cwd || '');
            }
        };

        var title = document.createElement('div');
        title.className = 'session-title';
        title.textContent = s.title || '新会话';
        row.appendChild(title);

        var meta = document.createElement('div');
        meta.className = 'session-meta';
        meta.textContent = formatSessionTime(s.updatedAt);
        row.appendChild(meta);

        var actions = document.createElement('div');
        actions.className = 'session-actions';
        actions.appendChild(makeSessionAction('fa-pen', '重命名', function (e) {
            e.stopPropagation();
            renameSession(s.id, s.title || '新会话');
        }));
        actions.appendChild(makeSessionAction('fa-trash', '删除', function (e) {
            e.stopPropagation();
            deleteSession(s.id, s.title || '新会话');
        }, 'delete'));
        row.appendChild(actions);
        return row;
    }

    function makeSessionAction(icon, title, handler, extraClass) {
        var btn = document.createElement('button');
        btn.className = 'session-action-btn' + (extraClass ? ' ' + extraClass : '');
        btn.title = title;
        btn.setAttribute('aria-label', title);
        btn.innerHTML = '<i class="fas ' + icon + '"></i>';
        btn.onclick = handler;
        return btn;
    }

    function groupSessionsByProject(sessions) {
        var byCwd = {};
        sessions.forEach(function (s) {
            var cwd = s.cwd || currentCwd || '';
            if (!byCwd[cwd]) byCwd[cwd] = { cwd: cwd, name: projectName(cwd), sessions: [] };
            byCwd[cwd].sessions.push(s);
        });
        return Object.keys(byCwd).map(function (k) { return byCwd[k]; });
    }

    function projectName(cwd) {
        if (!cwd) return '未命名项目';
        var parts = cwd.split(/[\\/]/).filter(Boolean);
        return parts.length ? parts[parts.length - 1] : cwd;
    }

    function resumeSession(sessionId, title, cwd) {
        if (!sessionId) return;
        if (isProcessing) {
            addAgentLog('暂不能切换', 'Agent 执行中', 'info');
            return;
        }
        fetchJson('/sessions', { method: 'POST', body: JSON.stringify({ action: 'resume', sessionId: sessionId, cwd: cwd || '' }) })
            .then(function (d) {
                currentSessionId = sessionId;
                if (d.cwd) {
                    currentCwd = d.cwd;
                    cwdInput.value = currentCwd;
                    markCwdClean();
                    saveLastCwd(currentCwd);
                    saveCwdToHistory(currentCwd);
                }
                resetRuntimePanels();
                renderHistoryMessages(d.messages || []);
                currentTaskState = d.task || null;
                currentRunId = currentTaskState && currentTaskState.runId || '';
                renderTaskState(currentTaskState);
                updateRunActionButtons(currentTaskState && currentTaskState.phase || '',
                    currentTaskState && currentTaskState.modifiedFiles || []);
                if (typeof d.contextChars === 'number') updateContextUsage(d.contextChars);
                addAgentLog('恢复会话', title, 'success');
                closeMobilePanels();
                loadSessions();
            })
            .catch(function (err) {
                addAgentLog('恢复失败', err.message, 'error');
            });
    }

    function renderHistoryMessages(messages) {
        messagesContainer.innerHTML = '';
        var rendered = 0;
        var toolResults = {};
        messages.forEach(function (msg) {
            if ((msg.role || '') === 'tool' && msg.tool_call_id) toolResults[msg.tool_call_id] = msg.content || '';
        });
        messages.forEach(function (msg) {
            var role = msg.role || '';
            if (role === 'system' || role === 'tool') return;
            var content = msg.content;
            if (role === 'assistant' && msg.tool_calls) {
                var turn = addMessage('agent', content && content !== 'null' ? content : '工具执行记录', true);
                appendHistoryToolCalls(turn, msg.tool_calls, toolResults);
                rendered++;
                return;
            }
            if (!content) return;
            addMessage(role === 'user' ? 'user' : 'agent', content, true);
            rendered++;
        });
        if (rendered === 0) {
            messagesContainer.innerHTML = '<div class="message agent welcome-msg"><div class="msg-header agent"><i class="fas fa-robot"></i> Code Agent</div>' +
                '<div class="msg-body">这个会话暂无可展示的历史消息。</div></div>';
        }
        jumpToLatest();
    }

    function appendHistoryToolCalls(messageDiv, toolCalls, toolResults) {
        if (!messageDiv || !toolCalls || !toolCalls.length) return;
        var body = messageDiv.querySelector('.msg-body');
        if (!body) return;
        var log = document.createElement('div');
        log.className = 'response-tools has-items';
        toolCalls.forEach(function (tc) {
            var fn = tc.function || {};
            var item = document.createElement('div');
            item.className = 'tool-item expanded';
            var header = document.createElement('div');
            header.className = 'tool-item-header';
            var name = document.createElement('span');
            name.className = 'tool-item-name';
            name.textContent = fn.name || 'tool_call';
            var status = document.createElement('span');
            status.className = 'tool-item-status done';
            status.textContent = '历史';
            header.appendChild(name);
            header.appendChild(status);
            var args = document.createElement('div');
            args.className = 'tool-item-args';
            args.textContent = fn.arguments || '';
            var result = document.createElement('div');
            result.className = 'tool-item-result';
            result.textContent = toolResults[tc.id] || '未保存工具结果';
            item.appendChild(header);
            item.appendChild(args);
            item.appendChild(result);
            log.appendChild(item);
        });
        body.appendChild(log);
    }

    function formatSessionTime(ms) {
        if (!ms) return '未知时间';
        var d = new Date(ms);
        var now = new Date();
        var sameDay = d.toDateString() === now.toDateString();
        var hh = String(d.getHours()).padStart(2, '0');
        var mm = String(d.getMinutes()).padStart(2, '0');
        if (sameDay) return hh + ':' + mm;
        return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + hh + ':' + mm;
    }

    function sendMessage() {
        var draft = captureComposerDraft();
        if (!draft) return;
        clearComposer();
        if (isProcessing) {
            queueMessage(draft);
            return;
        }
        startMessageRequest(draft);
    }

    function captureComposerDraft() {
        var visibleText = userInput.value.trim();
        var attachments = pendingAttachments.slice();
        var text = composeOutgoingMessage(visibleText, attachments);
        if (!text) return null;
        if (text.length > MAX_OUTGOING_CHARS) {
            addAgentLog('消息过长', '当前 ' + formatCharCount(text.length) + ' 字符，上限 ' +
                formatCharCount(MAX_OUTGOING_CHARS) + ' 字符；请减少正文或附件', 'error');
            return null;
        }
        var visibleMessage = visibleText || '请阅读这些附件内容。';
        if (attachments.length) {
            visibleMessage += '\n\n附件：' + attachments.map(function (file) { return file.name; }).join('、');
        }
        return { text: text, visibleMessage: visibleMessage, messageDiv: null };
    }

    function clearComposer() {
        userInput.value = '';
        userInput.style.height = 'auto';
        clearAttachments();
    }

    function queueMessage(draft) {
        draft.messageDiv = addMessage('user', draft.visibleMessage, true);
        draft.messageDiv.classList.add('queued');
        var badge = document.createElement('div');
        badge.className = 'queued-badge';
        badge.innerHTML = '<i class="fas fa-clock"></i><span>等待当前回复完成</span>';
        draft.messageDiv.appendChild(badge);
        queuedMessages.push(draft);
        renderQueueBar();
    }

    function renderQueueBar() {
        var bar = document.getElementById('queueBar');
        var summary = document.getElementById('queueSummary');
        bar.classList.toggle('show', queuedMessages.length > 0);
        if (!queuedMessages.length) {
            summary.textContent = '';
            return;
        }
        var first = queuedMessages[0].visibleMessage.replace(/\s+/g, ' ').trim();
        if (first.length > 56) first = first.substring(0, 56) + '...';
        summary.textContent = queuedMessages.length + ' 条追加提问等待处理 · ' + first;
    }

    function clearQueuedMessages() {
        queuedMessages.forEach(function (draft) {
            if (draft.messageDiv) draft.messageDiv.remove();
        });
        queuedMessages = [];
        renderQueueBar();
    }

    function startMessageRequest(draft) {
        isProcessing = true;
        currentRunId = '';
        currentTaskState = null;
        renderTaskState(null);
        updateRunActionButtons('', []);
        stopRequestedByUser = false;
        currentAbortController = window.AbortController ? new AbortController() : null;
        setProcessingUI(true);
        if (draft.messageDiv) {
            draft.messageDiv.classList.remove('queued');
            var queuedBadge = draft.messageDiv.querySelector('.queued-badge');
            if (queuedBadge) queuedBadge.remove();
        } else {
            draft.messageDiv = addMessage('user', draft.visibleMessage, true);
        }
        resetRuntimePanels();
        hideConfirmPanel();

        var msgDiv = createActiveAssistantMsg('AI 正在思考', '分析需求，准备执行...');
        var contentDiv = msgDiv.querySelector('.response-content');
        activeResponseMessage = msgDiv;
        var gotFirstToken = false;
        var terminalEventReceived = false;
        var chatPayload = { message: draft.text, stream: true };
        if (draft.resumeRunId) chatPayload.resumeRunId = draft.resumeRunId;
        if (draft.resumeRunId && currentSessionId) chatPayload.sessionId = currentSessionId;
        if (selectedModel) chatPayload.model = selectedModel;
        if (currentCwd) chatPayload.cwd = currentCwd;

        var fetchOpts = { method: 'POST', body: JSON.stringify(chatPayload) };
        if (currentAbortController) fetchOpts.signal = currentAbortController.signal;

        authFetch('/chat', fetchOpts)
            .then(function (r) {
                if (!r.ok) return r.text().then(function (t) { throw new Error('HTTP ' + r.status + ': ' + t); });
                var reader = r.body.getReader();
                var decoder = new TextDecoder();
                var buf = '';
                function process() {
                    return reader.read().then(function (res) {
                        if (res.done) return;
                        buf += decoder.decode(res.value, { stream: true });
                        var lines = buf.split('\n');
                        buf = lines.pop();
                        for (var i = 0; i < lines.length; i++) {
                            var ln = lines[i].trim();
                            if (!ln.startsWith('data: ')) continue;
                            var js = ln.substring(6);
                            if (js === '[END]' || !js) continue;
                            try {
                                var evt = JSON.parse(js);
                                if (evt.type === 'run_started') {
                                    currentRunId = evt.runId || '';
                                    if (evt.sessionId) currentSessionId = evt.sessionId;
                                } else if (evt.type === 'task_update') {
                                    currentRunId = evt.runId || currentRunId;
                                    currentTaskState = evt.task || null;
                                    renderTaskState(currentTaskState);
                                } else if (evt.type === 'verification') {
                                    updateActiveResponseStatus('正在验证修改', formatVerificationSummary(evt.verification));
                                } else if (evt.type === 'token') {
                                    if (!gotFirstToken) {
                                        gotFirstToken = true;
                                        beginActiveResponse(msgDiv);
                                    }
                                    appendStreamToken(contentDiv, evt.content);
                                    scrollToBottom(false);
                                } else if (evt.type === 'tool_call') {
                                    updateActiveResponseStatus(toolStatusTitle(evt.status), evt.name || '工具调用中');
                                    setResponseState(msgDiv, 'running', evt.status === 'done' ? '继续处理中' : '执行工具中');
                                    addToolToPanel(evt.name || 'tool_call', evt.args || '', evt.status || 'running', evt.result || null);
                                    addAgentLog(evt.status === 'done' ? '完成' : '执行中', evt.name || '工具调用', evt.status === 'done' ? 'success' : 'info');
                                } else if (evt.type === 'confirm_required') {
                                    updateActiveResponseStatus('等待你的确认', evt.name || '工具调用需要确认');
                                    setResponseState(msgDiv, 'running', '等待确认');
                                    showConfirmPanel(evt.runId || currentRunId, evt.confirmKey, evt.name || '工具调用', evt.args || '');
                                } else if (evt.type === 'done') {
                                    terminalEventReceived = true;
                                    if (!gotFirstToken && evt.reply) {
                                        setRawContent(contentDiv, evt.reply);
                                        beginActiveResponse(msgDiv);
                                    }
                                    if (contentDiv) {
                                        flushStreamRender(contentDiv, true);
                                        addReplyMeta(msgDiv, evt.durationMs, evt.mode, evt.replyChars);
                                    }
                                    currentRunId = evt.runId || currentRunId;
                                    currentTaskState = evt.task || currentTaskState;
                                    renderTaskState(currentTaskState);
                                    var finalStatus = evt.finalStatus || 'COMPLETE';
                                    if (finalStatus === 'COMPLETE') completeActiveResponse(msgDiv, 'done', '已完成');
                                    else if (finalStatus === 'BLOCKED') completeActiveResponse(msgDiv, 'error', '任务受阻');
                                    else if (finalStatus === 'CANCELLED') completeActiveResponse(msgDiv, 'stopped', '已取消');
                                    else completeActiveResponse(msgDiv, 'error', '任务中断');
                                    updateRunActionButtons(finalStatus, evt.modifiedFiles || []);
                                    if (typeof evt.contextChars === 'number') updateContextUsage(evt.contextChars);
                                    addAgentLog('完成', (evt.durationMs || 0) + 'ms', 'success');
                                    if (evt.sessionId) currentSessionId = evt.sessionId;
                                    loadSessions();
                                } else if (evt.type === 'error') {
                                    terminalEventReceived = true;
                                    currentRunId = evt.runId || currentRunId;
                                    if (evt.task) { currentTaskState = evt.task; renderTaskState(currentTaskState); }
                                    beginActiveResponse(msgDiv);
                                    appendError(contentDiv, evt.error || '未知错误');
                                    completeActiveResponse(msgDiv, 'error', '生成失败');
                                    updateRunActionButtons('INTERRUPTED', currentTaskState && currentTaskState.modifiedFiles || []);
                                    addAgentLog('错误', evt.error || '未知错误', 'error');
                                }
                            } catch (e) {}
                        }
                        return process();
                    });
                }
                return process();
            })
            .then(function () {
                if (!terminalEventReceived) {
                    beginActiveResponse(msgDiv);
                    appendResponseNote(contentDiv, '连接已结束，当前回复可能不完整');
                    completeActiveResponse(msgDiv, 'error', '输出中断');
                }
                finishProcessing();
            })
            .catch(function (err) {
                beginActiveResponse(msgDiv);
                if (stopRequestedByUser || err.name === 'AbortError') {
                    if (!getRawContent(contentDiv).trim()) {
                        setRawContent(contentDiv, '已停止当前回复。');
                        flushStreamRender(contentDiv, true);
                    } else {
                        appendResponseNote(contentDiv, '已停止生成');
                    }
                    completeActiveResponse(msgDiv, 'stopped', '已停止');
                    addAgentLog('已停止', '当前回复已取消', 'info');
                } else {
                    appendError(contentDiv, '网络错误: ' + err.message);
                    completeActiveResponse(msgDiv, 'error', '生成失败');
                    addAgentLog('网络错误', err.message, 'error');
                }
                finishProcessing();
            });
    }

    function stopGeneration() {
        if (!isProcessing) return;
        stopRequestedByUser = true;
        updateActiveResponseStatus('正在停止', '正在取消当前请求...');
        setResponseState(activeResponseMessage, 'stopped', '正在停止');
        if (currentRunId) {
            authFetch('/cancel', { method: 'POST', body: JSON.stringify({ runId: currentRunId }) }).catch(function () {});
        }
        if (currentAbortController) currentAbortController.abort();
    }

    function finishProcessing() {
        currentAbortController = null;
        activeResponseMessage = null;
        if (queuedMessages.length) {
            var next = queuedMessages.shift();
            renderQueueBar();
            window.setTimeout(function () { startMessageRequest(next); }, 60);
            return;
        }
        isProcessing = false;
        setProcessingUI(false);
    }

    function composeOutgoingMessage(text, attachments) {
        if (!attachments.length) return text;
        var blocks = attachments.map(function (file) {
            return '\n\n附件：' + file.name + '\n```' + file.lang + '\n' + file.content + '\n```';
        }).join('');
        return (text || '请阅读这些附件内容。') + blocks;
    }

    function openFilePicker() {
        fileInput.click();
    }

    function handleFilesSelected() {
        var files = Array.prototype.slice.call(fileInput.files || []);
        fileInput.value = '';
        if (!files.length) return;
        var remainingSlots = Math.max(0, 5 - pendingAttachments.length);
        files = files.slice(0, remainingSlots);
        if (!files.length) {
            addAgentLog('附件已满', '最多同时附加 5 个文件', 'error');
            return;
        }
        Promise.all(files.map(readTextAttachment)).then(function (items) {
            var used = attachmentContentChars();
            items.forEach(function (item) {
                if (!item) return;
                if (used + item.content.length > MAX_ATTACHMENT_CONTENT_CHARS) {
                    addAgentLog('附件总量过大', '附件内容合计最多 ' +
                        formatCharCount(MAX_ATTACHMENT_CONTENT_CHARS) + ' 字符', 'error');
                    return;
                }
                pendingAttachments.push(item);
                used += item.content.length;
            });
            renderAttachmentStrip();
        });
    }

    function attachmentContentChars() {
        return pendingAttachments.reduce(function (total, file) {
            return total + String(file.content || '').length;
        }, 0);
    }

    function readTextAttachment(file) {
        return new Promise(function (resolve) {
            if (file.size > MAX_ATTACHMENT_FILE_BYTES) {
                addAgentLog('附件过大', file.name + ' 超过 ' +
                    Math.round(MAX_ATTACHMENT_FILE_BYTES / 1000) + 'KB', 'error');
                resolve(null);
                return;
            }
            var reader = new FileReader();
            reader.onload = function () {
                resolve({
                    name: file.name,
                    size: file.size,
                    lang: languageForFile(file.name),
                    content: String(reader.result || '')
                });
                addAgentLog('已附加文件', file.name, 'success');
            };
            reader.onerror = function () {
                addAgentLog('读取失败', file.name, 'error');
                resolve(null);
            };
            reader.readAsText(file);
        });
    }

    function languageForFile(name) {
        var ext = (name.split('.').pop() || '').toLowerCase();
        var map = { js: 'javascript', ts: 'typescript', java: 'java', py: 'python', html: 'html', css: 'css', json: 'json', md: 'markdown', xml: 'xml', yml: 'yaml', yaml: 'yaml', sh: 'bash' };
        return map[ext] || ext || 'text';
    }

    function renderAttachmentStrip() {
        attachmentStrip.innerHTML = '';
        attachmentStrip.classList.toggle('has-items', pendingAttachments.length > 0);
        pendingAttachments.forEach(function (file, index) {
            var chip = document.createElement('span');
            chip.className = 'attachment-chip';
            chip.innerHTML = '<i class="fas fa-file-lines"></i><span></span><button title="移除" aria-label="移除附件"><i class="fas fa-times"></i></button>';
            chip.querySelector('span').textContent = file.name;
            chip.querySelector('button').onclick = function () {
                pendingAttachments.splice(index, 1);
                renderAttachmentStrip();
            };
            attachmentStrip.appendChild(chip);
        });
        if (pendingAttachments.length) {
            var budget = document.createElement('span');
            budget.className = 'attachment-budget';
            budget.textContent = formatCharCount(attachmentContentChars()) + ' / ' +
                formatCharCount(MAX_ATTACHMENT_CONTENT_CHARS) + ' 字符';
            attachmentStrip.appendChild(budget);
        }
    }

    function clearAttachments() {
        pendingAttachments = [];
        renderAttachmentStrip();
    }

    function addMessage(role, content, forceScroll) {
        var div = document.createElement('div');
        div.className = 'message ' + role;
        var isUser = role === 'user';
        div.innerHTML =
            '<div class="msg-header ' + role + '">' +
            '<i class="fas ' + (isUser ? 'fa-user' : 'fa-robot') + '"></i> ' + (isUser ? 'You' : 'Code Agent') +
            '</div><div class="msg-body">' + renderMarkdown(content) + '</div>' +
            (isUser ? '' : buildResponseFooter('done', '已完成', String(content || '').length, ''));
        messagesContainer.appendChild(div);
        highlightCode(div);
        scrollToBottom(!!forceScroll || isUser);
        return div;
    }

    function createActiveAssistantMsg(title, subtitle) {
        var empty = messagesContainer.querySelector('.welcome-msg');
        if (empty) empty.remove();
        var div = document.createElement('div');
        div.className = 'message agent agent-response pending';
        div.innerHTML = '<div class="msg-header agent"><i class="fas fa-robot"></i> Code Agent</div>' +
            '<div class="msg-body"><div class="response-status ai-status-card">' +
            '<div class="ai-status-icon"><i class="fas fa-spinner spinner"></i></div>' +
            '<div class="ai-status-main"><div class="ai-status-title"></div><div class="ai-status-sub"></div></div>' +
            '</div><div class="response-tools"></div><div class="response-content"></div></div>' +
            buildResponseFooter('running', '处理中', 0, '');
        messagesContainer.appendChild(div);
        activeResponseMessage = div;
        updateActiveResponseStatus(title, subtitle);
        scrollToBottom(false);
        return div;
    }

    function beginActiveResponse(msgDiv) {
        if (!msgDiv) return;
        msgDiv.classList.remove('pending');
        msgDiv.classList.add('streaming', 'has-content');
        setResponseState(msgDiv, 'running', '生成中');
    }

    function completeActiveResponse(msgDiv, state, label) {
        if (!msgDiv) return;
        msgDiv.classList.remove('pending', 'streaming');
        var content = msgDiv.querySelector('.response-content');
        if (getRawContent(content).trim() || content.children.length) {
            msgDiv.classList.add('has-content');
        } else {
            var icon = msgDiv.querySelector('.ai-status-icon');
            var title = msgDiv.querySelector('.ai-status-title');
            var subtitle = msgDiv.querySelector('.ai-status-sub');
            if (icon) icon.innerHTML = '<i class="fas fa-check"></i>';
            if (title) title.textContent = '已完成';
            if (subtitle) subtitle.textContent = '';
        }
        setResponseState(msgDiv, state || 'done', label || '已完成');
        updateResponseCharCount(msgDiv);
    }

    function updateActiveResponseStatus(title, subtitle) {
        var el = activeResponseMessage;
        if (!el) return;
        var titleEl = el.querySelector('.ai-status-title');
        var subEl = el.querySelector('.ai-status-sub');
        if (titleEl) titleEl.innerHTML = escapeHtml(title || '处理中') + '<span class="ai-status-dots"><span>.</span><span>.</span><span>.</span></span>';
        if (subEl) subEl.textContent = subtitle || '';
        scrollToBottom(false);
    }

    function buildResponseFooter(state, label, charCount, meta) {
        return '<div class="response-footer">' +
            '<span class="response-state ' + escapeAttr(state) + '"><span class="mini-state-dot"></span><span class="response-state-label">' + escapeHtml(label) + '</span></span>' +
            '<span class="response-footer-spacer"></span>' +
            '<span class="response-char-count">本次回复 ' + formatCharCount(charCount) + ' 字符</span>' +
            '<span class="response-meta">' + escapeHtml(meta || '') + '</span></div>';
    }

    function setResponseState(msgDiv, state, label) {
        if (!msgDiv) return;
        var stateEl = msgDiv.querySelector('.response-state');
        if (!stateEl) return;
        stateEl.className = 'response-state ' + state;
        var labelEl = stateEl.querySelector('.response-state-label');
        if (labelEl) labelEl.textContent = label;
    }

    function updateResponseCharCount(msgDiv, explicitCount) {
        if (!msgDiv) return;
        var countEl = msgDiv.querySelector('.response-char-count');
        if (!countEl) return;
        var content = msgDiv.querySelector('.response-content');
        var count = typeof explicitCount === 'number' ? explicitCount : getRawContent(content).length;
        countEl.textContent = '本次回复 ' + formatCharCount(count) + ' 字符';
    }

    function formatCharCount(value) {
        var number = Math.max(0, Number(value) || 0);
        return number.toLocaleString('zh-CN');
    }

    function updateContextUsage(value) {
        contextCharCount = Math.max(0, Number(value) || 0);
        var el = document.getElementById('contextUsage');
        if (el) el.querySelector('span').textContent = '上下文 ' + formatCharCount(contextCharCount) + ' 字符';
    }

    function appendResponseNote(contentDiv, text) {
        var note = document.createElement('div');
        note.style.cssText = 'font-size:11px;color:var(--text-muted);margin-top:8px;';
        note.textContent = text;
        contentDiv.appendChild(note);
    }

    function getRawContent(contentDiv) {
        if (!contentDiv) return '';
        return typeof contentDiv.__rawText === 'string' ? contentDiv.__rawText : '';
    }

    function setRawContent(contentDiv, text) {
        if (contentDiv) contentDiv.__rawText = String(text || '');
    }

    function appendStreamToken(contentDiv, text) {
        setRawContent(contentDiv, getRawContent(contentDiv) + (text || ''));
        if (contentDiv.__renderTimer) return;
        contentDiv.__renderTimer = window.setTimeout(function () {
            contentDiv.__renderTimer = null;
            flushStreamRender(contentDiv, false);
        }, STREAM_RENDER_INTERVAL_MS);
    }

    function flushStreamRender(contentDiv, finalRender) {
        if (!contentDiv) return;
        if (finalRender && contentDiv.__renderTimer) {
            window.clearTimeout(contentDiv.__renderTimer);
            contentDiv.__renderTimer = null;
        }
        var raw = getRawContent(contentDiv);
        contentDiv.innerHTML = renderMarkdown(raw);
        if (finalRender) highlightCode(contentDiv);
        updateResponseCharCount(contentDiv.closest('.agent-response'));
        scrollToBottom(false);
    }

    function appendError(contentDiv, text) {
        var div = document.createElement('div');
        div.style.cssText = 'color:var(--accent-red); margin-top:6px;';
        div.textContent = text;
        contentDiv.appendChild(div);
        scrollToBottom(false);
    }

    function addReplyMeta(msgDiv, durationMs, mode, replyChars) {
        var meta = msgDiv.querySelector('.response-meta');
        if (meta) meta.textContent = (durationMs || 0) + 'ms · ' + (mode || currentMode);
        updateResponseCharCount(msgDiv, replyChars);
    }

    function toolStatusTitle(status) {
        if (status === 'done') return '工具执行完成';
        if (status === 'rejected') return '工具调用已拒绝';
        if (status === 'confirming') return '等待你的确认';
        return 'AI 正在调用工具';
    }

    function addToolToPanel(name, args, status, result) {
        if (!activeResponseMessage) return;
        var toolLog = activeResponseMessage.querySelector('.response-tools');
        if (!toolLog) return;
        toolLog.classList.add('has-items');
        var fullArgs = String(args || '');
        var shortArgs = fullArgs.length > 140 ? fullArgs.substring(0, 140) + '...' : fullArgs;
        var statusLabel = status === 'done' ? '完成' : status === 'rejected' ? '已拒绝' : status === 'confirming' ? '待确认' : '执行中';
        var key = name + '::' + fullArgs;
        var existing = toolItemsByKey[key];
        if (existing) {
            existing.statusEl.className = 'tool-item-status ' + (status || 'running');
            existing.statusEl.textContent = statusLabel;
            if (result) {
                existing.resultText = formatToolResult(result);
                existing.resultEl.textContent = existing.resultText;
            }
            return;
        }

        toolCallCount++;
        var div = document.createElement('div');
        div.className = 'tool-item';
        div.id = 'tool-item-' + toolCallCount;

        var header = document.createElement('div');
        header.className = 'tool-item-header';
        header.innerHTML = '<i class="fas fa-wrench" style="color:var(--accent-green); font-size:11px;"></i>';
        var nameEl = document.createElement('span');
        nameEl.className = 'tool-item-name';
        nameEl.textContent = name || 'tool_call';
        header.appendChild(nameEl);

        var actions = document.createElement('span');
        actions.className = 'tool-item-actions';
        var statusEl = document.createElement('span');
        statusEl.className = 'tool-item-status ' + (status || 'running');
        statusEl.textContent = statusLabel;
        actions.appendChild(statusEl);
        actions.appendChild(makeMiniButton('fa-up-right-and-down-left-from-center', '展开', function () {
            var expanded = div.classList.toggle('expanded');
            argsEl.textContent = expanded ? fullArgs : shortArgs;
        }));
        actions.appendChild(makeMiniButton('fa-copy', '复制参数', function () { copyText(fullArgs); }));
        header.appendChild(actions);
        div.appendChild(header);

        var argsEl = document.createElement('div');
        argsEl.className = 'tool-item-args';
        argsEl.textContent = shortArgs;
        div.appendChild(argsEl);

        var resultEl = document.createElement('div');
        resultEl.className = 'tool-item-result';
        resultEl.textContent = result ? formatToolResult(result) : '';
        div.appendChild(resultEl);

        toolLog.appendChild(div);
        toolItemsByKey[key] = { div: div, statusEl: statusEl, argsEl: argsEl, resultEl: resultEl, resultText: resultEl.textContent };
        scrollToBottom(false);
    }

    function formatToolResult(result) {
        if (!result) return '';
        var parts = [];
        if (result.type === 'command') {
            parts.push('$ ' + (result.command || ''));
            if (result.cwd) parts.push('cwd: ' + result.cwd);
            if (typeof result.exitCode !== 'undefined') parts.push('exit: ' + result.exitCode + ' | ' + (result.durationMs || 0) + 'ms');
            if (result.output) parts.push('\n' + result.output);
        } else {
            if (result.path) parts.push(result.path);
            if (result.diff) parts.push(result.diff);
            if (result.output) parts.push(result.output);
            if (result.error) parts.push('error: ' + result.error);
        }
        return parts.filter(Boolean).join('\n');
    }

    function makeMiniButton(icon, title, handler) {
        var btn = document.createElement('button');
        btn.className = 'tool-mini-btn';
        btn.title = title;
        btn.setAttribute('aria-label', title);
        btn.innerHTML = '<i class="fas ' + icon + '"></i>';
        btn.onclick = handler;
        return btn;
    }

    function copyText(text) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text || '').then(function () {
                addAgentLog('已复制', '内容已复制到剪贴板', 'success');
            }).catch(function () {});
        }
    }

    function showConfirmPanel(runId, confirmKey, name, args) {
        var empty = messagesContainer.querySelector('.welcome-msg');
        if (empty) empty.remove();
        var argsShort = String(args || '').length > 300 ? String(args).substring(0, 300) + '...' : String(args || '');
        var summary = summarizeToolForConfirm(name, args);
        var div = document.createElement('div');
        div.className = 'message agent confirm-msg';
        div.id = 'confirm-msg';
        div.innerHTML = '<div class="msg-header agent" style="color:var(--accent-orange);"><i class="fas fa-exclamation-triangle"></i> 需要确认</div>' +
            '<div class="confirm-msg-body">' +
            '<div class="confirm-msg-title"><i class="fas fa-shield-halved"></i>' + escapeHtml(summary.risk) + '</div>' +
            '<div class="confirm-msg-name">' + escapeHtml(name) + '</div>' +
            '<div style="font-size:12px; color:var(--text-secondary); margin-bottom:8px;">' + escapeHtml(summary.text) + '</div>' +

    function summarizeToolForConfirm(name, args) {
        var parsed = {};
        try { parsed = JSON.parse(args || '{}') || {}; } catch (e) {}
        if (name === 'run_command') {
            return { risk: '将执行命令', text: parsed.command || '请检查命令参数' };
        }
        if (name === 'edit_file') {
            return { risk: '将修改文件', text: parsed.path || '请检查文件路径' };
        }
        if (name === 'write_file') {
            return { risk: '将写入文件', text: parsed.path || '请检查文件路径' };
        }
        return { risk: '将执行工具', text: '请确认本次工具调用' };

    function addAgentLog(title, detail, type) {
        var stack = document.getElementById('toastStack');
        if (!stack) return;

        toast.className = 'agent-toast ' + (type || 'info');

    function renderTaskState(task) {
        var panel = document.getElementById('taskPanel');
        if (!panel) return;
        if (!task) {
            panel.classList.remove('show');
            panel.innerHTML = '';
            return;
        }
        panel.classList.add('show');
        panel.innerHTML = '';
        var head = document.createElement('div');
        head.className = 'task-panel-head';
        var title = document.createElement('div');
        title.className = 'task-panel-title';
        title.textContent = task.objective || '当前任务';
        title.title = task.objective || '';
        var phase = document.createElement('span');
        phase.className = 'task-phase';
        phase.textContent = task.phase || 'DISCOVER';
        head.appendChild(title);
        head.appendChild(phase);
        panel.appendChild(head);
        var steps = document.createElement('div');
        steps.className = 'task-steps';
        var taskSteps = task.steps || [];
        var defaultWorkflow = taskSteps.length === 3 &&
            taskSteps[0].title === '理解需求并定位相关代码' &&
            taskSteps[1].title === '制定并执行修改' &&
            taskSteps[2].title === '运行验证并检查结果';
        if (defaultWorkflow && !task.hasWrites) {
            var simpleStatus = task.phase === 'COMPLETE' ? 'completed' :
                (task.phase === 'BLOCKED' || task.phase === 'CANCELLED' || task.phase === 'INTERRUPTED'
                    ? 'blocked' : (taskSteps[0].status || 'in_progress'));
            taskSteps = [{
                title: task.phase === 'COMPLETE' ? '完成分析与回复' : '分析需求并生成回复',
                status: simpleStatus
            }];
        }
        taskSteps.forEach(function (step) {
            var item = document.createElement('span');
            item.className = 'task-step ' + (step.status || 'pending');
            item.textContent = step.title || '';
            steps.appendChild(item);
        });
        panel.appendChild(steps);
        if (task.hasWrites) {
            var verificationMeta = document.createElement('div');
            verificationMeta.className = 'task-verification';
            verificationMeta.textContent = '验证要求 ' + (task.requiredVerificationLevel || 'SANITY') +
                ' · 当前 ' + (task.bestVerificationLevel || 'NONE');
            panel.appendChild(verificationMeta);
        }
        if (task.blockedReason) {
            var problem = document.createElement('div');
            problem.className = 'task-problem';
            problem.textContent = task.blockedReason;
            panel.appendChild(problem);
        }
    }

    function formatVerificationSummary(verification) {
        if (!verification) return '正在运行检查';
        var command = verification.command || '';
        if (command.length > 70) command = command.substring(0, 70) + '...';
        var level = verification.verificationLevel || verification.level || '';
        return (level ? '[' + level + '] ' : '') + (command || '正在运行检查');
    }

    function switchModel() {

    function findCachedModel(value) {
        for (var i = 0; i < modelsCache.length; i++) {
            if (modelsCache[i].value === value) return modelsCache[i];
        }
        return null;
    }

    function startNewModel() {
        document.getElementById('modelFormHeading').textContent = '新增模型';
        document.getElementById('modelOriginalValue').value = '';
        document.getElementById('modelLabelInput').value = '';
        document.getElementById('modelValueInput').value = '';
        document.getElementById('modelApiUrlInput').value = '';
        document.getElementById('modelApiKeyInput').value = '';
        document.getElementById('modelApiKeyInput').placeholder = '请输入 API Key';
        document.getElementById('modelApiKeyHelp').textContent = '新增模型时必须填写，保存后不会在页面中回显。';
        document.getElementById('modelSelectAfterSave').checked = true;
        setModelConfigStatus('', '');
        renderModelConfigList();
        document.getElementById('modelLabelInput').focus();
    }

    function editModelConfig(value) {
        var model = findCachedModel(value);
        if (!model) return;
        document.getElementById('modelFormHeading').textContent = '编辑模型';
        document.getElementById('modelOriginalValue').value = model.value || '';
        document.getElementById('modelLabelInput').value = model.label || model.value || '';
        document.getElementById('modelValueInput').value = model.value || '';
        document.getElementById('modelApiUrlInput').value = model.api_url || '';
        document.getElementById('modelApiKeyInput').value = '';
        document.getElementById('modelApiKeyInput').placeholder = model.apiKeyConfigured ? '已配置，留空则保留' : '请输入 API Key';
        document.getElementById('modelApiKeyHelp').textContent = model.apiKeyConfigured
            ? 'API Key 已配置；留空保存会保留原 Key。'
            : '当前模型尚未配置 API Key，请填写后保存。';
        document.getElementById('modelSelectAfterSave').checked = model.value === selectedModel;
        setModelConfigStatus('', '');
        renderModelConfigList();
    }

    function renderModelConfigList() {
        var list = document.getElementById('modelConfigList');
        if (!list) return;
        list.innerHTML = '';
        var editing = document.getElementById('modelOriginalValue').value;
        if (!modelsCache.length) {
            var empty = document.createElement('div');
            empty.className = 'sidebar-empty';
            empty.textContent = '暂无模型，请新增一个模型。';
            list.appendChild(empty);
            return;
        }
        modelsCache.forEach(function (model) {
            var row = document.createElement('div');
            row.className = 'model-config-item' + (editing === model.value ? ' editing' : '');
            row.onclick = function () { editModelConfig(model.value); };

            var main = document.createElement('div');
            main.className = 'model-config-item-main';
            var name = document.createElement('div');
            name.className = 'model-config-item-name';
            name.textContent = model.label || model.value || '未命名模型';
            var value = document.createElement('div');
            value.className = 'model-config-item-value';
            value.textContent = model.value || '';
            main.appendChild(name);
            main.appendChild(value);
            row.appendChild(main);

            if (model.value === selectedModel) {
                var badge = document.createElement('span');
                badge.className = 'model-current-badge';
                badge.textContent = '当前';
                row.appendChild(badge);
            }

            var actions = document.createElement('div');
            actions.className = 'model-config-item-actions';
            if (model.value !== selectedModel) {
                var useBtn = document.createElement('button');
                useBtn.type = 'button';
                useBtn.className = 'model-row-btn';
                useBtn.title = '设为当前模型';
                useBtn.setAttribute('aria-label', '设为当前模型');
                useBtn.innerHTML = '<i class="fas fa-check"></i>';
                useBtn.onclick = function (e) { e.stopPropagation(); useModelConfig(model.value); };
                actions.appendChild(useBtn);
            }
            var deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'model-row-btn delete';
            deleteBtn.title = '删除模型';
            deleteBtn.setAttribute('aria-label', '删除模型');
            deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
            deleteBtn.onclick = function (e) { e.stopPropagation(); deleteModelConfig(model.value); };
            actions.appendChild(deleteBtn);
            row.appendChild(actions);
            list.appendChild(row);
        });
    }

    function saveModelConfig() {
        var originalValue = document.getElementById('modelOriginalValue').value;
        var apiKey = document.getElementById('modelApiKeyInput').value.trim();
        var form = {
            label: document.getElementById('modelLabelInput').value.trim(),
            value: document.getElementById('modelValueInput').value.trim(),
            apiUrl: document.getElementById('modelApiUrlInput').value.trim()
        };
        if (apiKey) form.apiKey = apiKey;
        var payload = {
            action: 'saveModel',
            originalValue: originalValue,
            select: document.getElementById('modelSelectAfterSave').checked,
            model: form
        };
        var saveBtn = document.getElementById('modelSaveBtn');
        saveBtn.disabled = true;
        setModelConfigStatus('正在保存…', '');
        fetchJson('/config', { method: 'POST', body: JSON.stringify(payload) }).then(function (d) {
            applyConfigData(d);
            editModelConfig(form.value);
            setModelConfigStatus('模型已保存并立即生效。', 'success');
        }).catch(function (err) {
            setModelConfigStatus(err.message, 'error');
        }).finally(function () {
            saveBtn.disabled = false;
        });
    }

    function useModelConfig(value) {
        setModelConfigStatus('正在切换…', '');
        fetchJson('/config', {
            method: 'POST',
            body: JSON.stringify({ action: 'selectModel', value: value })
        }).then(function (d) {
            applyConfigData(d, value);
            editModelConfig(value);
            setModelConfigStatus('已设为当前模型。', 'success');
        }).catch(function (err) {
            setModelConfigStatus(err.message, 'error');
        });
    }

    function deleteModelConfig(value) {
        var model = findCachedModel(value);
        var label = model ? (model.label || model.value) : value;
        if (!confirm('确定删除模型「' + label + '」吗？')) return;
        setModelConfigStatus('正在删除…', '');
        fetchJson('/config', {
            method: 'POST',
            body: JSON.stringify({ action: 'deleteModel', value: value })
        }).then(function (d) {
            applyConfigData(d);
            if (findCachedModel(selectedModel)) editModelConfig(selectedModel); else startNewModel();
            setModelConfigStatus('模型已删除。', 'success');
        }).catch(function (err) {
            setModelConfigStatus(err.message, 'error');
        });

        status.className = 'model-config-status' + (type ? ' ' + type : '');

        document.getElementById('cwdPickerOverlay').classList.add('open');

    function makeCwdShortcut(label, path, icon) {
        if (!path) return null;
        var button = document.createElement('button');
        button.type = 'button';
        button.className = 'cwd-shortcut';
        button.title = path;
        button.innerHTML = '<i class="fas ' + icon + '"></i><span></span>';
        button.querySelector('span').textContent = label;
        button.onclick = function () { loadCwdPickerDirs(path); };
        return button;
    }

    function renderCwdShortcuts(data) {
        var host = document.getElementById('cwdPickerShortcuts');
        host.innerHTML = '';
        var seen = {};
        function append(label, path, icon) {
            if (!path || seen[path]) return;
            seen[path] = true;
            var button = makeCwdShortcut(label, path, icon);
            if (button) host.appendChild(button);
        }
        append('主目录', data.home, 'fa-house');
        append('当前项目', data.current || currentCwd, 'fa-location-dot');
        (data.roots || []).forEach(function (root, index) {
            append((data.roots || []).length === 1 ? '电脑' : ('磁盘 ' + (root.name || index + 1)), root.path, 'fa-computer');
        });
        getCwdHistory().slice(0, 2).forEach(function (path, index) {
            append('最近 ' + (index + 1), path, 'fa-clock-rotate-left');
        });
    }

    function closeCwdPicker() {
        document.getElementById('cwdPickerOverlay').classList.remove('open');
    }

    function loadCwdPickerDirs(path) {
        var listEl = document.getElementById('cwdPickerList');
        listEl.innerHTML = '<div class="cwd-picker-empty"><i class="fas fa-spinner spinner"></i> 加载中...</div>';
        fetchJson('/cwd/list?path=' + encodeURIComponent(path || '') + '&hidden=' + pickerShowHidden).then(function (d) {
            pickerCurrentPath = d.path || path;
            renderCwdBreadcrumb(pickerCurrentPath);
            renderCwdShortcuts(d);
            var selected = document.getElementById('cwdPickerSelected');
            selected.textContent = pickerCurrentPath;
            selected.title = pickerCurrentPath;
            var dirs = d.dirs || [];
            listEl.innerHTML = '';
            if (d.parent) {
                var parentItem = document.createElement('div');
                parentItem.className = 'cwd-picker-item';
                parentItem.innerHTML = '<i class="fas fa-arrow-turn-up"></i><span>.. 上一级</span>';
                parentItem.onclick = function () { loadCwdPickerDirs(d.parent); };
                listEl.appendChild(parentItem);
            }
            if (dirs.length === 0) {
                var empty = document.createElement('div');
                empty.className = 'cwd-picker-empty';
                empty.textContent = '此目录下没有子文件夹，可以直接选择当前目录';
                listEl.appendChild(empty);
                return;
            }
            dirs.forEach(function (entry) {
                var name = typeof entry === 'string' ? entry : entry.name;
                var childPath = typeof entry === 'string' ? joinDirectoryPath(pickerCurrentPath, name) : entry.path;
                var item = document.createElement('div');
                item.className = 'cwd-picker-item';
                if (entry.readable === false) item.style.opacity = '0.55';
                item.title = childPath;
                item.innerHTML = '<i class="fas fa-folder"></i><span></span>';
                item.querySelector('span').textContent = name;
                item.onclick = function () { loadCwdPickerDirs(childPath); };
                listEl.appendChild(item);
            });
            listEl.scrollTop = 0;
        }).catch(function (err) {
            listEl.innerHTML = '<div class="cwd-picker-empty">加载失败：' + escapeHtml(err.message) + '</div>';
        });
    }

    function joinDirectoryPath(parent, name) {
        var sep = parent.endsWith('/') || parent.endsWith('\\') ? '' : '/';
        return parent + sep + name;
    }

    function toggleCwdHidden() {
        pickerShowHidden = document.getElementById('cwdShowHidden').checked;
        loadCwdPickerDirs(pickerCurrentPath);
    }

    function renderCwdBreadcrumb(path) {
        var el = document.getElementById('cwdPickerBreadcrumb');
        el.innerHTML = '';
        path = path || '';
        var isWindows = /^[A-Za-z]:[\\/]/.test(path);
        var parts = path.split(/[\\/]/).filter(Boolean);
        var accumulated = '';
        if (isWindows) {
            accumulated = parts.shift() + '\\';
            appendCrumb(el, accumulated.replace(/[\\/]$/, ''), accumulated);
        } else {
            accumulated = '/';
            appendCrumb(el, '/', '/');
        }
        parts.forEach(function (p) {
            if (el.children.length) appendSep(el);
            accumulated += (accumulated.endsWith('/') || accumulated.endsWith('\\') ? '' : '/') + p;
            appendCrumb(el, p, accumulated);
        });
    }

    function appendCrumb(parent, label, path) {
        var span = document.createElement('span');
        span.textContent = label;
        span.onclick = function () { loadCwdPickerDirs(path); };
        parent.appendChild(span);
    }

    function appendSep(parent) {
        var sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '/';
        parent.appendChild(sep);
    }

    function confirmCwdPicker() {
        cwdInput.value = pickerCurrentPath;
        markCwdDirty();
        closeCwdPicker();
        setCwd();
    }

    function setProcessingUI(running) {
        var indicator = document.getElementById('statusIndicator');
        var inputArea = document.querySelector('.input-area');
        var sendBtn = document.querySelector('.action-btn.send');
        var attachBtn = document.querySelector('.attach-btn');
        indicator.style.display = running ? 'inline-flex' : 'none';
        inputArea.classList.toggle('processing', running);
        sendBtn.disabled = false;
        sendBtn.title = running ? '追加提问（当前回复完成后自动发送）' : '发送';
        attachBtn.disabled = false;
        userInput.disabled = false;
        userInput.placeholder = running ? '追加提问，Enter 加入队列…' : '输入代码需求... (Enter 发送, Shift+Enter 换行)';
        document.querySelectorAll('[data-lockable]').forEach(function (el) { el.disabled = running; });
        document.getElementById('modelSelect').disabled = running;
        cwdInput.disabled = running;
        if (!running) userInput.focus();
    }

    function openMobilePanel(panel) {
        closeMobilePanels();
        document.getElementById('mobileOverlay').classList.add('open');
        if (panel === 'sessions') {
            document.querySelector('.sidebar').classList.add('open');
        }
    }

    function closeMobilePanels() {
        document.getElementById('mobileOverlay').classList.remove('open');
        document.querySelector('.sidebar').classList.remove('open');
    }

    function isNearBottom() {
        return messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < 120;
    }

    function scrollToBottom(force) {
        if (force || shouldStickToBottom) {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            newMessagesBtn.classList.remove('show');
        } else {
            newMessagesBtn.classList.add('show');
        }
    }

    function jumpToLatest() {
        shouldStickToBottom = true;
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        newMessagesBtn.classList.remove('show');
    }

    function configureMarkdown() {
        if (window.marked) {
            marked.setOptions({ breaks: true, gfm: true, mangle: false, headerIds: false });
        }
    }

    function renderMarkdown(text) {
        text = text == null ? '' : String(text);
        if (window.marked && window.DOMPurify) {
            var html = marked.parse(text);
            var clean = DOMPurify.sanitize(html, { ADD_ATTR: ['target', 'rel'] });
            var wrap = document.createElement('div');
            wrap.innerHTML = clean;
            wrap.querySelectorAll('a').forEach(function (a) {
                var href = a.getAttribute('href') || '';
                if (/^\s*javascript:/i.test(href)) a.removeAttribute('href');
                a.setAttribute('target', '_blank');
                a.setAttribute('rel', 'noopener noreferrer');
            });
            return wrap.innerHTML;
        }
        return '<p>' + escapeHtml(text).replace(/\n/g, '<br>') + '</p>';
    }

    function highlightCode(root) {
        if (window.Prism) Prism.highlightAllUnder(root);
    }

    function escapeHtml(text) {
        text = text == null ? '' : String(text);
        var m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, function (c) { return m[c]; });
    }

    function escapeAttr(text) {
        return escapeHtml(text).replace(/`/g, '&#096;');
    }

    initApp();
</script>

<div class="cwd-picker-overlay" id="cwdPickerOverlay" onclick="closeCwdPicker()">
    <div class="cwd-picker" onclick="event.stopPropagation()">
        <div class="cwd-picker-header">
            <span><i class="fas fa-folder-open" style="margin-right:6px;"></i>选择工作目录</span>
            <button class="action-btn" aria-label="关闭目录选择器" onclick="closeCwdPicker()" style="font-size:14px;"><i class="fas fa-times"></i></button>
        </div>
        <div class="cwd-picker-shortcuts" id="cwdPickerShortcuts"></div>
        <div class="cwd-picker-breadcrumb" id="cwdPickerBreadcrumb"></div>
        <div class="cwd-picker-list" id="cwdPickerList"></div>
        <div class="cwd-picker-footer">
            <span class="cwd-picker-selected" id="cwdPickerSelected" title=""></span>
            <label class="cwd-hidden-toggle"><input type="checkbox" id="cwdShowHidden" onchange="toggleCwdHidden()">显示隐藏目录</label>
            <button class="cwd-picker-select-btn" onclick="confirmCwdPicker()">选择此目录</button>
        </div>
    </div>
</div>
</body>
</html>

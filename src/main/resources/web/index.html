<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Agent - AI 编程助手</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-body: #f5f5f5;
            --bg-white: #ffffff;
            --bg-gray: #f9f9f9;
            --accent-blue: #0969da;
            --accent-green: #1a7f37;
            --accent-orange: #9a6700;
            --accent-red: #cf222e;
            --text-main: #24292f;
            --text-secondary: #57606a;
            --text-muted: #8b949e;
            --border-color: #d0d7de;
            --border-light: #e8ebef;
            --font-mono: 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ================= 侧边栏 ================= */
        .sidebar {
            width: 272px;
            background: var(--bg-white);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar-header {
            height: 36px; padding: 0 12px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            font-size: 13px; font-weight: 600; color: var(--text-main);
        }
        .sidebar-action {
            width: 24px; height: 24px; border: none; border-radius: 5px;
            background: transparent; color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .sidebar-action:hover { background: var(--bg-gray); color: var(--text-main); }
        .sidebar-section {
            min-height: 0; display: flex; flex-direction: column; flex: 1;
        }
        .sidebar-section.project-files {
            flex: 0 0 240px;
            border-bottom: 1px solid var(--border-color);
        }
        .section-title {
            height: 30px; padding: 0 10px; display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.3px;
            background: var(--bg-gray); border-bottom: 1px solid var(--border-light);
        }
        .section-title .section-count { margin-left: auto; font-weight: 500; color: var(--text-muted); }
        .sidebar-list {
            flex: 1; overflow-y: auto; padding: 6px;
        }
        .sidebar-empty {
            padding: 12px 8px; color: var(--text-muted); font-size: 12px; line-height: 1.5;
        }
        .project-tree-item {
            min-height: 28px; padding: 5px 7px; border-radius: 5px;
            display: flex; align-items: center; gap: 7px;
            color: var(--text-secondary); cursor: pointer; font-size: 12px;
        }
        .project-tree-item:hover { background: var(--bg-gray); color: var(--text-main); }
        .project-tree-item i { width: 14px; color: var(--accent-blue); text-align: center; }
        .project-tree-item.file i { color: var(--text-muted); }
        .project-tree-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .project-tree-path {
            padding: 7px 8px 4px; color: var(--text-muted); font-size: 11px;
            font-family: var(--font-mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .project-group {
            margin-bottom: 10px;
        }
        .project-title {
            min-height: 34px; padding: 6px 8px; display: flex; align-items: center; gap: 9px;
            color: var(--text-main); font-size: 14px; font-weight: 500;
        }
        .project-title i {
            width: 16px; color: var(--text-secondary); text-align: center;
        }
        .project-name {
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .session-row {
            min-height: 26px; border-radius: 5px; padding: 4px 6px;
            display: flex; align-items: center; gap: 6px;
            color: var(--text-secondary); cursor: pointer; font-size: 12px;
        }
        .session-row:hover { background: var(--bg-gray); color: var(--text-main); }
        .session-row {
            margin-left: 28px; align-items: center; flex-direction: row; gap: 8px;
            padding: 8px 10px; min-height: 38px; font-size: 14px;
        }
        .session-row.active { background: #eaeef2; color: var(--text-main); font-weight: 600; }
        .session-title { flex: 1; color: inherit; font-weight: inherit; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .session-meta {
            color: var(--text-muted); font-size: 13px; white-space: nowrap;
        }

        /* ================= 工作区 ================= */
        .workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tab-bar {
            height: 36px; background: var(--bg-white);
            display: flex; align-items: center;
            padding: 0 12px; border-bottom: 1px solid var(--border-color);
        }
        .tab {
            padding: 6px 14px; font-size: 13px;
            background: var(--bg-body); border: 1px solid var(--border-color);
            border-bottom: none; border-radius: 6px 6px 0 0;
            margin-right: 2px; cursor: pointer; color: var(--text-secondary);
            display: flex; align-items: center;
        }
        .tab.active { background: var(--bg-white); color: var(--text-main); border-top: 2px solid var(--accent-blue); font-weight: 500; }
        .tab i { margin-right: 6px; font-size: 12px; }
        .cwd-wrapper {
            display: flex; align-items: center; gap: 5px;
            background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 6px;
            padding: 0 8px; margin: 0 8px; min-width: 140px; max-width: 320px; height: 24px;
        }
        .cwd-wrapper:focus-within { border-color: var(--accent-blue); }
        .cwd-input {
            border: none; outline: none; background: transparent;
            font-size: 12px; color: var(--text-main);
            font-family: var(--font-mono); padding: 0; width: 100%; height: 100%;
        }
        .cwd-input::placeholder { color: var(--text-muted); }
        .cwd-browse-btn {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            padding: 2px 4px; font-size: 11px; border-radius: 4px; transition: all 0.15s;
            flex-shrink: 0; display: flex; align-items: center;
        }
        .cwd-browse-btn:hover { color: var(--accent-blue); background: var(--bg-gray); }
        .cwd-picker-overlay {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.4); justify-content: center; align-items: center;
        }
        .cwd-picker-overlay.open { display: flex; }
        .cwd-picker {
            width: 620px; height: min(560px, calc(100vh - 48px)); background: var(--bg-white);
            border: 1px solid var(--border-color); border-radius: 10px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.18);
        }
        .cwd-picker-header {
            padding: 10px 14px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; font-weight: 600; color: var(--text-main);
            display: flex; justify-content: space-between; align-items: center;
        }
        .cwd-picker-breadcrumb {
            padding: 8px 14px; font-size: 12px; color: var(--text-secondary);
            border-bottom: 1px solid var(--border-light); background: var(--bg-gray);
            display: flex; align-items: center; gap: 2px; flex-wrap: wrap;
            font-family: var(--font-mono);
        }
        .cwd-picker-breadcrumb span { cursor: pointer; padding: 2px 5px; border-radius: 4px; transition: all 0.1s; }
        .cwd-picker-breadcrumb span:hover { background: var(--border-light); color: var(--accent-blue); }
        .cwd-picker-breadcrumb .sep { color: var(--text-muted); cursor: default; padding: 0 1px; }
        .cwd-picker-breadcrumb .sep:hover { background: none; color: var(--text-muted); }
        .cwd-picker-list {
            flex: 1; overflow-y: auto; padding: 6px 0; min-height: 180px;
        }
        .cwd-picker-shortcuts {
            display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 14px;
            border-bottom: 1px solid var(--border-light); background: var(--bg-white);
        }
        .cwd-shortcut {
            border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-gray);
            color: var(--text-secondary); cursor: pointer; font-size: 12px; padding: 5px 9px;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .cwd-shortcut:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .cwd-picker-item {
            padding: 7px 14px; font-size: 13px; color: var(--text-main);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: background 0.1s;
        }
        .cwd-picker-item:hover { background: var(--bg-gray); }
        .cwd-picker-item i { color: var(--accent-blue); font-size: 12px; width: 16px; text-align: center; }
        .cwd-history-label {
            font-size: 11px; color: var(--text-muted); padding: 8px 14px 4px;
            display: flex; align-items: center; gap: 6px;
        }
        .cwd-history-item i { color: var(--accent-orange) !important; }
        .cwd-history-path {
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
        }
        .cwd-picker-empty {
            padding: 30px 14px; text-align: center; color: var(--text-muted); font-size: 13px;
        }
        .cwd-picker-footer {
            padding: 10px 14px; border-top: 1px solid var(--border-light);
            display: flex; align-items: center; gap: 10px;
        }
        .cwd-picker-selected {
            flex: 1; min-width: 0; color: var(--text-secondary); font-size: 11px;
            font-family: var(--font-mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .cwd-hidden-toggle { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
        .cwd-picker-select-btn {
            padding: 6px 16px; font-size: 13px; font-weight: 500;
            background: var(--accent-blue); color: white; border: none;
            border-radius: 6px; cursor: pointer; transition: background 0.15s;
        }
        .cwd-picker-select-btn:hover { background: #0757b5; }
        .tab-btn {
            font-size: 12px; padding: 4px 12px; border: 1px solid var(--border-color);
            border-radius: 6px; background: var(--bg-white); color: var(--text-secondary);
            cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center;
            transition: all 0.15s;
        }
        .tab-btn:hover { background: var(--bg-gray); color: var(--text-main); }

        /* ================= 主内容 ================= */
        .main-content { flex: 1; display: flex; overflow: hidden; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages-container { flex: 1; overflow-y: auto; padding: 28px 28px 24px; background: #fbfbfa; scroll-behavior: smooth; }

        /* ================= 消息样式 ================= */
        .message { margin-bottom: 22px; max-width: 920px; margin-left: auto; margin-right: auto; width: 100%; }
        .msg-header {
            display: flex; align-items: center; margin-bottom: 6px;
            font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
        }
        .msg-header.agent { color: var(--accent-blue); }
        .msg-header.user { color: var(--accent-green); }
        .msg-header i { margin-right: 6px; }
        .msg-body {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px 16px;
            line-height: 1.7;
            font-size: 14px;
            color: var(--text-main);
        }
        .msg-body h1, .msg-body h2, .msg-body h3, .msg-body h4, .msg-body h5, .msg-body h6 {
            color: var(--text-main); margin: 16px 0 8px; font-weight: 600;
        }
        .msg-body h1 { font-size: 20px; border-bottom: 1px solid var(--border-light); padding-bottom: 6px; }
        .msg-body h2 { font-size: 17px; border-bottom: 1px solid var(--border-light); padding-bottom: 4px; }
        .msg-body h3 { font-size: 15px; }
        .msg-body h4 { font-size: 14px; }
        .msg-body p { margin: 6px 0; }
        .msg-body ul, .msg-body ol { margin: 6px 0 6px 22px; }
        .msg-body li { margin: 3px 0; }
        .msg-body strong { color: var(--text-main); font-weight: 600; }
        .msg-body em { color: var(--text-secondary); }
        .msg-body a { color: var(--accent-blue); text-decoration: none; }
        .msg-body a:hover { text-decoration: underline; }
        .msg-body blockquote {
            border-left: 3px solid var(--border-color);
            padding: 4px 12px; margin: 8px 0;
            color: var(--text-secondary); background: var(--bg-gray);
            border-radius: 0 4px 4px 0;
        }
        .msg-body code {
            background: #eff1f3; padding: 2px 6px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 13px; color: var(--accent-red);
        }
        .msg-body pre {
            background: var(--bg-gray); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 12px; margin: 8px 0;
            overflow-x: auto; font-family: var(--font-mono); font-size: 13px; line-height: 1.5;
        }
        .msg-body pre code { background: none; padding: 0; color: var(--text-main); }
        .msg-body table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .msg-body th, .msg-body td { border: 1px solid var(--border-color); padding: 6px 10px; font-size: 13px; text-align: left; }
        .msg-body th { background: var(--bg-gray); font-weight: 600; }
        .msg-body hr { border: none; border-top: 1px solid var(--border-light); margin: 12px 0; }

        /* ================= 工具调用 ================= */
        .tool-block {
            background: var(--bg-white); border: 1px solid var(--border-color);
            border-radius: 8px; margin: 10px 0; overflow: hidden;
        }
        .tool-header {
            background: var(--bg-gray); padding: 8px 12px; font-size: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .tool-header i { margin-right: 6px; color: var(--accent-green); }
        .tool-content { padding: 0; max-height: 300px; overflow-y: auto; }
        .tool-content pre { margin: 0 !important; border-radius: 0 !important; border: none !important; }

        /* ================= 底部输入栏 ================= */
        .input-area { padding: 10px 28px 12px; background: #fbfbfa; }
        .input-wrapper {
            max-width: 920px; margin: 0 auto; position: relative;
            background: var(--bg-white); border: 1px solid var(--border-color);
            border-radius: 14px; display: flex; align-items: flex-end;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: 0 5px 18px rgba(31,35,40,0.07);
        }
        .input-wrapper:focus-within { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(9,105,218,0.15); }
        textarea {
            width: 100%; background: transparent; border: none;
            color: var(--text-main); resize: none;
            font-family: var(--font-mono); font-size: 14px;
            padding: 12px; outline: none; max-height: 150px;
        }
        textarea::placeholder { color: var(--text-muted); }
        .input-actions { display: flex; padding: 8px; gap: 4px; }
        .action-btn {
            width: 32px; height: 32px; border-radius: 6px;
            border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .action-btn:hover { background: var(--bg-gray); color: var(--text-main); }
        .action-btn.send { background: var(--accent-blue); color: white; }
        .action-btn.send:hover { background: #0757b5; }

        /* ================= 工具栏 ================= */
        .input-toolbar {
            max-width: 920px; margin: 7px auto 0;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .toolbar-select {
            background: var(--bg-white); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 6px;
            padding: 4px 24px 4px 8px; font-size: 12px;
            outline: none; cursor: pointer; appearance: auto;
        }
        .toolbar-select:focus { border-color: var(--accent-blue); }
        .model-config-btn {
            width: 28px; height: 28px; border: 1px solid var(--border-color);
            border-radius: 6px; background: var(--bg-white); color: var(--text-secondary);
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
        }
        .model-config-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .toolbar-sep { width: 1px; height: 18px; background: var(--border-color); flex-shrink: 0; }
        .mode-btns { display: flex; gap: 3px; }
        .mode-btn {
            padding: 3px 12px; font-size: 12px; font-weight: 500;
            border: 1px solid var(--border-color); border-radius: 6px;
            background: var(--bg-white); color: var(--text-secondary);
            cursor: pointer; transition: all 0.15s;
        }
        .mode-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .mode-btn.active { background: #ddf4ff; border-color: var(--accent-blue); color: var(--accent-blue); }

        /* ================= 模型配置 ================= */
        .model-config-overlay {
            display: none; position: fixed; inset: 0; z-index: 1200;
            background: rgba(36,41,47,0.45); align-items: center; justify-content: center;
            padding: 20px;
        }
        .model-config-overlay.open { display: flex; }
        .model-config-dialog {
            width: min(820px, 100%); max-height: min(680px, calc(100vh - 40px));
            background: var(--bg-white); border: 1px solid var(--border-color);
            border-radius: 12px; box-shadow: 0 18px 50px rgba(31,35,40,0.24);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .model-config-header {
            min-height: 52px; padding: 10px 16px; border-bottom: 1px solid var(--border-light);
            display: flex; align-items: center; gap: 10px;
        }
        .model-config-title { flex: 1; font-size: 15px; font-weight: 600; }
        .model-config-subtitle { color: var(--text-muted); font-size: 11px; font-weight: 400; margin-top: 2px; }
        .model-config-body { display: grid; grid-template-columns: 280px minmax(0, 1fr); min-height: 0; flex: 1; }
        .model-list-panel { border-right: 1px solid var(--border-light); display: flex; flex-direction: column; min-height: 0; }
        .model-list-header {
            padding: 10px 12px; background: var(--bg-gray); border-bottom: 1px solid var(--border-light);
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            font-size: 12px; font-weight: 600;
        }
        .model-add-btn, .model-form-btn {
            border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-white);
            color: var(--text-secondary); cursor: pointer; font-size: 12px; padding: 6px 10px;
        }
        .model-add-btn:hover, .model-form-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .model-config-list { overflow-y: auto; padding: 7px; }
        .model-config-item {
            padding: 9px; border: 1px solid transparent; border-radius: 7px;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .model-config-item:hover { background: var(--bg-gray); }
        .model-config-item.editing { border-color: #b6d7ff; background: #f4f8ff; }
        .model-config-item-main { min-width: 0; flex: 1; }
        .model-config-item-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .model-config-item-value { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .model-current-badge { color: var(--accent-green); font-size: 10px; white-space: nowrap; }
        .model-config-item-actions { display: flex; gap: 2px; }
        .model-row-btn {
            width: 25px; height: 25px; border: none; border-radius: 5px;
            background: transparent; color: var(--text-muted); cursor: pointer;
        }
        .model-row-btn:hover { background: var(--border-light); color: var(--text-main); }
        .model-row-btn.delete:hover { background: #fff1f1; color: var(--accent-red); }
        .model-form-panel { padding: 18px; overflow-y: auto; }
        .model-form-heading { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
        .model-form-grid { display: grid; gap: 12px; }
        .model-field label { display: block; color: var(--text-secondary); font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        .model-field input {
            width: 100%; border: 1px solid var(--border-color); border-radius: 7px;
            background: var(--bg-white); color: var(--text-main); font-size: 13px;
            padding: 8px 10px; outline: none;
        }
        .model-field input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(9,105,218,0.12); }
        .model-field-help { color: var(--text-muted); font-size: 11px; line-height: 1.5; margin-top: 4px; }
        .model-select-after-save { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 12px; }
        .model-select-after-save input { width: auto; }
        .model-config-status { min-height: 18px; margin-top: 10px; font-size: 12px; color: var(--text-muted); }
        .model-config-status.error { color: var(--accent-red); }
        .model-config-status.success { color: var(--accent-green); }
        .model-form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
        .model-form-btn.primary { background: var(--accent-blue); border-color: var(--accent-blue); color: white; }
        .model-form-btn.primary:hover { background: #0757b5; color: white; }

        .confirm-msg {
            max-width: 920px; margin: 0 auto 16px; width: 100%;
        }
        .ai-status-card {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-secondary);
        }
        .agent-response.pending .msg-body { min-height: 64px; }
        .agent-response.streaming .msg-body { border-color: #b6d7ff; }
        .agent-response .response-content:empty { display: none; }
        .agent-response.has-content .response-status { display: none; }
        .agent-response.has-content .msg-body { min-height: 0; }
        .response-tools { display: none; margin: 10px 0 4px; border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; }
        .response-tools.has-items { display: block; }
        .response-tools .tool-item:last-child { border-bottom: none; }
        .response-tools .tool-item { background: var(--bg-gray); }
        .task-panel {
            display: none; padding: 9px 16px; border-bottom: 1px solid var(--border-light);
            background: #f6f8fa; font-size: 12px; color: var(--text-secondary);
        }
        .task-panel.show { display: block; }
        .task-panel-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .task-panel-title { color: var(--text-main); font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .task-phase { margin-left: auto; color: var(--accent-blue); font-family: var(--font-mono); font-size: 11px; }
        .task-steps { display: flex; gap: 10px; flex-wrap: wrap; }
        .task-step::before { content: '○'; margin-right: 4px; color: var(--text-muted); }
        .task-step.completed::before { content: '✓'; color: var(--accent-green); }
        .task-step.in_progress::before { content: '●'; color: var(--accent-blue); }
        .task-step.blocked::before { content: '!'; color: var(--accent-red); }
        .task-problem { color: var(--accent-red); margin-top: 5px; }
        .task-verification { color: var(--text-muted); margin-top: 5px; font-size: 12px; }
        .toast-stack { position: fixed; right: 16px; top: 52px; z-index: 1600; display: grid; gap: 7px; max-width: 380px; }
        .agent-toast { background: #24292f; color: white; border-radius: 7px; padding: 9px 12px; box-shadow: 0 6px 20px rgba(0,0,0,.2); font-size: 12px; }
        .agent-toast.error { background: #a40e26; }
        .agent-toast.success { background: #116329; }
        .response-footer {
            display: flex; align-items: center; gap: 10px; min-height: 24px;
            margin-top: 7px; color: var(--text-muted); font-size: 11px;
        }
        .response-state { display: inline-flex; align-items: center; gap: 5px; font-weight: 600; }
        .response-state .mini-state-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue); }
        .response-state.running { color: var(--accent-blue); }
        .response-state.running .mini-state-dot { animation: pulse 1.3s ease-in-out infinite; }
        .response-state.done { color: var(--accent-green); }
        .response-state.done .mini-state-dot { background: var(--accent-green); }
        .response-state.stopped, .response-state.error { color: var(--accent-red); }
        .response-state.stopped .mini-state-dot, .response-state.error .mini-state-dot { background: var(--accent-red); }
        .response-footer-spacer { flex: 1; }
        .ai-status-icon {
            width: 26px; height: 26px; border-radius: 50%;
            background: #ddf4ff; color: var(--accent-blue);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .ai-status-main { flex: 1; min-width: 0; }
        .ai-status-title {
            color: var(--text-main); font-weight: 600; font-size: 14px; margin-bottom: 2px;
        }
        .ai-status-sub {
            font-size: 12px; color: var(--text-muted);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .ai-status-dots span {
            display: inline-block; animation: blink 1.4s infinite; opacity: 0.25;
        }
        .ai-status-dots span:nth-child(2) { animation-delay: 0.2s; }
        .ai-status-dots span:nth-child(3) { animation-delay: 0.4s; }
        .confirm-msg-body {
            background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
            padding: 14px 16px;
        }
        .confirm-msg-title {
            font-size: 13px; font-weight: 600; color: var(--accent-orange); margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .confirm-msg-name { font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }
        .confirm-msg-args {
            font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono);
            background: var(--bg-white); border: 1px solid var(--border-light); border-radius: 6px;
            padding: 8px 10px; max-height: 100px; overflow-y: auto; white-space: pre-wrap; margin-bottom: 10px;
        }
        .confirm-msg-btns { display: flex; gap: 8px; }
        .confirm-btn {
            flex: 1; padding: 6px 0; font-size: 12px; font-weight: 500;
            border: 1px solid var(--border-color); border-radius: 6px;
            cursor: pointer; transition: all 0.15s;
        }
        .confirm-btn-approve { background: var(--accent-green); color: white; border-color: var(--accent-green); }
        .confirm-btn-approve:hover { background: #156d30; }
        .confirm-btn-reject { background: var(--bg-white); color: var(--text-secondary); }
        .confirm-btn-reject:hover { background: #fef2f2; color: var(--accent-red); border-color: var(--accent-red); }
        .confirm-btn-approveAll { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        .confirm-btn-approveAll:hover { background: #0757b5; }
        .tool-item {
            padding: 8px 12px; border-bottom: 1px solid var(--border-light);
            font-size: 12px;
        }
        .tool-item-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
        .tool-item-name { font-weight: 600; color: var(--text-main); }
        .tool-item-status { font-size: 11px; margin-left: auto; }
        .tool-item-status.running { color: var(--accent-blue); }
        .tool-item-status.done { color: var(--accent-green); }
        .tool-item-status.rejected { color: var(--accent-red); }
        .tool-item-status.confirming { color: var(--accent-orange); }
        .tool-item-args {
            font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);
            white-space: pre-wrap; max-height: 60px; overflow-y: auto;
        }

        /* ================= 动画 ================= */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        .status-indicator {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--accent-orange); font-weight: 500;
            padding: 0 10px; margin-left: 8px;
        }
        .context-usage {
            display: inline-flex; align-items: center; gap: 6px; margin-left: 8px;
            color: var(--text-secondary); font-size: 11px; padding: 4px 8px;
            border: 1px solid var(--border-light); border-radius: 999px; background: var(--bg-gray);
            white-space: nowrap;
        }
        .context-usage i { color: var(--accent-blue); }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-orange);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.25; }
            40% { opacity: 1; }
        }
        @media (max-width: 768px) {
            .sidebar { width: 0; display: none; }
        }

        /* ================= 优化交互与移动端 ================= */
        button:disabled, select:disabled, input:disabled, textarea:disabled {
            cursor: not-allowed;
        }
        .workspace { min-width: 0; }
        .sidebar-header-actions { display: flex; align-items: center; gap: 4px; }
        .sidebar-search {
            padding: 8px 8px 6px;
            border-bottom: 1px solid var(--border-light);
        }
        .sidebar-search input {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 7px 9px;
            font-size: 12px;
            outline: none;
            color: var(--text-main);
            background: var(--bg-white);
        }
        .sidebar-search input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(9,105,218,0.12); }
        .project-title { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.2px; }
        .session-row { position: relative; }
        .session-row:hover .session-actions, .session-row:focus-within .session-actions { opacity: 1; pointer-events: auto; }
        .session-actions {
            display: flex; align-items: center; gap: 2px;
            opacity: 0; pointer-events: none; transition: opacity 0.12s;
        }
        .session-action-btn {
            width: 24px; height: 24px; border: none; border-radius: 5px;
            background: transparent; color: var(--text-muted); cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .session-action-btn:hover { background: var(--border-light); color: var(--text-main); }
        .session-action-btn.delete:hover { color: var(--accent-red); background: #fff1f1; }
        .top-actions { display:flex; align-items:center; gap:6px; padding-right:4px; }
        .cwd-wrapper.dirty { border-color: var(--accent-orange); background: #fff8dc; }
        .cwd-apply-btn {
            background: transparent; border: none; color: var(--accent-green); cursor: pointer;
            display: none; align-items: center; justify-content: center;
            width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0;
        }
        .cwd-wrapper.dirty .cwd-apply-btn { display: flex; }
        .cwd-apply-btn:hover { background: rgba(26,127,55,0.12); }
        .mobile-panel-bar {
            display: none;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            padding: 6px 8px;
            gap: 6px;
        }
        .mobile-panel-btn {
            flex: 1; border: 1px solid var(--border-color); border-radius: 6px;
            background: var(--bg-white); color: var(--text-secondary);
            font-size: 12px; padding: 7px 4px; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; gap: 5px;
        }
        .mobile-panel-btn:hover { color: var(--accent-blue); border-color: var(--accent-blue); }
        .mobile-overlay {
            display: none; position: fixed; inset: 0; z-index: 900;
            background: rgba(36,41,47,0.38);
        }
        .mobile-overlay.open { display: block; }
        .chat-panel { position: relative; }
        .new-messages-btn {
            display: none; position: absolute; right: 22px; bottom: 118px; z-index: 20;
            border: 1px solid var(--border-color); border-radius: 999px;
            background: var(--bg-white); color: var(--accent-blue);
            font-size: 12px; font-weight: 600; padding: 7px 12px;
            box-shadow: 0 8px 22px rgba(31,35,40,0.12); cursor: pointer;
        }
        .new-messages-btn.show { display: inline-flex; align-items: center; gap: 6px; }
        .message.user { display: flex; flex-direction: column; align-items: flex-end; }
        .message.user .msg-header { color: var(--accent-green); justify-content: flex-end; }
        .message.user .msg-body {
            max-width: min(720px, 78%);
            background: #f0fff4;
            border-color: #b7eac8;
        }
        .message.agent .msg-body { box-shadow: 0 1px 0 rgba(31,35,40,0.02); }
        .msg-body img { max-width: 100%; border-radius: 6px; }
        .msg-body pre { position: relative; }
        .msg-body table { display: block; overflow-x: auto; }
        .action-btn.stop { background: transparent; color: var(--accent-red); display: none; }
        .action-btn.stop:hover { background: #a40e26; color: white; }
        .input-area.processing .action-btn.stop { display: flex; }
        .attachment-strip {
            max-width: 920px; margin: 6px auto 0;
            display: none; flex-wrap: wrap; gap: 6px;
        }
        .attachment-strip.has-items { display: flex; }
        .attachment-chip {
            display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid var(--border-color); border-radius: 999px;
            background: var(--bg-gray); color: var(--text-secondary);
            font-size: 12px; padding: 4px 8px;
        }
        .attachment-chip button {
            border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; width: 16px; height: 16px; display: inline-flex;
            align-items: center; justify-content: center;
        }
        .attachment-budget {
            display: inline-flex; align-items: center; margin-left: auto;
            color: var(--text-muted); font-size: 11px; padding: 4px 2px;
        }
        .queue-bar {
            max-width: 920px; margin: 0 auto 7px; display: none;
            align-items: center; gap: 8px; color: var(--text-secondary);
            font-size: 12px; padding: 7px 10px; border: 1px solid #c9d8ee;
            background: #f4f8ff; border-radius: 8px;
        }
        .queue-bar.show { display: flex; }
        .queue-bar i { color: var(--accent-blue); }
        .queue-bar .queue-summary { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .queue-clear {
            border: none; background: transparent; color: var(--text-muted); cursor: pointer;
            font-size: 12px; padding: 2px 5px; border-radius: 4px;
        }
        .queue-clear:hover { color: var(--accent-red); background: #fff1f1; }
        .queued-badge {
            display: inline-flex; align-items: center; gap: 5px; margin-top: 6px;
            color: var(--accent-blue); font-size: 11px; font-weight: 500;
        }
        .message.user.queued { opacity: 0.76; }
        .toolbar-spacer { flex: 1; }
        .tool-item-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; }
        .tool-mini-btn {
            border: none; border-radius: 4px; background: transparent; color: var(--text-muted);
            width: 22px; height: 22px; cursor: pointer;
        }
        .tool-mini-btn:hover { background: var(--border-light); color: var(--text-main); }
        .tool-item.expanded .tool-item-args { max-height: 220px; }
        .tool-item-result {
            display: none;
            margin-top: 6px;
            border-top: 1px solid var(--border-light);
            padding-top: 6px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            max-height: 260px;
            overflow: auto;
        }
        .tool-item.expanded .tool-item-result { display: block; }
        .panel-empty, .status-line {
            color: var(--text-muted); font-size: 12px; line-height: 1.5; padding: 4px;
        }
        .quick-action {
            border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-white);
            color: var(--text-secondary); cursor: pointer; font-size: 12px; padding: 4px 8px;
        }
        .quick-action:hover { color: var(--accent-blue); border-color: var(--accent-blue); }

        @media (max-width: 1024px) {
            .mobile-panel-bar { display: flex; }
        }
        @media (max-width: 768px) {
            body { min-width: 0; }
            .sidebar {
                display: flex; width: min(320px, 88vw);
                position: fixed; top: 0; left: -330px; bottom: 0; z-index: 1000;
                box-shadow: 12px 0 32px rgba(31,35,40,0.18);
                transition: left 0.18s ease;
            }
            .sidebar.open { left: 0; }
            .tab-bar {
                min-height: 42px; height: auto; flex-wrap: wrap; gap: 6px;
                padding: 6px 8px;
            }
            .tab { display: none; }
            .cwd-wrapper { order: 3; width: 100%; max-width: none; margin: 0; height: 30px; }
            .top-actions { margin-left: auto; }
            .tab-btn { padding: 6px 9px; }
            .messages-container { padding: 14px 10px; }
            .message { margin-bottom: 12px; }
            .message.user .msg-body { max-width: 92%; }
            .input-area { padding: 8px 10px; }
            .input-wrapper, .input-toolbar, .attachment-strip, .queue-bar { max-width: none; }
            .input-toolbar { gap: 6px; }
            .toolbar-select { max-width: 145px; }
            .mode-btn { padding: 4px 9px; }
            .cwd-picker { width: calc(100vw - 24px); max-height: calc(100vh - 44px); }
            .new-messages-btn { right: 12px; bottom: 132px; }
            .model-config-overlay { padding: 12px; }
            .model-config-dialog { max-height: calc(100vh - 24px); }
            .model-config-body { grid-template-columns: 1fr; overflow-y: auto; }
            .model-list-panel { border-right: none; border-bottom: 1px solid var(--border-light); max-height: 240px; }
            .model-form-panel { overflow: visible; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <span>会话</span>
        <div class="sidebar-header-actions">
            <button class="sidebar-action" title="新对话" aria-label="新对话" onclick="newSession()" data-lockable><i class="fas fa-plus"></i></button>
            <button class="sidebar-action" title="刷新" aria-label="刷新侧栏" onclick="refreshSidebar()"><i class="fas fa-rotate"></i></button>
        </div>
    </div>
    <div class="sidebar-section project-files">
        <div class="section-title">
            <i class="fas fa-folder-tree"></i>
            项目文件
            <button class="sidebar-action" title="刷新文件树" aria-label="刷新文件树" onclick="loadProjectTree(projectTreePath)" style="margin-left:auto;"><i class="fas fa-rotate"></i></button>
        </div>
        <div class="project-tree-path" id="projectTreePath">/</div>
        <div class="sidebar-list" id="projectTreeList">
            <div class="sidebar-empty">请选择工作目录</div>
        </div>
    </div>
    <div class="sidebar-section sessions">
        <div class="section-title"><i class="fas fa-comments"></i>会话</div>
        <div class="sidebar-search">
            <input type="search" id="sessionSearch" placeholder="搜索会话或项目">
        </div>
        <div class="sidebar-list" id="sessionList">
            <div class="sidebar-empty">暂无会话</div>
        </div>
    </div>
</div>

<div class="workspace">
    <div class="tab-bar">
        <div class="tab active"><i class="fas fa-robot"></i> Agent Chat</div>
        <div id="statusIndicator" class="status-indicator" style="display:none;">
            <span class="status-dot"></span>执行中
        </div>
        <div id="contextUsage" class="context-usage" title="包含系统提示、对话、工具调用和工具结果">
            <i class="fas fa-gauge-high"></i><span>上下文 0 字符</span>
        </div>
        <div style="flex:1;"></div>
        <div class="cwd-wrapper">
            <i class="fas fa-folder-open" style="font-size:11px; color:var(--text-muted);"></i>
            <input type="text" id="cwdInput" class="cwd-input" placeholder="工作目录" title="当前工作目录" />
            <button class="cwd-apply-btn" title="应用目录" aria-label="应用工作目录" onclick="setCwd()" data-lockable><i class="fas fa-check"></i></button>
            <button class="cwd-browse-btn" title="选择目录" aria-label="选择工作目录" onclick="openCwdPicker()" data-lockable><i class="fas fa-folder-tree"></i></button>
        </div>
        <div class="top-actions">
            <button class="tab-btn" title="新对话" onclick="newSession()" data-lockable>
                <i class="fas fa-plus" style="margin-right:4px;"></i>新对话
            </button>
            <button class="tab-btn" title="清空当前会话" onclick="clearCurrentSession()" data-lockable>
                <i class="fas fa-broom" style="margin-right:4px;"></i>清空
            </button>
            <button class="tab-btn" id="retryTaskBtn" title="重试中断任务" onclick="retryInterruptedTask()" style="display:none;">
                <i class="fas fa-rotate-right" style="margin-right:4px;"></i>重试
            </button>
            <button class="tab-btn" id="rollbackTaskBtn" title="回滚本次任务修改" onclick="rollbackCurrentRun()" style="display:none; color:var(--accent-red);">
                <i class="fas fa-rotate-left" style="margin-right:4px;"></i>回滚
            </button>
            <button class="action-btn" id="logoutBtn" title="退出登录" aria-label="退出登录" onclick="logout()" style="font-size:12px; padding:4px 10px; border:1px solid var(--border-color); border-radius:6px; color:var(--accent-red);">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>
    <div class="mobile-panel-bar">
        <button class="mobile-panel-btn" onclick="openMobilePanel('sessions')"><i class="fas fa-list"></i>会话</button>
    </div>

    <div class="main-content">
        <div class="chat-panel">
            <div id="taskPanel" class="task-panel"></div>
            <div class="messages-container" id="messagesContainer">
                <div class="message welcome-msg">
                    <div class="msg-header agent"><i class="fas fa-robot"></i> Code Agent</div>
                    <div class="msg-body">
                        你好！我是你的编程助手。我可以帮你：
                        <ul style="margin: 8px 0 0 20px;">
                            <li>编写和修改代码</li>
                            <li>运行脚本并调试</li>
                            <li>分析报错信息</li>
                            <li>管理项目文件</li>
                        </ul>
                        <p style="margin-top: 10px;">请告诉我你的需求，例如：<em>"帮我写一个 Python 爬虫并运行测试"</em></p>
                    </div>
                </div>
            </div>
            <button id="newMessagesBtn" class="new-messages-btn" onclick="jumpToLatest()"><i class="fas fa-arrow-down"></i>新回复</button>

            <div class="input-area">
                <div id="queueBar" class="queue-bar">
                    <i class="fas fa-layer-group"></i>
                    <span id="queueSummary" class="queue-summary"></span>
                    <button class="queue-clear" onclick="clearQueuedMessages()">清空排队</button>
                </div>
                <div id="attachmentStrip" class="attachment-strip"></div>
                <div class="input-wrapper">
                    <textarea id="userInput" rows="1" placeholder="输入代码需求... (Enter 发送, Shift+Enter 换行)"></textarea>
                    <div class="input-actions">
                        <button class="action-btn attach-btn" title="附加文件内容" aria-label="附加文件内容" onclick="openFilePicker()"><i class="fas fa-paperclip"></i></button>
                        <button class="action-btn send" title="发送" aria-label="发送消息" onclick="sendMessage()"><i class="fas fa-arrow-up"></i></button>
                        <button class="action-btn stop" title="停止生成" aria-label="停止生成" onclick="stopGeneration()"><i class="fas fa-stop"></i></button>
                    </div>
                </div>
                <input type="file" id="fileInput" multiple style="display:none;">
                <div class="input-toolbar">
                    <select id="modelSelect" class="toolbar-select" onchange="switchModel()"></select>
                    <button id="modelConfigBtn" class="model-config-btn" type="button" title="配置模型" aria-label="配置模型" onclick="openModelConfig()" data-lockable><i class="fas fa-gear"></i></button>
                    <div class="toolbar-sep"></div>
                    <div class="mode-btns">
                        <button class="mode-btn" onclick="setAgentMode('plan')" id="mode-plan" data-lockable>Plan</button>
                        <button class="mode-btn" onclick="setAgentMode('auto')" id="mode-auto" data-lockable>Auto</button>
                        <button class="mode-btn active" onclick="setAgentMode('confirm')" id="mode-confirm" data-lockable>Confirm</button>
                    </div>
                    <div class="toolbar-spacer"></div>
                    <span id="modelStatus" style="font-size:11px; color:var(--text-muted);"></span>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="toast-stack" id="toastStack" aria-live="polite"></div>

            <div class="model-config-title" id="modelConfigTitle">
                模型配置
                <div class="model-config-subtitle">配置会永久保存到 ~/.fish-code/config.json</div>

            <button class="action-btn" type="button" title="关闭" aria-label="关闭模型配置" onclick="closeModelConfig()"><i class="fas fa-times"></i></button>
        </div>
        <div class="model-config-body">
            <div class="model-list-panel">
                <div class="model-list-header">
                    <span>已接入模型</span>

                </div>
                <div class="model-config-list" id="modelConfigList"></div>
            </div>
            <div class="model-form-panel">
                <div class="model-form-heading" id="modelFormHeading">新增模型</div>
                <input type="hidden" id="modelOriginalValue">
                <div class="model-form-grid">
                    <div class="model-field">
                        <label for="modelLabelInput">显示名称</label>
                        <input id="modelLabelInput" type="text" autocomplete="off" placeholder="例如：DeepSeek Chat">
                    </div>
                    <div class="model-field">
                        <label for="modelValueInput">模型标识</label>
                        <input id="modelValueInput" type="text" autocomplete="off" placeholder="例如：deepseek-chat">
                    </div>
                    <div class="model-field">
                        <label for="modelApiUrlInput">API 地址</label>
                        <input id="modelApiUrlInput" type="url" autocomplete="off" placeholder="https://api.example.com/chat/completions">
                    </div>
                    <div class="model-field">
                        <label for="modelApiKeyInput">API Key</label>
                        <input id="modelApiKeyInput" type="password" autocomplete="new-password" placeholder="请输入 API Key">
                        <div class="model-field-help" id="modelApiKeyHelp">新增模型时必须填写，保存后不会在页面中回显。</div>

                        <input id="modelSelectAfterSave" type="checkbox" checked>
                        保存后设为当前模型
                    </label>

                <div class="model-config-status" id="modelConfigStatus" role="status" aria-live="polite"></div>
                <div class="model-form-actions">
                    <button class="model-form-btn" type="button" onclick="startNewModel()">清空</button>
                    <button class="model-form-btn primary" id="modelSaveBtn" type="button" onclick="saveModelConfig()">保存模型</button>
                </div>
            </div>
        </div>

    function switchModel() {
        var model = document.getElementById('modelSelect').value;
        var status = document.getElementById('modelStatus');
        selectedModel = model;
        status.style.color = 'var(--accent-green)';
        status.textContent = selectedModel;
        addAgentLog('模型切换', selectedModel, 'success');
    }

    function openCwdPicker() {
        if (isProcessing) return;
        pickerCurrentPath = currentCwd || '';
        document.getElementById('cwdPickerOverlay').classList.add('open');
        var history = getCwdHistory();
        if (history.length > 0) {
            loadCwdPickerHistory(history);
        } else {
            loadCwdPickerDirs(pickerCurrentPath);
        }
    }

    function loadCwdPickerHistory(history) {
        var listEl = document.getElementById('cwdPickerList');
        var crumbEl = document.getElementById('cwdPickerBreadcrumb');
        crumbEl.innerHTML = '<span class="cwd-history-label"><i class="fas fa-clock-rotate-left"></i> 最近使用</span>';
        listEl.innerHTML = '';
        if (currentCwd) listEl.appendChild(makePickerItem('当前目录', currentCwd, 'fa-location-dot'));
        history.forEach(function (h) {
            var short = h.length > 58 ? '...' + h.slice(-55) : h;
            listEl.appendChild(makePickerItem(short, h, 'fa-folder-open'));
        });
        listEl.scrollTop = 0;
    }

    function makePickerItem(label, path, icon) {
        var item = document.createElement('div');
        item.className = 'cwd-picker-item cwd-history-item';
        item.title = path;
        item.innerHTML = '<i class="fas ' + icon + '"></i><span class="cwd-history-path"></span>';
        item.querySelector('span').textContent = label;
        item.onclick = function () { loadCwdPickerDirs(path); };
        return item;
    }

    function closeCwdPicker() {
        document.getElementById('cwdPickerOverlay').classList.remove('open');
    }

    function loadCwdPickerDirs(path) {
        var listEl = document.getElementById('cwdPickerList');
        listEl.innerHTML = '<div class="cwd-picker-empty"><i class="fas fa-spinner spinner"></i> 加载中...</div>';
        fetchJson('/cwd/list?path=' + encodeURIComponent(path || '')).then(function (d) {
            pickerCurrentPath = d.path || path;
            renderCwdBreadcrumb(pickerCurrentPath);
            var dirs = d.dirs || [];
            listEl.innerHTML = '';
            if (dirs.length === 0) {
                listEl.innerHTML = '<div class="cwd-picker-empty">此目录下没有子文件夹</div>';
                return;
            }
            dirs.forEach(function (name) {
                var item = document.createElement('div');
                item.className = 'cwd-picker-item';
                item.innerHTML = '<i class="fas fa-folder"></i><span></span>';
                item.querySelector('span').textContent = name;
                item.onclick = function () {
                    var sep = pickerCurrentPath.endsWith('/') || pickerCurrentPath.endsWith('\\') ? '' : '/';
                    loadCwdPickerDirs(pickerCurrentPath + sep + name);
                };
                listEl.appendChild(item);
            });
            listEl.scrollTop = 0;
        }).catch(function (err) {
            listEl.innerHTML = '<div class="cwd-picker-empty">加载失败：' + escapeHtml(err.message) + '</div>';
        });
    }

    function renderCwdBreadcrumb(path) {
        var el = document.getElementById('cwdPickerBreadcrumb');
        el.innerHTML = '';
        path = path || '';
        var isWindows = /^[A-Za-z]:[\\/]/.test(path);
        var parts = path.split(/[\\/]/).filter(Boolean);
        var accumulated = '';
        if (isWindows) {
            accumulated = parts.shift() + '\\';
            appendCrumb(el, accumulated.replace(/[\\/]$/, ''), accumulated);
        } else {
            accumulated = '/';
            appendCrumb(el, '/', '/');
        }
        parts.forEach(function (p) {
            if (el.children.length) appendSep(el);
            accumulated += (accumulated.endsWith('/') || accumulated.endsWith('\\') ? '' : '/') + p;
            appendCrumb(el, p, accumulated);
        });
    }

    function appendCrumb(parent, label, path) {
        var span = document.createElement('span');
        span.textContent = label;
        span.onclick = function () { loadCwdPickerDirs(path); };
        parent.appendChild(span);
    }

    function appendSep(parent) {
        var sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '/';
        parent.appendChild(sep);
    }

    function confirmCwdPicker() {
        cwdInput.value = pickerCurrentPath;
        markCwdDirty();
        closeCwdPicker();
        setCwd();
    }

    function setProcessingUI(running) {
        var indicator = document.getElementById('statusIndicator');
        var inputArea = document.querySelector('.input-area');
        var sendBtn = document.querySelector('.action-btn.send');
        var attachBtn = document.querySelector('.attach-btn');
        indicator.style.display = running ? 'inline-flex' : 'none';
        inputArea.classList.toggle('processing', running);
        sendBtn.disabled = running;
        attachBtn.disabled = running;
        userInput.disabled = running;
        userInput.placeholder = running ? 'Agent 执行中，请稍候...' : '输入代码需求... (Enter 发送, Shift+Enter 换行)';
        document.querySelectorAll('[data-lockable]').forEach(function (el) { el.disabled = running; });
        document.getElementById('modelSelect').disabled = running;
        cwdInput.disabled = running;
        if (!running) userInput.focus();
    }

    function openMobilePanel(panel) {
        closeMobilePanels();
        document.getElementById('mobileOverlay').classList.add('open');
        if (panel === 'sessions') {
            document.querySelector('.sidebar').classList.add('open');
        } else {
            var right = document.getElementById('rightPanel');
            right.classList.add('open');
            if (panel === 'tools') document.getElementById('toolPanel').scrollIntoView({ block: 'nearest' });
            if (panel === 'logs') agentLog.scrollIntoView({ block: 'nearest' });
        }
    }

    function closeMobilePanels() {
        document.getElementById('mobileOverlay').classList.remove('open');
        document.querySelector('.sidebar').classList.remove('open');
        document.getElementById('rightPanel').classList.remove('open');
    }

    function isNearBottom() {
        return messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < 120;
    }

    function scrollToBottom(force) {
        if (force || shouldStickToBottom) {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            newMessagesBtn.classList.remove('show');
        } else {
            newMessagesBtn.classList.add('show');
        }
    }

    function jumpToLatest() {
        shouldStickToBottom = true;
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        newMessagesBtn.classList.remove('show');
    }

    function configureMarkdown() {
        if (window.marked) {
            marked.setOptions({ breaks: true, gfm: true, mangle: false, headerIds: false });
        }
    }

    function renderMarkdown(text) {
        text = text == null ? '' : String(text);
        if (window.marked && window.DOMPurify) {
            var html = marked.parse(text);
            var clean = DOMPurify.sanitize(html, { ADD_ATTR: ['target', 'rel'] });
            var wrap = document.createElement('div');
            wrap.innerHTML = clean;
            wrap.querySelectorAll('a').forEach(function (a) {
                var href = a.getAttribute('href') || '';
                if (/^\s*javascript:/i.test(href)) a.removeAttribute('href');
                a.setAttribute('target', '_blank');
                a.setAttribute('rel', 'noopener noreferrer');
            });
            return wrap.innerHTML;
        }
        return '<p>' + escapeHtml(text).replace(/\n/g, '<br>') + '</p>';
    }

    function highlightCode(root) {
        if (window.Prism) Prism.highlightAllUnder(root);
    }

    function escapeHtml(text) {
        text = text == null ? '' : String(text);
        var m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, function (c) { return m[c]; });
    }

    function escapeAttr(text) {
        return escapeHtml(text).replace(/`/g, '&#096;');
    }

    initApp();
</script>

<div class="cwd-picker-overlay" id="cwdPickerOverlay" onclick="closeCwdPicker()">
    <div class="cwd-picker" onclick="event.stopPropagation()">
        <div class="cwd-picker-header">
            <span><i class="fas fa-folder-open" style="margin-right:6px;"></i>选择工作目录</span>
            <button class="action-btn" onclick="closeCwdPicker()" style="font-size:14px;"><i class="fas fa-times"></i></button>
        </div>
        <div class="cwd-picker-breadcrumb" id="cwdPickerBreadcrumb"></div>
        <div class="cwd-picker-list" id="cwdPickerList"></div>
        <div class="cwd-picker-footer">
            <button class="cwd-picker-select-btn" onclick="confirmCwdPicker()">选择此目录</button>
        </div>
    </div>
</div>
</body>
</html>
